<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обновления — Lunary</title>
<link rel="stylesheet" href="/static/layout.css">
<style>
.commit-list { display:flex; flex-direction:column; gap:8px; }
.commit-row { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; display:flex; align-items:flex-start; gap:14px; }
.commit-date { font-size:12px; color:var(--text3); white-space:nowrap; min-width:80px; padding-top:1px; }
.commit-hash { font-size:11px; font-family:monospace; color:var(--accent); background:#ede9fe; padding:2px 7px; border-radius:6px; white-space:nowrap; flex-shrink:0; }
.commit-msg { font-size:14px; color:var(--text); flex:1; line-height:1.4; }
.commit-tag { display:inline-block; font-size:11px; font-weight: var(--fw-semibold); padding:2px 8px; border-radius:20px; margin-right:6px; }
.tag-fix     { background:#fef3c7; color:#b45309; }
.tag-feat    { background:#dcfce7; color:#15803d; }
.tag-ui      { background:#dbeafe; color:#1d4ed8; }
.tag-kaspi   { background:#ede9fe; color:var(--purple); }
.empty { text-align:center; padding:60px; color:var(--text3); }
</style>
</head>
<body>
<div class="app-shell">

<aside class="sidebar" id="sidebar"></aside>

<div class="mobile-header">
  <div class="mobile-logo">Lunary <span>OS</span></div>
</div>

<div class="main-content">
<div class="page-container">
  <div style="margin-bottom:24px">
    <div class="page-title">🚀 Обновления системы</div>
    <div class="page-sub">История всех изменений из git</div>
  </div>

  <div id="list"><div class="empty">⏳ Загрузка...</div></div>
</div>
</div>
</div>

<nav class="bottom-nav" id="bottom-nav"></nav>
<script src="/static/nav.js"></script>
<script src="/static/mobile.js"></script>
<script>
function tagHtml(msg) {
  const m = msg.toLowerCase();
  if (m.startsWith('fix') || m.includes('исправ') || m.includes('убрать') || m.includes('убрать')) return '<span class="commit-tag tag-fix">Фикс</span>';
  if (m.includes('kaspi')) return '<span class="commit-tag tag-kaspi">Kaspi</span>';
  if (m.includes('ui') || m.includes('дизайн') || m.includes('стиль') || m.includes('шрифт') || m.includes('цвет') || m.includes('тема') || m.includes('консистент')) return '<span class="commit-tag tag-ui">UI</span>';
  return '<span class="commit-tag tag-feat">Функция</span>';
}

async function load() {
  const res = await fetch('/api/admin/changelog');
  if (!res.ok) { document.getElementById('list').innerHTML = '<div class="empty">⚠️ Ошибка загрузки</div>'; return; }
  const commits = await res.json();
  if (!commits.length) { document.getElementById('list').innerHTML = '<div class="empty">Нет данных</div>'; return; }
  document.getElementById('list').innerHTML = `<div class="commit-list">` +
    commits.map(c => `
      <div class="commit-row">
        <div class="commit-date">${c.date}</div>
        <div class="commit-hash">${c.hash}</div>
        <div class="commit-msg">${tagHtml(c.message)}${c.message}</div>
      </div>`).join('') +
    `</div>`;
}
load();
</script>
</body>
</html>
