<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunary OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
/* ── Stats ── */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; }
.stat-label { font-size:11px; color:var(--text3); margin-bottom:6px; font-weight: var(--fw-semibold); text-transform:uppercase; letter-spacing:.05em; }
.stat-value { font-size:28px; font-weight: var(--fw-extrabold); color:var(--text); }
.stat-value.red { color:var(--red); }
.stat-value.green { color:var(--green); }
.stat-value.purple { color:var(--accent); }
/* ── Toolbar ── */
.toolbar { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; align-items:center; width:100%; min-width:0; }
.search-input { flex:1; min-width:200px; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text); font-size:14px; outline:none; transition:border-color .15s; font-family:inherit; }
.search-input:focus { border-color:var(--accent); background:var(--surface); }
.search-input::placeholder { color:var(--text3); }
.btn-add { background:var(--text); color:#fff; border:none; border-radius:10px; padding:9px 18px; font-size:14px; font-weight: var(--fw-semibold); cursor:pointer; white-space:nowrap; display:inline-flex; align-items:center; gap:6px; }
.btn-add:hover { opacity:.85; }
.sort-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 14px; font-size:14px; color:var(--text2); cursor:pointer; font-weight: var(--fw-medium); display:inline-flex; align-items:center; gap:6px; font-family:inherit; appearance:none; -webkit-appearance:none; transition:all .15s; }
.sort-btn:hover { border-color:#d1d5db; color:var(--text); }
.sort-btn:focus { outline:none; border-color:var(--accent); }
/* ── Filter dropdowns ── */
.filter-rows { margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap; }
.filter-drop-btn { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:7px 14px; font-size:13px; color:var(--text2); cursor:pointer; white-space:nowrap; font-weight: var(--fw-medium); display:inline-flex; align-items:center; gap:5px; transition:all .15s; position:relative; }
.filter-drop-btn:hover { border-color:#d1d5db; color:var(--text); }
.filter-drop-btn.active { background:var(--text); border-color:var(--text); color:#fff; }
#f-low.active { background:#fee2e2; border-color:var(--red); color:var(--red); }
.fdrop-menu { display:none; position:absolute; top:calc(100% + 6px); left:0; background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:0 8px 32px rgba(0,0,0,.12); z-index:400; min-width:230px; max-height:400px; overflow-y:auto; padding:6px; scrollbar-width:thin; }
.fdrop-menu.open { display:block; }
.fdrop-item { padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; color:var(--text); display:flex; align-items:center; gap:6px; }
.fdrop-item:hover { background:var(--bg); }
.fdrop-item.active { background:var(--text); color:#fff; font-weight: var(--fw-semibold); }
.fdrop-check { font-size:11px; opacity:0; width:14px; flex-shrink:0; }
.fdrop-item.active .fdrop-check { opacity:1; }
.fdrop-cnt { font-size:11px; opacity:.5; margin-left:auto; }
/* ── Product grid ── */
.products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.product-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; cursor:pointer; transition:all .15s; position:relative; }
.product-card:hover { border-color:#d1d5db; box-shadow:0 2px 8px rgba(0,0,0,.06); transform:translateY(-1px); }
.product-card.low { border-color:#fca5a5; }
.product-card.selected { border-color:var(--accent); background:#eef2ff; box-shadow:0 0 0 3px rgba(99,102,241,.15); }
.product-card .card-check { position:absolute; top:10px; right:10px; width:18px; height:18px; accent-color:var(--accent); cursor:pointer; opacity:.35; transition:opacity .15s; z-index:2; }
.product-card:hover .card-check { opacity:1; }
.product-card.selected .card-check { opacity:1; }
.link-badge { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:var(--fw-bold); white-space:nowrap; cursor:default; }
.link-badge.link-master { background:#ede9fe; color:#6d28d9; }
.link-badge.link-slave { background:var(--bg); color:var(--text2); border:1px solid var(--border); }

/* Floating action bar для link-group выделения */
.link-bar {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--text); color:#fff;
  border-radius:14px; padding:10px 14px;
  display:flex; align-items:center; gap:12px;
  box-shadow:0 16px 40px rgba(0,0,0,.25);
  z-index:500;
}
.link-bar .lb-count { font-size:13px; padding:0 6px; }
.link-bar .lb-count b { font-weight:var(--fw-bold); }
.link-bar .btn { white-space:nowrap; }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.card-name { font-size:14px; font-weight: var(--fw-semibold); line-height:1.4; flex:1; color:var(--text); }
.card-badge { font-size:11px; padding:2px 8px; border-radius:20px; white-space:nowrap; margin-left:8px; flex-shrink:0; font-weight: var(--fw-semibold); }
.badge-ok  { background:#dcfce7; color:var(--green); }
.badge-low { background:#fee2e2; color:var(--red); }
.card-sku { font-size:11px; color:var(--text3); font-family:monospace; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-kaspi-sku { font-size:10px; color:#6366f1; font-family:monospace; margin-bottom:10px; opacity:.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-bottom { display:flex; align-items:flex-end; justify-content:space-between; }
.card-stock { font-size:28px; font-weight: var(--fw-extrabold); }
.card-stock.low { color:var(--red); }
.card-stock.ok  { color:var(--green); }
.card-unit { font-size:12px; color:var(--text3); margin-top:2px; }
.card-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:10px; }
.card-tag { background:var(--bg); color:var(--text2); font-size:11px; padding:2px 8px; border-radius:6px; font-weight: var(--fw-medium); }
.card-btn { background:var(--bg); border:none; border-radius:6px; padding:6px 10px; color:var(--text2); font-size:13px; cursor:pointer; }
.card-btn:hover { background:var(--border); }
.cat-header { font-size:12px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; font-weight: var(--fw-semibold); margin:20px 0 10px; grid-column:1/-1; }
/* ── Tooltips ── */
[data-tip] { position:relative; cursor:default; }
[data-tip]::after {
  content: attr(data-tip);
  position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
  background:#1f2937; color:#fff; font-size:11px; font-weight: var(--fw-medium); line-height:1.4;
  padding:5px 9px; border-radius:7px; white-space:nowrap; pointer-events:none;
  opacity:0; transition:opacity .15s; z-index:999; max-width:220px; white-space:normal; text-align:center;
}
[data-tip]::before {
  content:''; position:absolute; bottom:calc(100% + 1px); left:50%; transform:translateX(-50%);
  border:5px solid transparent; border-top-color:#1f2937; pointer-events:none;
  opacity:0; transition:opacity .15s; z-index:999;
}
[data-tip]:hover::after, [data-tip]:hover::before { opacity:1; }

/* ── Pagination ── */
.pagination { display:flex; align-items:center; justify-content:center; gap:6px; padding:16px 0; flex-wrap:wrap; }
.page-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:7px 13px; font-size:13px; font-weight: var(--fw-medium); color:var(--text2); cursor:pointer; transition:all .15s; font-family:inherit; }
.page-btn:hover { color:var(--text); }
.page-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight: var(--fw-semibold); }
.page-btn:disabled { opacity:.4; cursor:default; }
.page-info { font-size:13px; color:var(--text3); padding:0 6px; }
/* ── Modals ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:300; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
.overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:18px; width:520px; max-width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.12); }
.modal-header { padding:20px 20px 0; display:flex; justify-content:space-between; align-items:center; }
.modal-title { font-size:17px; font-weight: var(--fw-bold); color:var(--text); }
.modal-close { background:var(--bg); border:none; border-radius:50%; width:32px; height:32px; min-width:32px; min-height:32px; color:var(--text2); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
.modal-close:hover { background:var(--border); }
.modal-body { padding:20px; }
.form-group { margin-bottom:14px; }
.form-label { font-size:13px; color:var(--text2); margin-bottom:6px; display:block; font-weight: var(--fw-medium); }
.form-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-size:14px; outline:none; transition:border-color .15s; font-family:inherit; }
.form-input:focus { border-color:var(--accent); background:var(--surface); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-select { appearance:none; }
.btn-submit { width:100%; background:var(--text); color:#fff; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight: var(--fw-semibold); cursor:pointer; margin-top:6px; }
.btn-submit:hover { opacity:.85; }
.move-modal .stock-display { text-align:center; padding:16px 0; }
.move-modal .big-num { font-size:52px; font-weight: var(--fw-extrabold); color:var(--text); }
.move-modal .big-num.low { color:var(--red); }
.move-modal .big-num.ok  { color:var(--green); }
.qty-control { display:flex; align-items:center; gap:12px; margin:16px 0; }
.qty-control button { width:44px; height:44px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text) !important; font-size:22px; cursor:pointer; }
.qty-control input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font-size:18px; text-align:center; outline:none; font-family:inherit; }
.move-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.move-btn { padding:13px; border-radius:10px; border:none; cursor:pointer; font-size:14px; font-weight: var(--fw-semibold); }
.move-btn.sale     { background:#fee2e2; color:var(--red); }
.move-btn.income   { background:#dcfce7; color:var(--green); }
.move-btn.writeoff { background:#ffedd5; color:var(--orange); }
.move-btn.ret      { background:#ede9fe; color:var(--accent); }
.btn-cancel-move { width:100%; background:var(--bg); color:var(--text2); border:none; border-radius:10px; padding:12px; cursor:pointer; font-size:14px; }
.edit-modal .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.tab-btns { display:flex; border-bottom:1px solid var(--border); margin-bottom:16px; }
.tab-btn { padding:10px 16px; background:none; border:none; color:var(--text3); font-size:14px; cursor:pointer; border-bottom:2px solid transparent; font-weight: var(--fw-medium); }
.tab-btn.active { color:var(--text); border-bottom-color:var(--text); }
.toast-container { position:fixed; bottom:env(safe-area-inset-bottom, 24px); bottom:calc(env(safe-area-inset-bottom, 0px) + 80px); left:50%; transform:translateX(-50%); z-index:999; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none; }
.toast { background:var(--text); color:#fff; padding:11px 18px; border-radius:10px; font-size:14px; font-weight: var(--fw-medium); opacity:0; transition:opacity .3s; white-space:nowrap; box-shadow:0 4px 12px rgba(0,0,0,.15); }
.toast.show { opacity:1; }
.toast.success { background:var(--green); }
.toast.error   { background:var(--red); }
.empty { grid-column:1/-1; text-align:center; padding:60px; color:var(--text3); font-size:15px; }
.btn-ai { background:#ede9fe; color:var(--accent); border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight: var(--fw-semibold); cursor:pointer; white-space:nowrap; }
.btn-ai:hover { background:#ddd6fe; }
.btn-ai.loading { opacity:.6; pointer-events:none; }
@media (max-width: 768px) {
  .products-grid { display:grid !important; grid-template-columns:calc(50% - 5px) calc(50% - 5px) !important; gap:10px !important; width:100% !important; }
  .card-stock { font-size:20px !important; }
  .card-name { font-size:12px !important; }
  .card-bottom { flex-wrap:wrap; gap:4px; }
  .card-tags { gap:4px !important; }
  .card-tag { font-size:10px !important; padding:2px 6px !important; }
  .stats { grid-template-columns:calc(50% - 5px) calc(50% - 5px) !important; gap:10px !important; }
  .stat { padding:12px !important; }
  .stat-value { font-size:22px !important; }
  /* Toolbar: поиск на всю ширину, остальное в ряд */
  .toolbar { flex-wrap:wrap !important; gap:8px !important; }
  .search-input { width:100% !important; flex:none !important; font-size:16px !important; }
  #sort-select { flex:1 !important; font-size:13px !important; min-width:0 !important; }
  .btn-add { font-size:13px !important; padding:9px 12px !important; }
  /* Скрыть Excel на мобиле — есть в меню */
  .toolbar > a.sort-btn[download] { display:none !important; }
  .filter-rows { gap:6px !important; flex-wrap:wrap !important; }
  .overlay { align-items:flex-end !important; padding:0 !important; }
  .modal { width:100% !important; border-radius:20px 20px 0 0 !important; max-height:92vh !important; }
  .form-input { font-size:16px !important; }
  .form-row { grid-template-columns:1fr !important; }
}
</style>
<link rel="stylesheet" href="/static/layout.css">
</head>
<body>

<div class="app-shell">

<!-- SIDEBAR (desktop) -->
<aside class="sidebar" id="sidebar"></aside>

<!-- MOBILE HEADER -->
<div class="mobile-header">
  <div class="mobile-logo">Lunary <span>OS</span></div>
  <div class="mobile-header-actions" style="display:flex;gap:8px;align-items:center">
    <button class="mobile-scan-btn" onclick="openQuickScan()">📷</button>
    <button class="btn-add" onclick="openAddModal()" style="padding:7px 14px;font-size:13px">+ Добавить</button>
  </div>
</div>

<div class="main-content">
<div class="page-container">
  <div class="stats" id="stats"></div>

  <!-- Строка 1: поиск + сортировка + кнопки -->
  <div class="toolbar">
    <input class="search-input" id="search" type="text" placeholder="Поиск по названию, артикулу, штрихкоду..." oninput="currentPage=1;saveFilters();render()">
    <select class="sort-btn" id="sort-select" onchange="currentPage=1;saveFilters();render()">
      <option value="default">↕ По категориям</option>
      <option value="stock-asc">↑ Остаток (меньше)</option>
      <option value="stock-desc">↓ Остаток (больше)</option>
      <option value="name-asc">А-Я Название</option>
    </select>
    <button class="btn-add" onclick="openAddModal()">+ Добавить товар</button>
    <button class="sort-btn" onclick="openReceiptModal()" style="background:#dcfce7;border-color:#86efac;color:var(--green);font-weight: var(--fw-semibold)">📦 Приёмка</button>
    <button class="sort-btn" onclick="openPurchasesModal()" style="background:#fef9c3;border-color:#fde047;color:#854d0e;font-weight: var(--fw-semibold)">🛒 Закупки</button>
    <a class="sort-btn" id="btn-xlsx" href="/api/products/export/xlsx" download style="text-decoration:none">⬇ Excel</a>
    <button class="sort-btn" id="btn-fill-desc" onclick="fillDescriptions()" style="background:#f3e8ff;border-color:#d8b4fe;color:var(--purple);font-weight: var(--fw-semibold)">✨ AI описания</button>
  </div>

  <!-- Строка 2: фильтры -->
  <div class="filter-rows">
    <button class="filter-drop-btn" id="f-low" onclick="toggleLow()">⚠️ Заканчивается</button>
    <div style="position:relative">
      <button class="filter-drop-btn" id="cat-btn" onclick="toggleDrop('cat')">
        <span id="cat-label">Категория</span> <span style="font-size:10px">▼</span>
      </button>
      <div class="fdrop-menu" id="cat-menu">
        <div class="fdrop-item active" id="cat-all-item" onclick="setCat(null)">Все категории</div>
        <div style="height:1px;background:#f3f4f6;margin:4px 0"></div>
      </div>
    </div>
    <div style="position:relative">
      <button class="filter-drop-btn" id="brand-btn" onclick="toggleDrop('brand')">
        <span id="brand-label">Бренд</span> <span style="font-size:10px">▼</span>
      </button>
      <div class="fdrop-menu" id="brand-menu">
        <div class="fdrop-item active" id="brand-all-item" onclick="setBrand(null)">Все бренды</div>
        <div style="height:1px;background:#f3f4f6;margin:4px 0"></div>
      </div>
    </div>
    <!-- Фильтр: не хватает данных -->
    <div style="position:relative">
      <button class="filter-drop-btn" id="missing-btn" onclick="toggleDrop('missing')">
        <span id="missing-label">Не заполнено</span> <span style="font-size:10px">▼</span>
      </button>
      <div class="fdrop-menu" id="missing-menu" style="min-width:210px">
        <div style="padding:8px 12px 4px;font-size:11px;font-weight: var(--fw-bold);color: var(--text3);text-transform:uppercase;letter-spacing:.4px">Показать где нет:</div>
        <label class="fdrop-item" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="miss-price"   onchange="toggleMissing()" style="accent-color:var(--accent)"> Цены продажи
        </label>
        <label class="fdrop-item" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="miss-cost"    onchange="toggleMissing()" style="accent-color:var(--accent)"> Закупочной цены
        </label>
        <label class="fdrop-item" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="miss-article" onchange="toggleMissing()" style="accent-color:var(--accent)"> Артикула производителя
        </label>
        <label class="fdrop-item" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="miss-supplier" onchange="toggleMissing()" style="accent-color:var(--accent)"> Поставщика
        </label>
        <label class="fdrop-item" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="miss-barcode" onchange="toggleMissing()" style="accent-color:var(--accent)"> Штрихкода
        </label>
        <label class="fdrop-item" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="miss-stock"   onchange="toggleMissing()" style="accent-color:var(--accent)"> Остатка (= 0)
        </label>
        <div style="padding:8px 12px 4px">
          <button onclick="clearMissing()" style="font-size:12px;color: var(--text3);background:none;border:none;cursor:pointer;padding:0">Сбросить всё</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Баннер активного фильтра -->
  <div id="filter-banner" style="display:none;align-items:center;gap:12px;padding:8px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;margin-bottom:10px;font-size:13px;color:#1d4ed8">
    <span style="font-size:15px">🔍</span>
    <span id="filter-banner-text" style="flex:1;font-weight: var(--fw-medium)"></span>
    <button onclick="resetAllFilters()" style="background:#dbeafe;border:1px solid #93c5fd;border-radius:6px;padding:3px 10px;font-size:12px;color:#1d4ed8;cursor:pointer;white-space:nowrap">✕ Сбросить фильтры</button>
  </div>

  <div id="pagination-top"></div>
  <div class="products-grid" id="grid">
    <div class="empty">Загрузка...</div>
  </div>
  <div id="pagination-bot"></div>
</div><!-- /page-container -->
</div><!-- /main-content -->
</div><!-- /app-shell -->

<!-- Модал: карточка товара -->
<div class="overlay move-modal" id="move-modal" onclick="closeMoveModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="mm-name">—</div>
        <div style="font-size:12px;color:#52525b;font-family:monospace;margin-top:3px" id="mm-sku"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="closeMoveModal();openEditModal(selectedId,true)" title="Редактировать карточку" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px;line-height:1;color:var(--text2)">✏️</button>
        <button class="modal-close" onclick="closeMoveModal()">×</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="stock-display">
        <div class="big-num ok" id="mm-stock">0</div>
        <div style="font-size:13px;color:#71717a" id="mm-unit">шт</div>
      </div>
      <!-- Вкладки: Изменить / Установить -->

<script>
let allProducts = [];
let activeCats = new Set();
let activeBrands = new Set();
let showLow = false;
// Link-group selection state: set of selected product ids
let linkSelection = new Set();
let missingFields = new Set(); // 'price','cost','article','supplier','barcode','stock'
let selectedId = null;
const PAGE_SIZE = 80;
let currentPage = 1;

// ── Текущий отфильтрованный список ───────────────────────
function getFilteredList() {
  const q = document.getElementById('search').value.toLowerCase();
  const matchW = (text) => !q || q.split(/\s+/).filter(Boolean).every(w => (text||'').toLowerCase().includes(w));
  return allProducts.filter(p => {
    if (q && !matchW(p.name) && !matchW(p.sku) && !matchW(p.kaspi_sku) && !matchW(p.supplier_article) && !matchW(p.barcode)) return false;
    if (showLow && !p.low) return false;
    if (activeCats.size && !activeCats.has(p.category || 'Общее')) return false;
    if (activeBrands.size && !activeBrands.has(getBrand(p))) return false;
    if (!matchMissing(p)) return false;
    return true;
  });
}

function isFiltered() {
  const q = document.getElementById('search')?.value.trim();
  return !!(q || showLow || activeCats.size || activeBrands.size || missingFields.size);
}

function updateFilterBanner(shown) {
  const banner = document.getElementById('filter-banner');
  if (!banner) return;
  const total = allProducts.length;
  if (isFiltered() && shown < total) {
    banner.style.display = 'flex';
    document.getElementById('filter-banner-text').textContent = `Показано ${shown} из ${total} товаров`;
    // обновить кнопки действий
    const ids = getFilteredList().map(p => p.id).join(',');
    const xlsxBtn = document.getElementById('btn-xlsx');
    if (xlsxBtn) xlsxBtn.href = `/api/products/export/xlsx?ids=${ids}`;
    document.getElementById('btn-fill-desc').dataset.filteredIds = ids;
  } else {
    banner.style.display = 'none';
    const xlsxBtn = document.getElementById('btn-xlsx');
    if (xlsxBtn) xlsxBtn.href = '/api/products/export/xlsx';
    document.getElementById('btn-fill-desc').dataset.filteredIds = '';
  }
}

// ── Сохранение/восстановление состояния фильтров ──────────
function saveFilters() {
  localStorage.setItem('lun_filters', JSON.stringify({
    cats: [...activeCats],
    brands: [...activeBrands],
    low: showLow,
    sort: document.getElementById('sort-select')?.value || 'default',
    search: document.getElementById('search')?.value || ''
  }));
}

function restoreFilters() {
  try {
    const saved = JSON.parse(localStorage.getItem('lun_filters') || '{}');
    activeCats = new Set(saved.cats || (saved.cat ? [saved.cat] : []));
    activeBrands = new Set(saved.brands || (saved.brand ? [saved.brand] : []));
    showLow = saved.low || false;
    if (saved.sort) document.getElementById('sort-select').value = saved.sort;
    if (saved.search) document.getElementById('search').value = saved.search;
  } catch {}
}

function getBrand(p) {
  if (!p.brand) return 'Не указан';
  return p.brand.trim().toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

let currentUser = null;

async function load() {
  const [productsRes, meRes] = await Promise.all([
    fetch('/api/products'),
    fetch('/api/auth/me').catch(() => null)
  ]);
  allProducts = await productsRes.json();
  if (meRes && meRes.ok) currentUser = await meRes.json();

  // Скрываем опасные кнопки для manager
  const isAdmin = currentUser?.role === 'admin';
  document.querySelectorAll('.admin-only').forEach(el => {
    el.style.display = isAdmin ? '' : 'none';
  });

  renderStats();
  buildFilters();
  applyRestoredFilters();
  render();
}

function renderStats() {
  const low = allProducts.filter(p => p.low).length;
  const units = allProducts.reduce((s, p) => s + p.stock, 0);
  const totalValue = allProducts.reduce((s, p) => s + (p.price || 0) * p.stock, 0);
  const totalValueFmt = totalValue >= 1000000
    ? (totalValue / 1000000).toFixed(1) + ' млн ₸'
    : totalValue.toLocaleString('ru-RU') + ' ₸';
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Позиций</div><div class="stat-value purple">${allProducts.length}</div></div>
    <div class="stat"><div class="stat-label">Единиц</div><div class="stat-value">${units}</div></div>
    <div class="stat"><div class="stat-label">Заканчивается</div><div class="stat-value red">${low}</div></div>
    <div class="stat"><div class="stat-label">В норме</div><div class="stat-value green">${allProducts.length - low}</div></div>
    <div class="stat"><div class="stat-label">На складе</div><div class="stat-value">${totalValueFmt}</div></div>
  `;
}

function applyRestoredFilters() {
  updateCatBtn();
  updateBrandBtn();
  document.getElementById('f-low').classList.toggle('active', showLow);
}

function toggleDrop(which) {
  const menu = document.getElementById(which + '-menu');
  const isOpen = menu.classList.contains('open');
  // Закрыть все
  document.querySelectorAll('.fdrop-menu').forEach(m => m.classList.remove('open'));
  if (!isOpen) menu.classList.add('open');
}

// Закрывать дропдаун при клике вне
document.addEventListener('click', e => {
  if (!e.target.closest('.filter-drop-btn') && !e.target.closest('.fdrop-menu')) {
    document.querySelectorAll('.fdrop-menu').forEach(m => m.classList.remove('open'));
  }
});

function buildFilters() {
  // Категории
  const catCount = {};
  allProducts.forEach(p => { const c = p.category || 'Общее'; catCount[c] = (catCount[c]||0)+1; });
  const catMenu = document.getElementById('cat-menu');
  [...catMenu.querySelectorAll('.cat-item')].forEach(el => el.remove());
  Object.entries(catCount).sort((a,b) => b[1]-a[1]).forEach(([cat, cnt]) => {
    const el = document.createElement('div');
    el.className = 'fdrop-item cat-item';
    el.dataset.cat = cat;
    el.innerHTML = `<span class="fdrop-check">✓</span>${cat} <span class="fdrop-cnt">${cnt}</span>`;
    el.onclick = () => toggleCat(cat);
    catMenu.appendChild(el);
  });

  // Бренды
  const brandCount = {};
  allProducts.forEach(p => { const b = getBrand(p); brandCount[b] = (brandCount[b]||0)+1; });
  const brandMenu = document.getElementById('brand-menu');
  [...brandMenu.querySelectorAll('.brand-item')].forEach(el => el.remove());
  Object.entries(brandCount).sort((a,b) => b[1]-a[1]).forEach(([brand, cnt]) => {
    const el = document.createElement('div');
    el.className = 'fdrop-item brand-item';
    el.dataset.brand = brand;
    el.innerHTML = `<span class="fdrop-check">✓</span>${brand} <span class="fdrop-cnt">${cnt}</span>`;
    el.onclick = () => toggleBrand(brand);
    brandMenu.appendChild(el);
  });
}

function updateCatBtn() {
  const n = activeCats.size;
  document.getElementById('cat-btn').classList.toggle('active', n > 0);
  document.getElementById('cat-label').textContent = n === 0 ? 'Категория' : n === 1 ? [...activeCats][0] : `Категории (${n})`;
  document.getElementById('cat-all-item').classList.toggle('active', n === 0);
  document.querySelectorAll('.cat-item').forEach(el => el.classList.toggle('active', activeCats.has(el.dataset.cat)));
}

function updateBrandBtn() {
  const n = activeBrands.size;
  document.getElementById('brand-btn').classList.toggle('active', n > 0);
  document.getElementById('brand-label').textContent = n === 0 ? 'Бренд' : n === 1 ? [...activeBrands][0] : `Бренды (${n})`;
  document.getElementById('brand-all-item').classList.toggle('active', n === 0);

function toggleBrand(brand) {

}

function setCat(cat) {

  document.querySelectorAll('.fdrop-menu').forEach(m => m.classList.remove('open'));
  currentPage = 1; updateCatBtn(); saveFilters(); render();
}
function setBrand(brand) {

  document.querySelectorAll('.fdrop-menu').forEach(m => m.classList.remove('open'));

function toggleMissing() {
  missingFields.clear();
  if (document.getElementById('miss-price').checked)    missingFields.add('price');
  if (document.getElementById('miss-cost').checked)     missingFields.add('cost');
  if (document.getElementById('miss-article').checked)  missingFields.add('article');
  if (document.getElementById('miss-supplier').checked) missingFields.add('supplier');
  if (document.getElementById('miss-barcode').checked)  missingFields.add('barcode');
  if (document.getElementById('miss-stock').checked)    missingFields.add('stock');

  const btn = document.getElementById('missing-btn');
  if (missingFields.size) {
    btn.classList.add('active');
    document.getElementById('missing-label').textContent = `Не заполнено (${missingFields.size})`;
  } else {
    btn.classList.remove('active');
    document.getElementById('missing-label').textContent = 'Не заполнено';
  }
  currentPage = 1;
  saveFilters();
  render();
}

function matchMissing(p) {
  if (!missingFields.size) return true;
  // Товар проходит фильтр если хотя бы одно из выбранных полей пусто
  for (const f of missingFields) {
    if (f === 'price'    && !p.price)            return true;
    if (f === 'cost'     && !p.cost_price)        return true;
    if (f === 'article'  && !p.supplier_article)  return true;
    if (f === 'supplier' && !p.supplier)          return true;
    if (f === 'barcode'  && !p.barcode)           return true;
    if (f === 'stock'    && p.stock === 0)         return true;
  }
  return false;
}

function clearMissing() {
  ['miss-price','miss-cost','miss-article','miss-supplier','miss-barcode','miss-stock']
    .forEach(id => document.getElementById(id).checked = false);
  toggleMissing();
}

function resetAllFilters() {
  document.getElementById('search').value = '';
  showLow = false;
  activeCats.clear();
  activeBrands.clear();
  missingFields.clear();
  document.getElementById('f-low')?.classList.remove('active');
  document.getElementById('cat-btn')?.classList.remove('active');
  document.getElementById('brand-btn')?.classList.remove('active');
  document.getElementById('missing-btn')?.classList.remove('active');

  document.getElementById('brand-label').textContent = 'Бренд';

function toggleLow() {
  currentPage = 1;
  showLow = !showLow;
  document.getElementById('f-low').classList.toggle('active', showLow);

  render();
}

function renderPagination(total, page, id) {
  const el = document.getElementById(id);
  if (!el) return;
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) { el.innerHTML = ''; return; }
  const from = (page - 1) * PAGE_SIZE + 1, to = Math.min(page * PAGE_SIZE, total);
  let h = `<div class="pagination">`;
  h += `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>← Назад</button>`;
  const s = Math.max(1, page-3), e = Math.min(pages, s+6);
  if (s > 1) h += `<button class="page-btn" onclick="goPage(1)">1</button>${s>2?'<span class="page-info">…</span>':''}`;
  for (let i = s; i <= e; i++) h += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if (e < pages) h += `${e<pages-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  h += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>Вперёд →</button>`;
  h += `<span class="page-info">${from}–${to} из ${total}</span></div>`;
  el.innerHTML = h;
}

function goPage(p) {
  let list = getFilteredList();
  const pages = Math.ceil(list.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  render();
  document.getElementById('pagination-top').scrollIntoView({ behavior:'smooth', block:'start' });
}

function render() {
  let list = getFilteredList();
  updateFilterBanner(list.length);

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty">Ничего не найдено</div>';
    document.getElementById('pagination-top').innerHTML = '';
    document.getElementById('pagination-bot').innerHTML = '';
    return;
  }

  const sort = document.getElementById('sort-select').value;

  // Сортировка
  if (sort === 'stock-asc')  list.sort((a, b) => a.stock - b.stock);
  else if (sort === 'stock-desc') list.sort((a, b) => b.stock - a.stock);
  else if (sort === 'name-asc')  list.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

  renderPagination(list.length, currentPage, 'pagination-top');
  renderPagination(list.length, currentPage, 'pagination-bot');
  const page = list.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  let html = '';
  // При сортировке по остаткам или фильтре по категории — без группировки
  if (sort !== 'default' || activeCats.size) {
    page.forEach(p => { html += productCard(p); });
  } else {
    // Сортируем весь список по категории чтобы категории шли подряд
    list.sort((a, b) => (a.category||'Общее').localeCompare(b.category||'Общее', 'ru'));

    // Считаем общее кол-во по каждой категории
    const catTotals = {};
    list.forEach(p => { const c = p.category||'Общее'; catTotals[c] = (catTotals[c]||0) + 1; });

    // Срезаем текущую страницу из уже отсортированного списка
    const pageItems = list.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

    // Индекс первого элемента страницы в глобальном списке
    const pageStart = (currentPage-1)*PAGE_SIZE;

    pageItems.forEach((p, i) => {
      const globalIdx = pageStart + i;
      const cat = p.category || 'Общее';
      // Показываем заголовок категории если это первый элемент этой категории глобально
      const isFirstOfCat = globalIdx === 0 || (list[globalIdx-1].category||'Общее') !== cat;
      if (isFirstOfCat) {
        html += `<div class="cat-header">${cat} — ${catTotals[cat]} шт</div>`;
      }
      html += productCard(p);
    });
  }
  grid.innerHTML = html;
}

function productCard(p) {
  const margin = (p.cost_price && p.price && p.price > p.cost_price)
    ? Math.round((p.price - p.cost_price) / p.price * 100) : null;
  const marginTip = margin !== null
    ? `Маржа ${margin}% · Продажа ${p.price.toLocaleString('ru')} ₸ · Закуп ${p.cost_price.toLocaleString('ru')} ₸ · Прибыль ${(p.price-p.cost_price).toLocaleString('ru')} ₸`
    : (p.price && !p.cost_price ? 'Закупочная цена не указана — маржа неизвестна' : '');
  const statusTip = p.low
    ? `Остаток ${p.stock} ниже минимума ${p.min_stock} ${p.unit} — нужно пополнить`
    : `Остаток в норме · Минимум: ${p.min_stock} ${p.unit}`;

  // Link-group info
  const isMaster = p.link_group_size > 0;
  const isSlave = !!p.link_master_id;
  let linkBadge = '';
  if (isMaster) {
    linkBadge = `<span class="link-badge link-master" data-tip="Мастер группы из ${p.link_group_size} карточек — остаток общий">🔗 ${p.link_group_size}</span>`;
  } else if (isSlave) {
    linkBadge = `<span class="link-badge link-slave" data-tip="Привязан к мастеру — остаток общий">🔗</span>`;
  }

  const checked = linkSelection.has(p.id) ? 'checked' : '';
  const selectedClass = linkSelection.has(p.id) ? 'selected' : '';

  return `
    <div class="product-card ${p.low?'low':''} ${selectedClass}" data-pid="${p.id}" onclick="cardClick(event, ${p.id})" style="cursor:pointer">
      <input type="checkbox" class="card-check" ${checked} onclick="event.stopPropagation();toggleLinkSelect(${p.id})" title="Выбрать для объединения">
      <div class="card-top">
        <div class="card-name">${p.name}</div>
        <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
          ${linkBadge}
          <span class="card-badge ${p.low?'badge-low':'badge-ok'}" data-tip="${statusTip}">${p.low?'⚠️':'✓'}</span>
        </div>
      </div>
      ${p.supplier_article ? `<div class="card-sku">${p.supplier_article}</div>` : ''}
      ${p.kaspi_sku ? `<div class="card-kaspi-sku">${p.kaspi_sku}</div>` : ''}
      <div class="card-bottom">
        <div>
          <div class="card-stock ${p.low?'low':'ok'}" data-tip="${statusTip}">${p.stock} <span style="font-size:14px;font-weight: var(--fw-medium);color: var(--text3)">${p.unit}</span></div>
          ${p.price ? `<div class="card-unit">${p.price.toLocaleString('ru')} ₸${margin !== null ? ` <span style="color:var(--green);font-size:11px;font-weight: var(--fw-medium)" data-tip="${marginTip}">+${margin}%</span>` : (p.price && !p.cost_price ? ` <span style="color:#d1d5db;font-size:11px" data-tip="Закупочная цена не указана">—%</span>` : '')}</div>` : ''}
        </div>
        <button class="card-btn" onclick="event.stopPropagation();openMoveModal(${p.id})" title="Движение склада">⇅</button>
      </div>
      <div class="card-tags">
        ${p.category ? `<span class="card-tag">${p.category}</span>` : ''}
        ${p.brand ? `<span class="card-tag">${p.brand}</span>` : ''}
      </div>
    </div>
  `;
}

function cardClick(event, id) {
  // Когда есть выбранные для объединения — клик на карточке переключает чекбокс.
  // Иначе — открывает страницу товара.
  if (linkSelection.size > 0) {
    event.preventDefault();
    event.stopPropagation();
    toggleLinkSelect(id);
    return;
  }
  location.href = '/shop/product/' + id;
}

function toggleLinkSelect(id) {
  if (linkSelection.has(id)) linkSelection.delete(id);
  else linkSelection.add(id);
  renderLinkBar();
  // Перерисовать только статус выбранных карточек, без полного re-render'а
  document.querySelectorAll('.product-card').forEach(el => {
    const pid = parseInt(el.dataset.pid);
    el.classList.toggle('selected', linkSelection.has(pid));
    const cb = el.querySelector('.card-check');
    if (cb) cb.checked = linkSelection.has(pid);
  });
}

function renderLinkBar() {
  let bar = document.getElementById('link-bar');
  if (linkSelection.size === 0) {
    if (bar) bar.remove();
    return;
  }
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'link-bar';
    bar.className = 'link-bar';
    document.body.appendChild(bar);
  }
  bar.innerHTML = `
    <div class="lb-count">Выбрано: <b>${linkSelection.size}</b></div>
    <button class="btn btn-secondary btn-sm" onclick="clearLinkSelection()">Отмена</button>
    <button class="btn btn-primary btn-sm" onclick="openLinkDialog()" ${linkSelection.size < 2 ? 'disabled' : ''}>🔗 Объединить в группу</button>
  `;
}

function clearLinkSelection() {
  linkSelection.clear();
  renderLinkBar();
  document.querySelectorAll('.product-card.selected').forEach(el => {
    el.classList.remove('selected');
    const cb = el.querySelector('.card-check');
    if (cb) cb.checked = false;
  });
}

function openLinkDialog() {
  if (linkSelection.size < 2) return;
  const selected = Array.from(linkSelection).map(id => allProducts.find(p => p.id === id)).filter(Boolean);
  const overlay = document.getElementById('link-modal');
  const body = document.getElementById('lm-body');

  body.innerHTML = `
    <div style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5">
      Выбери <b>главный товар</b> (мастера). У остальных остатки перейдут к мастеру, и они будут автоматически показывать его текущий запас.
      <br><br>
      <b>Цены у каждого останутся свои</b>. Картинки, описания, SEO — у каждого своё.
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${selected.map(p => `
        <label style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;background:var(--surface)">
          <input type="radio" name="lm-master" value="${p.id}" style="width:17px;height:17px;accent-color:var(--accent)">
          <div style="flex:1">
            <div style="font-size:14px;font-weight:var(--fw-semibold)">${p.name}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;font-family:monospace">${p.kaspi_sku || '—'} · остаток ${p.stock} ${p.unit}</div>
          </div>
        </label>
      `).join('')}
    </div>
  `;
  overlay.classList.add('open');
}

function closeLinkDialog(e) {
  if (!e || e.target === document.getElementById('link-modal')) {
    document.getElementById('link-modal').classList.remove('open');
  }
}

async function confirmLinkGroup() {
  const masterRadio = document.querySelector('input[name="lm-master"]:checked');
  if (!masterRadio) {
    toast('Выбери мастера', 'error');
    return;
  }
  const master_id = parseInt(masterRadio.value);
  const slave_ids = Array.from(linkSelection).filter(id => id !== master_id);

  const res = await fetch('/api/products/link', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({master_id, slave_ids})
  });
  if (res.ok) {
    const d = await res.json();
    toast(`✅ Группа создана: мастер + ${d.slaves_linked} дубликат${d.slaves_linked === 1 ? '' : 'ов'}. Передано ${d.stock_transferred} шт.`, 'success');
    closeLinkDialog();
    clearLinkSelection();
    load();
  } else {
    let msg = 'Ошибка объединения';
    try { const e = await res.json(); msg = e.detail || msg; } catch {}
    toast(msg, 'error');
  }
}

// ── Move modal ──────────────────────────────────────────
function openMoveModal(id) {
  const p = allProducts.find(x => x.id === id);
  selectedId = id;
  document.getElementById('mm-name').textContent = p.name;
  document.getElementById('mm-sku').textContent = p.supplier_article || '';
  document.getElementById('mm-stock').textContent = p.stock;
  document.getElementById('mm-stock').className = 'big-num ' + (p.low?'low':'ok');
  document.getElementById('mm-unit').textContent = p.unit;
  document.getElementById('mm-qty').value = 1;
  document.getElementById('mm-note').value = '';
  document.getElementById('mm-set-note').value = '';
  mmSwitchTab('adj');
  document.getElementById('move-modal').classList.add('open');
}

function closeMoveModal(e) {
  if (!e || e.target === document.getElementById('move-modal'))
    document.getElementById('move-modal').classList.remove('open');
}

async function doMove(type) {
  const qty = parseInt(document.getElementById('mm-qty').value)||1;
  const note = document.getElementById('mm-note').value.trim() || null;
  const res = await fetch(`/api/products/${selectedId}/movement`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({quantity:qty, type, source:'web', note})
  });
  if (!res.ok) {
    let msg = 'Ошибка ' + res.status;
    try { const e = await res.json(); msg = e.detail || msg; } catch {}
    toast(msg, 'error'); return;
  }
  const data = await res.json();
  document.getElementById('mm-note').value = '';
  closeMoveModal();
  toast(`✅ ${data.product}: остаток ${data.new_stock}`, 'success');
  load();
}

async function quickMove(id, type) {
  const res = await fetch(`/api/products/${id}/movement`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({quantity:1, type, source:'web'})
  });
  if (!res.ok) {
    let msg = 'Ошибка ' + res.status;
    try { const e = await res.json(); msg = e.detail || msg; } catch {}
    toast(msg, 'error'); return;
  }
  const data = await res.json();
  toast(`${type==='sale'?'🛒 -1':'📦 +1'} ${data.product} → ${data.new_stock}`, 'success');
  load();
}

function chQty(d) {
  const inp = document.getElementById('mm-qty');
  inp.value = Math.max(1,(parseInt(inp.value)||1)+d);
}

function chActual(d) {
  const inp = document.getElementById('mm-actual');
  inp.value = Math.max(0,(parseInt(inp.value)||0)+d);
}

function mmSwitchTab(tab) {
  document.getElementById('mm-tab-adj').classList.toggle('active', tab === 'adj');
  document.getElementById('mm-tab-set').classList.toggle('active', tab === 'set');
  document.getElementById('mm-adj-section').style.display = tab === 'adj' ? '' : 'none';
  document.getElementById('mm-set-section').style.display = tab === 'set' ? '' : 'none';
  if (tab === 'set') {
    const cur = parseInt(document.getElementById('mm-stock').textContent) || 0;
    document.getElementById('mm-actual').value = cur;
  }
}

async function doSetStock() {
  const actual = parseInt(document.getElementById('mm-actual').value);
  if (isNaN(actual) || actual < 0) { toast('Укажи корректное количество', 'error'); return; }
  const note = document.getElementById('mm-set-note').value.trim() || null;
  const res = await fetch(`/api/products/${selectedId}/set-stock`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({actual, note})
  });
  if (!res.ok) {
    let msg = 'Ошибка';
    try { const e = await res.json(); msg = e.detail || msg; } catch {}
    toast(msg, 'error'); return;
  }
  const data = await res.json();
  closeMoveModal();
  const diff = data.delta > 0 ? `+${data.delta}` : data.delta === 0 ? '±0' : `${data.delta}`;
  toast(`✅ ${data.product}: остаток ${data.new_stock} (${diff})`, 'success');
  load();
}

// ── Приёмка ─────────────────────────────────────────────
let receiptItems = []; // [{id, name, sku, qty}]
let receiptTimer = null;

function openReceiptModal() {
  receiptItems = [];
  document.getElementById('receipt-search').value = '';
  document.getElementById('receipt-suggest').style.display = 'none';
  renderReceiptList();
  document.getElementById('receipt-modal').classList.add('open');
  setTimeout(() => document.getElementById('receipt-search').focus(), 100);
}

function closeReceiptModal(e) {
  if (!e || e.target === document.getElementById('receipt-modal'))
    document.getElementById('receipt-modal').classList.remove('open');
}

function receiptSearch() {
  clearTimeout(receiptTimer);
  const q = document.getElementById('receipt-search').value.trim();
  if (q.length < 2) { document.getElementById('receipt-suggest').style.display = 'none'; return; }
  receiptTimer = setTimeout(() => doReceiptSearch(q), 250);
}

async function doReceiptSearch(q) {
  const sug = document.getElementById('receipt-suggest');
  try {
    const res = await fetch(`/api/products/search?q=${encodeURIComponent(q)}`);
    if (!res.ok) return;
    const products = await res.json();
    if (!products.length) { sug.innerHTML = '<div style="padding:8px 12px;font-size:13px;color:var(--text3)">Не найдено</div>'; sug.style.display = 'block'; return; }
    sug.innerHTML = products.slice(0, 8).map(p =>
      `<div class="fdrop-item" data-id="${p.id}" data-name="${encodeURIComponent(p.name)}" data-sku="${p.supplier_article||''}" data-stock="${p.stock||0}">
        <span style="flex:1">${p.name} ${p.supplier_article ? `<span style="font-size:11px;color:var(--text3);font-family:monospace">${p.supplier_article}</span>` : ''}</span>
        <span style="font-size:12px;color:var(--text3)">${p.stock} шт</span>
      </div>`
    ).join('');
    sug.style.display = 'block';
    sug.querySelectorAll('.fdrop-item').forEach(el => {
      el.addEventListener('click', () => {
        addToReceipt(parseInt(el.dataset.id), decodeURIComponent(el.dataset.name), el.dataset.sku, parseInt(el.dataset.stock)||0);
        document.getElementById('receipt-search').value = '';
        sug.style.display = 'none';
      });
    });
  } catch {}
}

function addToReceipt(id, name, sku, currentStock) {
  const existing = receiptItems.find(x => x.id === id);
  if (existing) { existing.qty++; }
  else { receiptItems.push({id, name, sku, currentStock, qty: 1}); }
  renderReceiptList();
}

function removeFromReceipt(id) {
  receiptItems = receiptItems.filter(x => x.id !== id);
  renderReceiptList();
}

function renderReceiptList() {
  const list = document.getElementById('receipt-list');
  const empty = document.getElementById('receipt-empty');
  const footer = document.getElementById('receipt-footer');
  if (!receiptItems.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    footer.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  footer.style.display = 'block';
  list.innerHTML = receiptItems.map(item => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight: var(--fw-semibold);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.name}</div>
        <div style="font-size:11px;color:var(--text3);font-family:monospace">${item.sku ? item.sku + ' · ' : ''}было ${item.currentStock} шт</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <button onclick="receiptChQty(${item.id},-1)" style="width:28px;height:28px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:16px;color:var(--text)">−</button>
        <input type="number" value="${item.qty}" min="1" onchange="receiptSetQty(${item.id},this.value)" style="width:52px;text-align:center;padding:4px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-weight: var(--fw-bold);color:var(--text);background:var(--bg)">
        <button onclick="receiptChQty(${item.id},1)" style="width:28px;height:28px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:16px;color:var(--text)">+</button>
        <button onclick="removeFromReceipt(${item.id})" style="width:28px;height:28px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:14px;color:var(--red)">✕</button>
      </div>
    </div>`).join('');
}

function receiptChQty(id, d) {
  const item = receiptItems.find(x => x.id === id);
  if (item) { item.qty = Math.max(1, item.qty + d); renderReceiptList(); }
}

function receiptSetQty(id, val) {
  const item = receiptItems.find(x => x.id === id);
  if (item) { item.qty = Math.max(1, parseInt(val)||1); renderReceiptList(); }
}

async function submitReceipt() {
  if (!receiptItems.length) return;
  const note = document.getElementById('receipt-note').value.trim() || 'Приёмка товара';
  const btn = document.querySelector('#receipt-footer .btn-submit');
  btn.textContent = '⏳ Сохранение...';
  btn.disabled = true;
  let errors = 0;
  for (const item of receiptItems) {
    try {
      const res = await fetch(`/api/products/${item.id}/movement`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({quantity: item.qty, type:'income', source:'web', note})
      });
      if (!res.ok) errors++;
    } catch { errors++; }
  }
  closeReceiptModal();
  if (errors) toast(`⚠️ Принято с ошибками (${errors} не удалось)`, 'error');
  else toast(`✅ Принято ${receiptItems.length} позиций`, 'success');
  load();
}

// ── Brand suggest ────────────────────────────────────────
function getBrandList() {
  const map = new Map();
  allProducts.forEach(p => {
    if (p.brand) {
      const norm = getBrand(p);
      if (!map.has(norm)) map.set(norm, norm);
    }
  });
  return [...map.keys()].sort();
}

function showBrandList() {
  filterBrandList(document.getElementById('em-brand').value);
}

function filterBrandList(q) {
  const box = document.getElementById('brand-suggest');
  const brands = getBrandList();
  const filtered = q ? brands.filter(b => b.toLowerCase().includes(q.toLowerCase())) : brands;
  if (!filtered.length && !q) { box.style.display = 'none'; return; }
  const rows = filtered.map(b => `<div class="fdrop-item" onmousedown="pickBrand('${b.replace(/'/g,"&#39;")}')">${b}</div>`).join('');
  const addRow = q && !brands.some(b => b.toLowerCase() === q.toLowerCase())
    ? `<div class="fdrop-item" style="color:#6366f1;font-weight: var(--fw-semibold)" onmousedown="pickBrand('${q.replace(/'/g,"&#39;")}')">+ Добавить «${q}»</div>`
    : '';
  box.innerHTML = rows + addRow;
  box.style.display = (rows || addRow) ? 'block' : 'none';
}

function pickBrand(val) {
  document.getElementById('em-brand').value = val;
  hideBrandList();
}

function hideBrandList() {
  document.getElementById('brand-suggest').style.display = 'none';
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 1800;
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

// ── Toast ───────────────────────────────────────────────
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.className='toast', 3000);
}

restoreFilters();
load().then(() => {
  // Если пришли со сканера с неизвестным штрихкодом — сразу открыть модал
  const params = new URLSearchParams(location.search);
  if (params.get('open_add')) {
    openAddModal(params.get('barcode') || '');
    history.replaceState({}, '', '/');
  }
  if (params.get('open')) {
    const pid = parseInt(params.get('open'));
    if (pid) { openEditModal(pid); history.replaceState({}, '', '/admin'); }
  }
});
setInterval(load, 30000);
</script>
