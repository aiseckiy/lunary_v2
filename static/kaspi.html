<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaspi — Lunary</title>
<style>
/* Page header row */
.page-header-row { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; gap:12px; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:20px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
.stat-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; font-weight:600; margin-bottom:6px; }
.stat-value { font-size:28px; font-weight:800; color:var(--text); word-break:break-all; overflow-wrap:break-word; line-height:1.1; }
@media (max-width:600px) { .stat-value { font-size:18px; } }
.stat-value.purple { color:var(--accent); }
.stat-value.green { color:var(--green); }
.stat-value.red { color:var(--red); }

/* Status tabs */
.status-tabs { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.status-tabs::-webkit-scrollbar { display:none; }
.stab { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:7px 14px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; white-space:nowrap; transition:all .15s; display:flex; align-items:center; gap:5px; }
.stab:hover { border-color:#d1d5db; color:var(--text); }
.stab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.stab .cnt { background:rgba(0,0,0,.07); border-radius:10px; padding:1px 7px; font-size:11px; font-weight:700; }
.stab.active .cnt { background:rgba(255,255,255,.25); }

/* Orders header */
.orders-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.orders-count { font-size:14px; font-weight:600; color:var(--text); }
.orders-sum { font-size:14px; color:var(--green); font-weight:700; }
.orders-info { display:flex; align-items:center; gap:12px; }

/* Order cards */
.order-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:10px; transition:box-shadow .15s, border-color .15s; border-left:4px solid var(--border); }
.order-card:hover { border-color:#d1d5db; box-shadow:0 2px 10px rgba(0,0,0,.06); }
.order-card.order-active { border-left-color:#22c55e; }
.order-card.order-done   { border-left-color:#9ca3af; }
.order-card.order-cancelled { border-left-color:#ef4444; }
.order-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.order-left { flex:1; min-width:0; }
.order-id { font-size:14px; font-weight:700; color:var(--text); }
.order-customer { font-size:13px; color:var(--text2); margin-top:2px; }
.order-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
.order-total-top { font-size:16px; font-weight:800; color:var(--text); }
.order-badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600; white-space:nowrap; }
.badge-accepted { background:#ede9fe; color:var(--accent); }
.badge-completed { background:#dcfce7; color:var(--green); }
.badge-cancelled { background:#fee2e2; color:var(--red); }
.badge-delivery { background:#ffedd5; color:var(--orange); }
.badge-pickup { background:#fef9c3; color:var(--yellow); }

.order-items { border-top:1px solid var(--border2); margin-top:12px; padding-top:12px; }
.order-item { display:flex; justify-content:space-between; align-items:center; padding:5px 0; gap:8px; }
.item-name { font-size:13px; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:260px; }
.item-link { color:var(--accent); text-decoration:none; cursor:pointer; }
.item-link:hover { text-decoration:underline; }

/* Product modal */
.pmodal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
.pmodal-overlay.open { display:flex; }
.pmodal { background:#fff; border-radius:14px; width:100%; max-width:400px; padding:24px; box-shadow:0 8px 40px rgba(0,0,0,.18); }
.pmodal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.pmodal-name { font-size:16px; font-weight:700; color:var(--text); line-height:1.3; flex:1; padding-right:12px; }
.pmodal-close { font-size:20px; color:var(--text3); cursor:pointer; line-height:1; }
.pmodal-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border2); font-size:14px; }
.pmodal-row:last-child { border-bottom:none; }
.pmodal-label { color:var(--text2); }
.pmodal-val { font-weight:600; color:var(--text); }
.pmodal-stock { font-size:28px; font-weight:800; }
.pmodal-stock.ok { color:var(--green); }
.pmodal-stock.low { color:var(--red); }
.item-sku { font-size:11px; color:var(--text3); font-family:monospace; margin-top:1px; }
.item-qty { font-size:12px; font-weight:700; color:var(--accent); white-space:nowrap; }
.item-price { font-size:12px; color:var(--text3); white-space:nowrap; }

.order-address { font-size:12px; color:var(--text2); margin-top:8px; }
.order-cancel { font-size:12px; color:var(--red); margin-top:6px; }
.order-meta-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.order-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid var(--border2); }
.order-meta { font-size:11px; color:var(--text3); }
.order-date-time { font-size:12px; color:var(--text3); }

.src-xml  { font-size:10px; color:var(--text3); background:var(--bg); border-radius:4px; padding:1px 6px; }
.src-sync { font-size:10px; color:#6366f1; background:#ede9fe; border-radius:4px; padding:1px 6px; }

/* Pagination */
.pagination { display:flex; align-items:center; justify-content:center; gap:6px; padding:20px 0 8px; flex-wrap:wrap; }
.page-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:7px 13px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; transition:all .15s; font-family:inherit; }
.page-btn:hover { border-color:#d1d5db; color:var(--text); }
.page-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
.page-btn:disabled { opacity:.4; cursor:default; }
.page-info { font-size:13px; color:var(--text3); padding:0 6px; }

/* Sync log */
.sync-log-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-top:28px; }
.sync-log-title { font-size:15px; font-weight:700; margin-bottom:14px; color:var(--text); }
.sync-log-table { width:100%; border-collapse:collapse; font-size:13px; }
.sync-log-table th { text-align:left; padding:6px 10px; font-size:11px; color:var(--text3); border-bottom:2px solid var(--border); font-weight:600; white-space:nowrap; }
.sync-log-table td { padding:7px 10px; border-bottom:1px solid var(--border2); vertical-align:middle; }
.sync-log-table tr:last-child td { border-bottom:none; }
.sync-log-table tr.log-error td { color:var(--red); }
.log-num { font-weight:700; color:var(--accent); }
.log-added { color:var(--green); font-weight:600; }
.log-return { color:var(--orange); font-weight:600; }
.log-deducted { color:var(--accent); font-weight:600; }
.error-box { background:#fee2e2; border:1px solid #fca5a5; border-radius:12px; padding:16px; color:var(--red); font-size:14px; }
@media (max-width: 768px) {
  .order-card { padding: 14px !important; }
  .order-header { flex-wrap: wrap; gap: 6px; }
  .order-id { font-size: 13px !important; }
  .ppill { font-size: 12px !important; padding: 5px 10px !important; }
  .period-pills { gap: 6px !important; }
  .form-input { font-size: 16px !important; }
}
</style>
<link rel="stylesheet" href="/static/layout.css">
<script src="/static/datepicker.js"></script>
</head>
<body>
<div class="app-shell">

<aside class="sidebar" id="sidebar"></aside>

<div class="mobile-header">
  <div class="mobile-logo">Lunary <span>OS</span></div>
  <div class="mobile-header-actions" style="display:flex;gap:8px;align-items:center">
    <button class="mobile-scan-btn" onclick="openQuickScan()">📷</button>
  </div>
</div>

<div class="main-content">
<div class="page-container">
  <div class="page-header-row">
    <div>
      <div class="page-title">Kaspi заказы</div>
      <div class="page-sub">Синхронизация с Kaspi.kz</div>
    </div>
    <a class="btn btn-secondary" id="export-btn" href="/api/kaspi/orders/export" download>⬇ Экспорт CSV</a>
  </div>

  <div id="stats-row" class="stats-row"></div>

  <div style="margin-bottom:16px;">
    <button class="ppill" id="dp-trigger" style="display:inline-flex;align-items:center;gap:6px;">📅 Сегодня</button>
  </div>

  <div class="status-tabs" id="status-tabs">
    <div class="stab active" onclick="setStatus('')" data-s="">📋 Все</div>
    <div class="stab" onclick="setStatus('NEW')" data-s="NEW">🟡 Новые</div>
    <div class="stab" onclick="setStatus('DELIVERY')" data-s="DELIVERY">🚛 Доставка</div>
    <div class="stab" onclick="setStatus('KASPI_DELIVERY')" data-s="KASPI_DELIVERY">🚚 Kaspi</div>
    <div class="stab" onclick="setStatus('PICKUP')" data-s="PICKUP">🏪 Самовывоз</div>
    <div class="stab" onclick="setStatus('ARCHIVE')" data-s="ARCHIVE">✅ Архив</div>
    <div class="stab" onclick="setStatus('CANCELLED')" data-s="CANCELLED">❌ Отменены</div>
    <div class="stab" onclick="setStatus('RETURN')" data-s="RETURN">↩️ Возврат</div>
  </div>

  <div class="orders-meta">
    <div class="orders-info">
      <span class="orders-count" id="orders-count">—</span>
      <span class="orders-sum" id="orders-sum"></span>
    </div>
    <button class="btn btn-secondary" onclick="loadOrders()">↻ Обновить</button>
  </div>

  <div id="orders-container">
    <div class="loading"><div class="spinner"></div><br>Загрузка...</div>
  </div>
  <div id="pagination-top"></div>
  <div id="orders-list"></div>
  <div id="pagination-bot"></div>

  <!-- Лог синхронизаций -->
  <div class="sync-log-card">
    <div style="margin-bottom:14px">
      <div class="sync-log-title" style="margin-bottom:0">🔄 История синхронизаций с Kaspi</div>
    </div>
    <div id="sync-log-body" style="color:var(--text3);font-size:13px">Загрузка...</div>
  </div>
</div></div></div>

<!-- Product card modal -->
<div class="pmodal-overlay" id="pmodal-overlay" onclick="if(event.target===this)closePModal()">
  <div class="pmodal">
    <div class="pmodal-header">
      <div class="pmodal-name" id="pmodal-name">—</div>
      <div class="pmodal-close" onclick="closePModal()">✕</div>
    </div>
    <div id="pmodal-body"></div>
  </div>
</div>

<nav id="bottom-nav"></nav>

<script>
let currentStatus = '';
let dateFrom = null;
let dateTo = null;
let allOrders = [];
let dp;
const PAGE_SIZE = 80;
let currentPage = 1;

document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  // Восстанавливаем сохранённое состояние
  const saved = JSON.parse(sessionStorage.getItem('lunary_kaspi_state') || 'null');
  dateFrom = saved?.dateFrom || fmt(now);
  dateTo   = saved?.dateTo   || fmt(now);
  if (saved?.status) {
    currentStatus = saved.status;
    document.querySelectorAll('.stab').forEach(el => el.classList.toggle('active', el.dataset.s === currentStatus));
  }

  dp = new DateRangePicker({
    trigger: '#dp-trigger',
    onApply: (from, to) => {
      dateFrom = from;
      dateTo = to;
      saveKaspiState();
      loadOrders();
    }
  });
  dp.setRange(dateFrom, dateTo);
  loadOrders();
});

function saveKaspiState() {
  sessionStorage.setItem('lunary_kaspi_state', JSON.stringify({ dateFrom, dateTo, status: currentStatus }));
}

const ACTIVE_STATES    = new Set(['NEW','ACCEPTED','DELIVERY','KASPI_DELIVERY','PICKUP','SIGN_REQUIRED']);
const DONE_STATES      = new Set(['ARCHIVE','COMPLETED','Выдан']);
const CANCELLED_STATES = new Set(['CANCELLED','RETURN','Отменен','Возврат']);

function orderCardClass(state) {
  if (ACTIVE_STATES.has(state))    return 'order-active';
  if (DONE_STATES.has(state))      return 'order-done';
  if (CANCELLED_STATES.has(state)) return 'order-cancelled';
  return 'order-done'; // неизвестный статус — серый
}

const STATE_LABELS = {
  NEW:'Новый', ACCEPTED:'Новый', COMPLETED:'Выполнен', CANCELLED:'Отменён',
  KASPI_DELIVERY:'Kaspi Доставка', DELIVERY:'Доставка', PICKUP:'Самовывоз',
  ARCHIVE:'Архив', SIGN_REQUIRED:'Нужна подпись', RETURN:'Возврат',
};
const STATE_BADGE = {
  NEW:'badge-accepted', ACCEPTED:'badge-accepted', COMPLETED:'badge-completed',
  CANCELLED:'badge-cancelled', KASPI_DELIVERY:'badge-delivery', DELIVERY:'badge-delivery',
  PICKUP:'badge-pickup', ARCHIVE:'badge-completed', SIGN_REQUIRED:'badge-pickup', RETURN:'badge-cancelled',
};
const DELIVERY_LABELS = {
  DELIVERY_LOCAL:'🚛 По городу', DELIVERY_PICKUP:'🏪 Самовывоз',
  DELIVERY_REGIONAL_TODOOR:'🚚 Kaspi Доставка', DELIVERY_REGIONAL_PICKUP:'📦 До склада',
};
const PAYMENT_LABELS = {
  PAY_WITH_CREDIT:'💳 Кредит', PREPAID:'💳 Безналичная',
};

function setStatus(s) {
  currentStatus = s;
  document.querySelectorAll('.stab').forEach(el => el.classList.toggle('active', el.dataset.s === s));
  const url = s ? `/api/kaspi/orders/export?state=${s}` : '/api/kaspi/orders/export';
  document.getElementById('export-btn').href = url;
  saveKaspiState();
  loadOrders();
}

async function loadOrders() {
  const container = document.getElementById('orders-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>Загрузка...</div>';
  try {
    const params = new URLSearchParams({ limit: 2000 });
    if (currentStatus) params.set('state', currentStatus);
    if (dateFrom) params.set('date_from', dateFrom);
    if (dateTo) params.set('date_to', dateTo);
    const url = `/api/kaspi/orders/local?${params}`;
    const data = await fetch(url).then(r => r.json());
    if (data.error) { container.innerHTML = `<div class="error-box">⚠️ ${data.error}</div>`; return; }

    // Обновить счётчики на вкладках
    if (data.state_counts) updateTabCounts(data.state_counts);

    const orders = data.orders || [];
    allOrders = orders;
    currentPage = 1;
    renderStats(orders, data.total);
    renderOrders(orders);
  } catch(e) {
    container.innerHTML = `<div class="error-box">⚠️ Ошибка: ${e.message}</div>`;
  }
}

function updateTabCounts(counts) {
  document.querySelectorAll('.stab').forEach(tab => {
    const s = tab.dataset.s;
    if (!s) return;
    const n = counts[s] || 0;
    let badge = tab.querySelector('.cnt');
    if (n > 0) {
      if (!badge) { badge = document.createElement('span'); badge.className = 'cnt'; tab.appendChild(badge); }
      badge.textContent = n;
    } else if (badge) {
      badge.remove();
    }
  });
}

function renderStats(orders, total) {
  const revenue = orders.reduce((s,o) => s + (o.total||0), 0);
  const qty = orders.reduce((s,o) => s + (o.entries||[]).reduce((a,e) => a+(e.qty||0), 0), 0);
  document.getElementById('orders-count').textContent = `${total.toLocaleString('ru')} заказов`;
  document.getElementById('orders-sum').textContent = revenue ? `· ${revenue.toLocaleString('ru')} ₸` : '';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-label">Показано</div><div class="stat-value purple">${orders.length.toLocaleString('ru')}</div></div>
    <div class="stat"><div class="stat-label">Выручка</div><div class="stat-value green">${revenue.toLocaleString('ru')} ₸</div></div>
    <div class="stat"><div class="stat-label">Позиций</div><div class="stat-value">${qty.toLocaleString('ru')}</div></div>
    <div class="stat"><div class="stat-label">Ср. чек</div><div class="stat-value">${orders.length ? Math.round(revenue/orders.length).toLocaleString('ru') : 0} ₸</div></div>
  `;
}

function buildEntriesHtml(entries) {
  if (!entries || !entries.length) return '';
  return entries.map(e => {
    const nameHtml = e.product_id
      ? `<span class="item-name item-link" data-pid="${e.product_id}">${e.name||'—'} ↗</span>`
      : `<div class="item-name">${e.name||'—'}</div>`;
    const skuHtml = e.sku && e.sku !== 'undefined' ? `<div class="item-sku">${e.sku}</div>` : '';
    return `<div class="order-item">
      <div style="flex:1">${nameHtml}${skuHtml}</div>
      <div class="item-qty">${e.qty||1} шт</div>
      <div class="item-price">${(e.basePrice||e.price||0).toLocaleString('ru')} ₸</div>
    </div>`;
  }).join('');
}

function buildOrderCard(o) {
  const badge = STATE_BADGE[o.state] || 'badge-accepted';
  const label = STATE_LABELS[o.state] || o.state;
  const dateStr = formatDate(o.date);
  const entriesHtml = buildEntriesHtml(o.entries);
  const deliveryLabel = DELIVERY_LABELS[o.delivery_method] || o.delivery_method || '';
  const paymentLabel = PAYMENT_LABELS[o.payment_method] || '';
  const src = o.source === 'xml_import'
    ? '<span class="src-xml">📂 XML архив</span>'
    : (o.synced_at ? `<span class="src-sync">🔄 ${o.synced_at}</span>` : '<span class="src-sync">🔄 Kaspi API</span>');
  const addressHtml = o.address ? `<div class="order-address">📍 ${o.address}</div>` : '';
  const cancelHtml = o.cancel_reason ? `<div class="order-cancel">❌ ${o.cancel_reason}</div>` : '';
  const metaHtml = (deliveryLabel || paymentLabel) ? `
    <div class="order-meta-row">
      ${deliveryLabel ? `<span class="order-meta">${deliveryLabel}</span>` : ''}
      ${paymentLabel ? `<span class="order-meta">${paymentLabel}</span>` : ''}
    </div>` : '';
  return `
    <div class="order-card ${orderCardClass(o.state)}">
      <div class="order-top">
        <div class="order-left">
          <div class="order-id">#${o.id}</div>
          <div class="order-customer">${o.customer || 'Покупатель'}</div>
        </div>
        <div class="order-right">
          <div class="order-total-top">${(o.total||0).toLocaleString('ru')} ₸</div>
          <span class="order-badge ${badge}">${label}</span>
        </div>
      </div>
      <div class="order-items">${entriesHtml || '<span style="font-size:12px;color:var(--text3)">—</span>'}</div>
      ${addressHtml}${cancelHtml}${metaHtml}
      <div class="order-footer">
        <div>${src}</div>
        <div class="order-date-time">${dateStr}</div>
      </div>
    </div>`;
}

function renderPagination(total, page, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) { el.innerHTML = ''; return; }
  const from = (page - 1) * PAGE_SIZE + 1;
  const to = Math.min(page * PAGE_SIZE, total);
  let html = `<div class="pagination">`;
  html += `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>← Назад</button>`;
  const start = Math.max(1, page - 3);
  const end = Math.min(pages, start + 6);
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span class="page-info">…</span>':''}`;
  for (let i = start; i <= end; i++)
    html += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end < pages) html += `${end<pages-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>Вперёд →</button>`;
  html += `<span class="page-info">${from}–${to} из ${total}</span></div>`;
  el.innerHTML = html;
}

function goPage(page) {
  const pages = Math.ceil(allOrders.length / PAGE_SIZE);
  if (page < 1 || page > pages) return;
  currentPage = page;
  renderOrders(allOrders);
  document.getElementById('orders-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderOrders(orders) {
  const container = document.getElementById('orders-container');
  const list = document.getElementById('orders-list');
  container.innerHTML = '';
  if (!orders.length) {
    list.innerHTML = '<div class="empty">📭 Заказов нет</div>';
    document.getElementById('pagination-top').innerHTML = '';
    document.getElementById('pagination-bot').innerHTML = '';
    return;
  }
  const pageSlice = orders.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  list.innerHTML = pageSlice.map(buildOrderCard).join('');
  renderPagination(orders.length, currentPage, 'pagination-top');
  renderPagination(orders.length, currentPage, 'pagination-bot');
}

function formatDate(val) {
  if (!val) return '—';
  // dd.mm.yyyy формат (XML)
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(val)) return val;
  // Unix timestamp (API)
  try {
    const num = Number(val);
    const d = new Date(num > 1e10 ? num : num * 1000);
    if (isNaN(d.getTime())) return val;
    return d.toLocaleString('ru', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch { return val; }
}

// Делегированный обработчик для item-link (безопасно, без inline onclick)
document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-pid]');
  if (el) openPModal(parseInt(el.dataset.pid));
});

async function openPModal(id) {
  document.getElementById('pmodal-name').textContent = 'Загрузка...';
  document.getElementById('pmodal-body').innerHTML = '';
  document.getElementById('pmodal-overlay').classList.add('open');
  try {
    const res = await fetch(`/api/products/${id}`);
    if (!res.ok) throw new Error('Статус ' + res.status);
    const data = await res.json();
    const p = data.product || data;
    document.getElementById('pmodal-name').textContent = p.name || '—';
    const stockClass = p.low ? 'low' : 'ok';
    document.getElementById('pmodal-body').innerHTML = `
      <div class="pmodal-row" style="margin-bottom:8px">
        <span class="pmodal-label">Остаток</span>
        <span class="pmodal-stock ${stockClass}">${p.stock ?? '—'} ${p.unit || 'шт'}</span>
      </div>
      ${p.sku ? `<div class="pmodal-row"><span class="pmodal-label">Артикул</span><span class="pmodal-val" style="font-family:monospace">${p.sku}</span></div>` : ''}
      ${p.kaspi_sku ? `<div class="pmodal-row"><span class="pmodal-label">Kaspi SKU</span><span class="pmodal-val" style="font-family:monospace;font-size:12px">${p.kaspi_sku}</span></div>` : ''}
      ${p.category ? `<div class="pmodal-row"><span class="pmodal-label">Категория</span><span class="pmodal-val">${p.category}</span></div>` : ''}
      ${p.price ? `<div class="pmodal-row"><span class="pmodal-label">Цена</span><span class="pmodal-val">${Number(p.price).toLocaleString('ru')} ₸</span></div>` : ''}
      ${p.min_stock != null ? `<div class="pmodal-row"><span class="pmodal-label">Мин. остаток</span><span class="pmodal-val">${p.min_stock}</span></div>` : ''}
      <div style="margin-top:16px">
        <a href="/admin?open=${p.id}" style="display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;text-align:center;text-decoration:none">✏️ Редактировать карточку</a>
      </div>
    `;
  } catch(e) {
    document.getElementById('pmodal-body').innerHTML = `<div style="color:var(--red)">Ошибка загрузки</div>`;
  }
}

function closePModal() {
  document.getElementById('pmodal-overlay').classList.remove('open');
}

async function loadSyncLog() {
  const el = document.getElementById('sync-log-body');
  try {
    const rows = await fetch('/api/admin/kaspi/sync-log').then(r => r.json());
    if (!rows || !rows.length) { el.textContent = 'Синхронизаций пока нет'; return; }
    el.innerHTML = `<table class="sync-log-table">
      <thead><tr>
        <th>Время</th><th>Найдено</th><th>Новых</th><th>Обновлено</th><th>Списаний</th><th>Возвратов</th><th>Ошибка</th>
      </tr></thead>
      <tbody>${rows.map(r => `
        <tr class="${r.error ? 'log-error' : ''}">
          <td style="white-space:nowrap;color:var(--text2)">${r.synced_at || '—'}</td>
          <td class="log-num">${r.total_found}</td>
          <td class="${r.added ? 'log-added' : ''}">${r.added || 0}</td>
          <td>${r.updated || 0}</td>
          <td class="${r.deducted ? 'log-deducted' : ''}">${r.deducted || 0}</td>
          <td class="${r.returns ? 'log-return' : ''}">${r.returns || 0}</td>
          <td style="font-size:11px;color:var(--red)">${r.error || ''}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  } catch(e) {
    el.textContent = 'Не удалось загрузить лог';
  }
}


loadSyncLog();
</script>
