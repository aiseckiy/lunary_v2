<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kaspi — Lunary</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:transparent; color:#111827; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding-bottom:80px; }

header { padding:14px 20px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:transparent; z-index:50; }
.logo { font-size:18px; font-weight:800; color:#fff; }
.logo span { color:#6366f1; }
.header-links { display:flex; gap:8px; }
.hlink { background:#ffffff; border:1px solid #e5e7eb; border-radius:8px; padding:6px 12px; font-size:13px; color:#6b7280; text-decoration:none; }
.hlink:hover { border-color:#6366f1; color:#6366f1; }

.container { max-width:900px; margin:0 auto; padding:16px 20px; }

.page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; gap:12px; }
.page-title { font-size:22px; font-weight:800; }
.page-sub { font-size:13px; color:#9ca3af; margin-top:3px; }
.btn-export { background:#ffffff; border:1px solid #e5e7eb; border-radius:10px; padding:9px 16px; font-size:13px; color:#6b7280; cursor:pointer; white-space:nowrap; transition:all .15s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
.btn-export:hover { border-color:#6366f1; color:#6366f1; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; margin-bottom:20px; }
.stat { background:#ffffff; border:1px solid #e5e7eb; border-radius:12px; padding:14px 16px; }
.stat-label { font-size:11px; color:#9ca3af; text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; }
.stat-value { font-size:22px; font-weight:800; }
.stat-value.purple { color:#6366f1; }
.stat-value.green { color:#22c55e; }
.stat-value.red { color:#ef4444; }

/* Tabs */
.status-tabs { display:flex; gap:6px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.status-tabs::-webkit-scrollbar { display:none; }
.stab { background:#ffffff; border:1px solid #e5e7eb; border-radius:20px; padding:7px 14px; font-size:13px; color:#9ca3af; cursor:pointer; white-space:nowrap; transition:all .15s; display:flex; align-items:center; gap:5px; }
.stab.active { background:#6366f1; border-color:#6366f1; color:#fff; }
.stab .cnt { background:#f3f4f6; border-radius:10px; padding:1px 7px; font-size:11px; font-weight:700; }
.stab.active .cnt { background:#ffffff30; }

/* Orders header */
.orders-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.orders-count { font-size:14px; font-weight:600; }
.orders-sum { font-size:14px; color:#22c55e; font-weight:700; }
.orders-info { display:flex; align-items:center; gap:12px; }
.btn-refresh { background:#f3f4f6; border:1px solid #e5e7eb; border-radius:8px; padding:7px 14px; color:#6b7280; font-size:13px; cursor:pointer; transition:all .15s; }
.btn-refresh:hover { background:#e5e7eb; }

/* Cards */
.order-card { background:#ffffff; border:1px solid #e5e7eb; border-radius:14px; padding:18px; margin-bottom:10px; transition:border-color .15s; }
.order-card:hover { border-color:#e5e7eb; }
.order-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.order-left { flex:1; }
.order-id { font-size:14px; font-weight:700; color:#111827; }
.order-customer { font-size:13px; color:#6b7280; margin-top:2px; }
.order-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; }
.order-total-top { font-size:16px; font-weight:800; color:#111827; }
.order-badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600; white-space:nowrap; }
.badge-accepted { background:#6366f11a; color:#6366f1; border:1px solid #6366f130; }
.badge-completed { background:#22c55e1a; color:#22c55e; border:1px solid #22c55e30; }
.badge-cancelled { background:#ef44441a; color:#ef4444; border:1px solid #ef444430; }
.badge-delivery { background:#f9731620; color:#f97316; border:1px solid #f9731630; }
.badge-pickup { background:#eab3081a; color:#eab308; border:1px solid #eab30830; }

.order-items { border-top:1px solid #e5e7eb; margin-top:12px; padding-top:12px; }
.order-item { display:flex; justify-content:space-between; align-items:center; padding:5px 0; gap:8px; }
.item-name { font-size:13px; color:#111827; flex:1; }
.item-sku { font-size:11px; color:#9ca3af; font-family:monospace; margin-top:1px; }
.item-qty { font-size:12px; font-weight:700; color:#6366f1; white-space:nowrap; }
.item-price { font-size:12px; color:#9ca3af; white-space:nowrap; }

.order-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid #f9fafb; }
.order-meta { font-size:11px; color:#9ca3af; }
.order-date-time { font-size:12px; color:#9ca3af; }

/* Source badge */
.src-xml { font-size:10px; color:#9ca3af; background:#f3f4f6; border-radius:4px; padding:1px 6px; }
.src-api { font-size:10px; color:#6366f150; }

/* Loading/empty */
.loading { text-align:center; padding:50px 20px; color:#9ca3af; }
.spinner { display:inline-block; width:24px; height:24px; border:2px solid #f3f4f6; border-top-color:#6366f1; border-radius:50%; animation:spin .8s linear infinite; margin-bottom:10px; }
@keyframes spin { to{transform:rotate(360deg)} }
.empty { text-align:center; padding:50px 20px; color:#9ca3af; font-size:14px; }
.error-box { background:#ef44441a; border:1px solid #ef444430; border-radius:12px; padding:16px; color:#ef4444; font-size:14px; }

/* Bottom nav */
.app-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:#ffffff; border-top:1px solid #e5e7eb; z-index:200; }
.nav-items { display:flex; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 4px 12px; text-decoration:none; color:#9ca3af; font-size:10px; gap:2px; transition:color .15s; }
.nav-item.cur { color:#6366f1; }
.nav-icon { font-size:22px; line-height:1; }
@media(max-width:768px) { .app-nav{display:block;} .header-links{display:none;} }
</style>
<link rel="stylesheet" href="/static/layout.css">
</head>
<body>
<div class="app-shell">

<aside class="sidebar">
  <div class="sidebar-logo">Lunary <span>OS</span></div>
  <div class="sidebar-section">Меню</div>
  <a class="nav-link" href="/">🏠 Склад</a>
  <a class="nav-link" href="/scanner">📷 Сканер</a>
  <a class="nav-link" href="/history">📋 История</a>
  <a class="nav-link" href="/analytics">📊 Аналитика</a>
  <a class="nav-link active" href="/kaspi">🛒 Kaspi</a>
  <div class="sidebar-spacer"></div>
  <div class="sidebar-footer">Lunary OS v2</div>
</aside>

<div class="mobile-header">
  <div class="mobile-logo">Lunary <span>OS</span></div>
</div>

<div class="main-content">
<div class="page-container">
  <div class="page-header">
    <div>
      <div class="page-title">🛒 Kaspi заказы</div>
      <div class="page-sub">Все заказы из Kaspi.kz</div>
    </div>
    <a class="btn-export" id="export-btn" href="/api/kaspi/orders/export" download>
      ⬇️ Экспорт CSV
    </a>
  </div>

  <div id="stats-row" class="stats-row"></div>

  <div class="status-tabs" id="status-tabs">
    <div class="stab active" onclick="setStatus('')" data-s="">📋 Все</div>
    <div class="stab" onclick="setStatus('NEW')" data-s="NEW">🟡 Новые</div>
    <div class="stab" onclick="setStatus('DELIVERY')" data-s="DELIVERY">🚛 Доставка</div>
    <div class="stab" onclick="setStatus('KASPI_DELIVERY')" data-s="KASPI_DELIVERY">🚚 Kaspi</div>
    <div class="stab" onclick="setStatus('PICKUP')" data-s="PICKUP">🏪 Самовывоз</div>
    <div class="stab" onclick="setStatus('ARCHIVE')" data-s="ARCHIVE">✅ Архив</div>
    <div class="stab" onclick="setStatus('CANCELLED')" data-s="CANCELLED">❌ Отменены</div>
    <div class="stab" onclick="setStatus('RETURN')" data-s="RETURN">↩️ Возврат</div>
  </div>

  <div class="orders-meta">
    <div class="orders-info">
      <span class="orders-count" id="orders-count">—</span>
      <span class="orders-sum" id="orders-sum"></span>
    </div>
    <button class="btn-refresh" onclick="loadOrders()">🔄 Обновить</button>
  </div>

  <div id="orders-container">
    <div class="loading"><div class="spinner"></div><br>Загрузка...</div>
  </div>
</div></div></div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="bnav-item" href="/">🏠 Склад</a>
    <a class="bnav-item" href="/scanner">📷 Сканер</a>
    <a class="bnav-item" href="/history">📋 История</a>
    <a class="bnav-item" href="/analytics">📊 Аналитика</a>
    <a class="bnav-item active" href="/kaspi">🛒 Kaspi</a>
  </div>
</nav>

<script>
let currentStatus = '';
let allOrders = [];

const STATE_LABELS = {
  NEW:'Новый', ACCEPTED:'Новый', COMPLETED:'Выполнен', CANCELLED:'Отменён',
  KASPI_DELIVERY:'Kaspi', DELIVERY:'Доставка', PICKUP:'Самовывоз',
  ARCHIVE:'Архив', SIGN_REQUIRED:'Подпись', RETURN:'Возврат',
};
const STATE_BADGE = {
  NEW:'badge-accepted', ACCEPTED:'badge-accepted', COMPLETED:'badge-completed',
  CANCELLED:'badge-cancelled', KASPI_DELIVERY:'badge-delivery', DELIVERY:'badge-delivery',
  PICKUP:'badge-pickup', ARCHIVE:'badge-completed', SIGN_REQUIRED:'badge-pickup', RETURN:'badge-cancelled',
};

function setStatus(s) {
  currentStatus = s;
  document.querySelectorAll('.stab').forEach(el => el.classList.toggle('active', el.dataset.s === s));
  const url = s ? `/api/kaspi/orders/export?state=${s}` : '/api/kaspi/orders/export';
  document.getElementById('export-btn').href = url;
  loadOrders();
}

async function loadOrders() {
  const container = document.getElementById('orders-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>Загрузка...</div>';
  try {
    const url = currentStatus ? `/api/kaspi/orders/local?state=${currentStatus}&limit=500` : '/api/kaspi/orders/local?limit=500';
    const data = await fetch(url).then(r => r.json());
    if (data.error) { container.innerHTML = `<div class="error-box">⚠️ ${data.error}</div>`; return; }

    // Обновить счётчики на вкладках
    if (data.state_counts) updateTabCounts(data.state_counts);

    const orders = data.orders || [];
    allOrders = orders;
    renderStats(orders, data.total);
    renderOrders(orders);
  } catch(e) {
    container.innerHTML = `<div class="error-box">⚠️ Ошибка: ${e.message}</div>`;
  }
}

function updateTabCounts(counts) {
  document.querySelectorAll('.stab').forEach(tab => {
    const s = tab.dataset.s;
    if (!s) return;
    const n = counts[s] || 0;
    let badge = tab.querySelector('.cnt');
    if (n > 0) {
      if (!badge) { badge = document.createElement('span'); badge.className = 'cnt'; tab.appendChild(badge); }
      badge.textContent = n;
    } else if (badge) {
      badge.remove();
    }
  });
}

function renderStats(orders, total) {
  const revenue = orders.reduce((s,o) => s + (o.total||0), 0);
  const qty = orders.reduce((s,o) => s + (o.entries||[]).reduce((a,e) => a+(e.qty||0), 0), 0);
  document.getElementById('orders-count').textContent = `${total.toLocaleString('ru')} заказов`;
  document.getElementById('orders-sum').textContent = revenue ? `· ${revenue.toLocaleString('ru')} ₸` : '';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-label">Показано</div><div class="stat-value purple">${orders.length.toLocaleString('ru')}</div></div>
    <div class="stat"><div class="stat-label">Выручка</div><div class="stat-value green">${revenue.toLocaleString('ru')} ₸</div></div>
    <div class="stat"><div class="stat-label">Позиций</div><div class="stat-value">${qty.toLocaleString('ru')}</div></div>
    <div class="stat"><div class="stat-label">Ср. чек</div><div class="stat-value">${orders.length ? Math.round(revenue/orders.length).toLocaleString('ru') : 0} ₸</div></div>
  `;
}

function renderOrders(orders) {
  const container = document.getElementById('orders-container');
  if (!orders.length) { container.innerHTML = '<div class="empty">📭 Заказов нет</div>'; return; }

  container.innerHTML = orders.map(o => {
    const badge = STATE_BADGE[o.state] || 'badge-accepted';
    const label = STATE_LABELS[o.state] || o.state;
    const dateStr = formatDate(o.date);
    const entries = (o.entries||[]).map(e => `
      <div class="order-item">
        <div style="flex:1">
          <div class="item-name">${e.name||'—'}</div>
          ${e.sku && e.sku !== 'undefined' ? `<div class="item-sku">${e.sku}</div>` : ''}
        </div>
        <div class="item-qty">${e.qty||1} шт</div>
        <div class="item-price">${((e.basePrice||e.price||0)).toLocaleString('ru')} ₸</div>
      </div>`).join('');

    const delivery = o.delivery_method ? `<span class="order-meta">${o.delivery_method}</span>` : '';
    const src = o.source === 'xml_import' ? '<span class="src-xml">архив</span>' : '';

    return `
      <div class="order-card">
        <div class="order-top">
          <div class="order-left">
            <div class="order-id">#${o.id}</div>
            <div class="order-customer">${o.customer || 'Покупатель'}</div>
          </div>
          <div class="order-right">
            <div class="order-total-top">${(o.total||0).toLocaleString('ru')} ₸</div>
            <span class="order-badge ${badge}">${label}</span>
          </div>
        </div>
        ${entries ? `<div class="order-items">${entries}</div>` : ''}
        <div class="order-footer">
          <div style="display:flex;align-items:center;gap:8px">${delivery}${src}</div>
          <div class="order-date-time">${dateStr}</div>
        </div>
      </div>`;
  }).join('');
}

function formatDate(val) {
  if (!val) return '—';
  // dd.mm.yyyy формат (XML)
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(val)) return val;
  // Unix timestamp (API)
  try {
    const num = Number(val);
    const d = new Date(num > 1e10 ? num : num * 1000);
    if (isNaN(d.getTime())) return val;
    return d.toLocaleString('ru', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch { return val; }
}

loadOrders();
</script>
</body>
</html>
