<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Kaspi API Test</title>
<style>
body { font-family: monospace; padding: 20px; background: #1e1e2e; color: #cdd6f4; }
input, select { width: 100%; padding: 8px; margin: 6px 0; background: #313244; border: 1px solid #45475a; color: #cdd6f4; border-radius: 6px; }
button { padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 4px; }
pre { background: #313244; padding: 16px; border-radius: 8px; overflow: auto; white-space: pre-wrap; font-size: 13px; }
label { font-size: 13px; color: #a6adc8; }
</style>
</head>
<body>
<h2>🧪 Kaspi API Test</h2>

<label>X-Auth-Token:</label>
<input id="token" value="VXKXCdVcJbNDwrc2ruBJiREE1vqSRdOb1iJSJAUPdnk=" />

<label>State:</label>
<select id="state">
  <option>NEW</option>
  <option>PICKUP</option>
  <option>DELIVERY</option>
  <option>KASPI_DELIVERY</option>
  <option>ARCHIVE</option>
</select>

<br><br>
<button onclick="testApi()">🚀 Отправить запрос</button>
<button onclick="testDirect()">🌐 Попробовать напрямую (fetch)</button>

<h3>Результат:</h3>
<pre id="result">нажми кнопку...</pre>

<script>
async function testApi() {
  const token = document.getElementById('token').value;
  const state = document.getElementById('state').value;
  document.getElementById('result').textContent = '⏳ Запрос...';
  try {
    const r = await fetch(`/api/kaspi/test?state=${state}&token=${encodeURIComponent(token)}`);
    const data = await r.json();
    document.getElementById('result').textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    document.getElementById('result').textContent = 'Ошибка: ' + e.message;
  }
}

async function testDirect() {
  const token = document.getElementById('token').value;
  const state = document.getElementById('state').value;
  document.getElementById('result').textContent = '⏳ Прямой запрос к Kaspi...';
  try {
    const url = `https://kaspi.kz/shop/api/v2/orders?page%5Bnumber%5D=0&page%5Bsize%5D=5&filter%5Borders%5D%5Bstate%5D=${state}`;
    const r = await fetch(url, {
      headers: {
        'X-Auth-Token': token,
        'Content-Type': 'application/vnd.api+json',
        'Accept': '*/*'
      }
    });
    const text = await r.text();
    document.getElementById('result').textContent = `Status: ${r.status}\n\n${text.slice(0, 1000)}`;
  } catch(e) {
    document.getElementById('result').textContent = 'CORS или сетевая ошибка: ' + e.message;
  }
}
</script>
</body>
</html>
