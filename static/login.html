<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Вход — Lunary OS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f4f6;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 8px 32px rgba(0,0,0,.06);
}

.logo {
  font-size: 26px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: -.5px;
}
.logo span { color: #6366f1; }

.subtitle {
  font-size: 13px;
  color: #9ca3af;
  text-align: center;
  margin-bottom: 32px;
}

.label {
  font-size: 13px;
  font-weight: 500;
  color: #374151;
  margin-bottom: 6px;
  display: block;
}

.input-wrap { position: relative; margin-bottom: 16px; }
.input {
  width: 100%;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 11px 42px 11px 14px;
  font-size: 15px;
  color: #111827;
  outline: none;
  transition: border-color .15s, background .15s;
  font-family: inherit;
}
.input:focus { border-color: #6366f1; background: #fff; }

.eye-btn {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; color: #9ca3af;
  font-size: 18px; padding: 4px;
  line-height: 1;
}

.btn {
  width: 100%;
  background: #111827;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  font-family: inherit;
  margin-top: 4px;
}
.btn:hover { background: #374151; }
.btn:active { background: #1f2937; }

.error {
  background: #fee2e2;
  border: 1px solid #fca5a5;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: #dc2626;
  margin-bottom: 16px;
  display: none;
}
.error.show { display: block; }

.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 20px 0;
  color: #d1d5db; font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: #e5e7eb;
}

.btn-google {
  width: 100%;
  background: #fff;
  color: #374151;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 12px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-google:hover { background: #f9fafb; border-color: #d1d5db; }

.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: #d1d5db;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lunary <span>OS</span></div>
  <div class="subtitle">Вход в систему</div>

  <div class="error" id="err">Неверный пароль</div>

  <label class="label">Пароль</label>
  <div class="input-wrap">
    <input class="input" id="pwd" type="password" placeholder="Введите пароль..." onkeydown="onEnter(event)" autofocus>
    <button class="eye-btn" type="button" onclick="toggleEye()" id="eye-btn">👁</button>
  </div>

  <button class="btn" id="btn" onclick="doLogin()">Войти как администратор</button>

  <div class="divider">или</div>

  <button class="btn-google" onclick="location.href='/auth/google'">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Войти через Google
  </button>

  <div class="footer">Lunary OS v2</div>
</div>

<script>
async function doLogin() {
  const pwd = document.getElementById('pwd').value;
  if (!pwd) return;
  const btn = document.getElementById('btn');
  btn.textContent = '...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    if (res.ok) {
      const next = new URLSearchParams(location.search).get('next') || '/admin';
      location.href = next;
    } else {
      document.getElementById('err').classList.add('show');
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
      btn.textContent = 'Войти';
      btn.disabled = false;
    }
  } catch {
    btn.textContent = 'Войти';
    btn.disabled = false;
  }
}

function onEnter(e) { if (e.key === 'Enter') doLogin(); }

function toggleEye() {
  const inp = document.getElementById('pwd');
  const btn = document.getElementById('eye-btn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
