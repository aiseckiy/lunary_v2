<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Слияние товаров</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f6; color: #1a1a2e; }

.header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 14px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 17px; font-weight: 700; }
.stats-chips { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.chip { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.chip-blue { background: #ede9fe; color: #5b21b6; }
.chip-green { background: #d1fae5; color: #065f46; }
.chip-yellow { background: #fef9c3; color: #92400e; }
.chip-red { background: #fee2e2; color: #991b1b; }

.layout { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: calc(100vh - 55px); }
.panel { display: flex; flex-direction: column; border-right: 1px solid #e5e7eb; overflow: hidden; }
.panel:last-child { border-right: none; }
.panel-header { padding: 14px 16px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.panel-title { font-size: 14px; font-weight: 700; }
.panel-search { flex: 1; padding: 6px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px; outline: none; }
.panel-search:focus { border-color: #6c63ff; }
.panel-body { overflow-y: auto; flex: 1; }

.tabs-bar { display: flex; gap: 0; background: #f9fafb; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
.ptab { padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer; color: #6b7280; border-bottom: 2px solid transparent; }
.ptab.active { color: #6c63ff; border-bottom-color: #6c63ff; background: #fff; }

.product-item { padding: 10px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background .1s; display: flex; align-items: flex-start; gap: 10px; }
.product-item:hover { background: #f9fafb; }
.product-item.matched { background: #f0fdf4; }
.product-item.matched:hover { background: #dcfce7; }
.product-item.selected { background: #ede9fe; }
.p-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
.p-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.p-sku { font-family: monospace; font-size: 11px; color: #6c63ff; }
.p-price { font-size: 12px; font-weight: 600; color: #10b981; }
.p-cost { font-size: 12px; font-weight: 600; color: #f59e0b; }
.tag { display: inline-block; background: #e5e7eb; color: #374151; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-right: 3px; }
.tag-kaspi { background: #dbeafe; color: #1e40af; }
.match-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
.badge-sku { background: #d1fae5; color: #065f46; }
.badge-fuzzy { background: #fef9c3; color: #92400e; }
.score { font-size: 10px; color: #9ca3af; }

.pair-item { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; display: flex; flex-direction: column; gap: 8px; }
.pair-item:hover { background: #fafafa; }
.pair-row { display: flex; gap: 8px; align-items: flex-start; }
.pair-side { flex: 1; background: #f9fafb; border-radius: 8px; padding: 8px 10px; min-width: 0; }
.pair-side.kaspi { background: #eff6ff; }
.pair-side.other { background: #fefce8; }
.pair-arrow { font-size: 18px; color: #6c63ff; align-self: center; flex-shrink: 0; }
.pair-actions { display: flex; gap: 8px; align-items: center; }
.pair-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #9ca3af; margin-bottom: 3px; }
.highlight { background: #fef08a; border-radius: 3px; padding: 0 1px; }

.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e5e7eb; padding: 12px 24px; display: flex; align-items: center; gap: 12px; z-index: 100; }
.btn { padding: 8px 18px; border-radius: 10px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; }
.btn-primary { background: #6c63ff; color: #fff; }
.btn-primary:hover { background: #5b52e0; }
.btn-primary:disabled { background: #c4b5fd; cursor: not-allowed; }
.btn-outline { background: #fff; color: #374151; border: 1px solid #d1d5db; }
.btn-outline:hover { background: #f9fafb; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 8px; }
.btn-merge-pair { background: #6c63ff; color: #fff; }
.btn-skip { background: #f3f4f6; color: #6b7280; }
.selected-count { font-size: 13px; color: #6b7280; margin-right: auto; }

.result-bar { background: #ecfdf5; border: 1px solid #6ee7b7; border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #065f46; display: none; }
.empty { text-align: center; padding: 40px 20px; color: #9ca3af; font-size: 13px; }
.loading { text-align: center; padding: 60px; color: #9ca3af; }

input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #6c63ff; flex-shrink: 0; margin-top: 2px; }

.section-divider { padding: 6px 16px; background: #f3f4f6; font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #e5e7eb; }
.card-link { font-size: 12px; color: #6c63ff; text-decoration: none; padding: 3px 6px; border-radius: 6px; border: 1px solid #ede9fe; flex-shrink: 0; transition: all .15s; }
.card-link:hover { background: #ede9fe; }
.filter-hint { padding: 6px 16px; background: #eff6ff; font-size: 12px; color: #1e40af; border-bottom: 1px solid #bfdbfe; display: flex; align-items: center; gap: 8px; }
.filter-hint button { background: none; border: none; cursor: pointer; color: #1e40af; font-size: 12px; font-weight: 600; padding: 0; text-decoration: underline; }
.link-hint { padding: 8px 16px; background: #fef9c3; font-size: 12px; color: #92400e; border-bottom: 1px solid #fde68a; display: flex; align-items: center; gap: 8px; }
.link-hint button { background: none; border: none; cursor: pointer; color: #92400e; font-weight: 600; padding: 0; text-decoration: underline; }
.btn-link-pair { background: #f5f3ff; color: #6c63ff; border: 1px solid #ede9fe; border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; flex-shrink: 0; white-space: nowrap; }
.btn-link-pair:hover { background: #ede9fe; }
.btn-link-pair.pending { background: #fef9c3; color: #92400e; border-color: #fde68a; }

/* Попап полей */
.fields-popup { position: fixed; bottom: 64px; left: 24px; background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); z-index: 200; min-width: 260px; display: none; }
.fields-popup.open { display: block; }
.fields-popup-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: #1a1a2e; }
.field-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
.field-row:last-child { border-bottom: none; }
.field-row input[type=checkbox] { width: 16px; height: 16px; accent-color: #6c63ff; flex-shrink: 0; }
.field-info { flex: 1; }
.field-name { font-size: 13px; font-weight: 600; }
.field-desc { font-size: 11px; color: #9ca3af; }
.field-row.has-name { background: #fef9c3; border-radius: 8px; padding: 7px 8px; margin: 0 -8px; }
</style>
</head>
<body>

<div class="header">
  <a href="/admin" style="color:#6c63ff;text-decoration:none;font-size:20px;line-height:1">←</a>
  <h1>🔀 Слияние товаров</h1>
  <button class="btn btn-outline btn-sm" onclick="reload()" id="btn-reload" style="margin-left:8px" title="Обновить данные">🔄 Обновить</button>
  <div class="stats-chips">
    <span class="chip chip-blue" id="stat-kaspi">Kaspi: —</span>
    <span class="chip chip-green" id="stat-other">Справочник: —</span>
    <span class="chip chip-yellow" id="stat-pairs">Совпадений: —</span>
    <span class="chip chip-red" id="stat-unmatched">Без пары: —</span>
    <span class="chip" style="background:#d1fae5;color:#065f46" id="stat-synced">Синхронизировано: —</span>
  </div>
</div>

<div class="layout">
  <!-- Левая панель: Kaspi товары -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">📦 Kaspi</span>
      <input class="panel-search" type="text" placeholder="Поиск..." oninput="filterKaspi(this.value)" id="search-kaspi">
    </div>
    <div class="tabs-bar">
      <div class="ptab active" onclick="switchKaspiTab('all', this)">Все</div>
      <div class="ptab" onclick="switchKaspiTab('matched', this)">С парой</div>
      <div class="ptab" onclick="switchKaspiTab('unmatched', this)">Без пары</div>
      <div class="ptab" onclick="switchKaspiTab('synced', this)">✅ Синхронизированы</div>
    </div>
    <div class="panel-body" id="kaspi-list"><div class="loading">⏳</div></div>
  </div>

  <!-- Правая панель: Накладные + совпадения -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">🗂️ Справочник накладных</span>
      <input class="panel-search" type="text" placeholder="Поиск..." oninput="filterOther(this.value)" id="search-other">
    </div>
    <div class="tabs-bar">
      <div class="ptab active" onclick="switchOtherTab('pairs', this)">Совпадения</div>
      <div class="ptab" onclick="switchOtherTab('all', this)">Все товары</div>
      <div class="ptab" onclick="switchOtherTab('unmatched', this)">Без пары</div>
    </div>
    <div class="panel-body" id="other-list"><div class="loading">⏳</div></div>
  </div>
</div>

<!-- Попап выбора полей -->
<div class="fields-popup" id="fields-popup">
  <div class="fields-popup-title">⚙️ Что переносить из накладной</div>
  <label class="field-row has-name">
    <input type="checkbox" id="field-name">
    <div class="field-info">
      <div class="field-name">📝 Наименование</div>
      <div class="field-desc">Заменить название Kaspi-карточки на название из накладной</div>
    </div>
  </label>
  <label class="field-row">
    <input type="checkbox" id="field-cost_price" checked>
    <div class="field-info">
      <div class="field-name">💰 Закупочная цена</div>
      <div class="field-desc">Перенести себестоимость из накладной</div>
    </div>
  </label>
  <label class="field-row">
    <input type="checkbox" id="field-supplier" checked>
    <div class="field-info">
      <div class="field-name">🏭 Поставщик</div>
      <div class="field-desc">Название поставщика/компании</div>
    </div>
  </label>
  <label class="field-row">
    <input type="checkbox" id="field-supplier_article" checked>
    <div class="field-info">
      <div class="field-name">🔖 Артикул производителя</div>
      <div class="field-desc">Артикул из накладной / прайс-листа</div>
    </div>
  </label>
  <div style="margin-top:10px;padding-top:10px;border-top:1px solid #f3f4f6">
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;color:#6b7280">
      <input type="checkbox" id="field-force" style="accent-color:#ef4444;width:14px;height:14px">
      Перезаписать уже заполненные поля
    </label>
  </div>
</div>

<div class="bottom-bar">
  <div id="result-bar" class="result-bar"></div>
  <button class="btn btn-outline btn-sm" onclick="toggleFieldsPopup()" id="btn-fields" style="position:relative">
    ⚙️ Поля <span id="fields-count-badge" style="background:#6c63ff;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:4px">3</span>
  </button>
  <span class="selected-count" id="selected-count">Выберите пары для объединения</span>
  <button class="btn btn-outline btn-sm" onclick="selectAllPairs()">Выбрать все совпадения</button>
  <button class="btn btn-sm" style="background:#10b981;color:#fff" onclick="mergeSkuOnly()">🎯 Объединить все по артикулу</button>
  <button class="btn btn-primary" id="btn-merge" onclick="doMerge()" disabled>Объединить выбранные</button>
</div>

<script>
let data = null;
let selectedPairIds = new Set(); // "kaspi_id:other_id"
let manualPairs = []; // вручную созданные пары
let kaspiTab = 'all';
let otherTab = 'pairs';
let kaspiSearch = '';
let otherSearch = '';
let pendingLinkId = null; // id справочника ожидающий привязки

// ── Поля для переноса ─────────────────────────────────────────────────────────
const FIELD_IDS = ['field-name', 'field-cost_price', 'field-supplier', 'field-supplier_article'];

function getSelectedFields() {
  return FIELD_IDS
    .filter(id => document.getElementById(id).checked)
    .map(id => id.replace('field-', ''));
}

function toggleFieldsPopup() {
  document.getElementById('fields-popup').classList.toggle('open');
}

// Закрывать попап при клике вне него
document.addEventListener('click', e => {
  const popup = document.getElementById('fields-popup');
  const btn = document.getElementById('btn-fields');
  if (popup.classList.contains('open') && !popup.contains(e.target) && !btn.contains(e.target)) {
    popup.classList.remove('open');
  }
});

// Обновляем бейдж с количеством выбранных полей
function updateFieldsBadge() {
  document.getElementById('fields-count-badge').textContent = getSelectedFields().length;
}
FIELD_IDS.forEach(id => {
  document.getElementById(id).addEventListener('change', updateFieldsBadge);
});

// Узнаём какие kaspi_id и other_id участвуют в парах
let kaspiInPairs = new Set();
let otherInPairs = new Set();
let selectedKaspiId = null; // фильтр правой панели по выбранному Kaspi-товару

async function load() {
  const r = await fetch('/api/merge-preview');
  data = await r.json();

  kaspiInPairs = new Set(data.pairs.map(p => p.kaspi_id));
  otherInPairs = new Set(data.pairs.map(p => p.other_id));

  const skuPairs = data.pairs.filter(p => p.match_type === 'sku').length;
  const fuzzyPairs = data.pairs.filter(p => p.match_type === 'fuzzy').length;
  document.getElementById('stat-kaspi').textContent = `Kaspi: ${data.total_kaspi}`;
  document.getElementById('stat-other').textContent = `Справочник: ${data.total_other}`;
  document.getElementById('stat-pairs').textContent = `Совпадений: ${data.pairs.length} (🎯${skuPairs} 🔍${fuzzyPairs})`;
  document.getElementById('stat-unmatched').textContent = `Без пары: ${data.unmatched_other.length}`;
  document.getElementById('stat-synced').textContent = `✅ Синхронизировано: ${data.total_synced} из ${data.total_kaspi}`;

  renderKaspi();
  renderOther();
}

function hl(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + `<span class="highlight">${text.slice(idx, idx + query.length)}</span>` + text.slice(idx + query.length);
}

function hlSku(name, sku) {
  if (!sku) return name;
  const idx = name.toUpperCase().indexOf(sku.toUpperCase());
  if (idx === -1) return name;
  return name.slice(0, idx) + `<span class="highlight">${name.slice(idx, idx + sku.length)}</span>` + name.slice(idx + sku.length);
}

// ── Kaspi панель ──────────────────────────────────────────────────────────────
function renderKaspi() {
  const el = document.getElementById('kaspi-list');
  if (!data) return;

  if (kaspiTab === 'synced') {
    let items = data.synced || [];
    if (kaspiSearch) items = items.filter(p =>
      p.name.toLowerCase().includes(kaspiSearch) ||
      (p.supplier || '').toLowerCase().includes(kaspiSearch)
    );
    if (!items.length) { el.innerHTML = '<div class="empty">Нет синхронизированных товаров</div>'; return; }
    el.innerHTML = items.map(p => `
      <div class="product-item matched" onclick="selectKaspi(${p.id})">
        <div style="flex:1;min-width:0">
          <div class="p-name">${hl(p.name, kaspiSearch)}</div>
          <div class="p-meta">
            <span class="p-sku">${p.kaspi_sku || ''}</span>
            ${p.supplier ? `<span class="tag">${p.supplier}</span>` : ''}
            ${p.cost_price ? `<span class="p-cost" style="margin-left:4px">⬇ ${p.cost_price.toLocaleString()} ₸</span>` : ''}
            ${p.supplier_article ? `<span style="font-size:11px;color:#6c63ff;margin-left:4px">арт: ${p.supplier_article}</span>` : ''}
          </div>
        </div>
        <a href="/admin?open=${p.id}" target="_blank" class="card-link" title="Открыть карточку" onclick="event.stopPropagation()">↗</a>
        <span class="match-badge badge-sku">✓ синхр.</span>
      </div>`).join('');
    return;
  }

  let items = data.kaspi_list;
  if (kaspiTab === 'matched')   items = items.filter(p => kaspiInPairs.has(p.id));
  if (kaspiTab === 'unmatched') items = items.filter(p => !kaspiInPairs.has(p.id));
  if (kaspiSearch) items = items.filter(p =>
    p.name.toLowerCase().includes(kaspiSearch) ||
    (p.kaspi_sku || '').toLowerCase().includes(kaspiSearch)
  );

  if (!items.length) { el.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }

  const linkHint = pendingLinkId !== null
    ? `<div class="link-hint">🔗 Выбери карточку Kaspi для привязки <button onclick="cancelLink()">✕ Отмена</button></div>`
    : '';

  el.innerHTML = linkHint + items.map(p => {
    const hasPair  = kaspiInPairs.has(p.id);
    const isActive = selectedKaspiId === p.id;
    return `<div class="product-item ${hasPair ? 'matched' : ''} ${isActive ? 'selected' : ''}" onclick="selectKaspi(${p.id})">
      <div style="flex:1;min-width:0">
        <div class="p-name">${hl(p.name, kaspiSearch)}</div>
        <div class="p-meta">
          <span class="p-sku">${p.kaspi_sku || p.sku || ''}</span>
          ${p.price ? `<span class="p-price" style="margin-left:6px">${p.price.toLocaleString()} ₸</span>` : ''}
          ${p.brand ? `<span class="tag">${p.brand}</span>` : ''}
        </div>
      </div>
      <a href="/admin?open=${p.id}" target="_blank" class="card-link" title="Открыть карточку" onclick="event.stopPropagation()">↗</a>
      ${hasPair ? '<span class="match-badge badge-sku">✓ пара</span>' : ''}
    </div>`;
  }).join('');
}

function selectKaspi(id) {
  // Режим ручной привязки
  if (pendingLinkId !== null) {
    const ri = data.other_list.find(r => r.id === pendingLinkId);
    const kp = data.kaspi_list.find(p => p.id === id);
    if (ri && kp) {
      // Проверяем что такой пары ещё нет
      const key = `${id}:${pendingLinkId}`;
      const alreadyAuto = data.pairs.some(p => p.kaspi_id === id && p.other_id === pendingLinkId);
      if (!alreadyAuto && !manualPairs.some(p => p.kaspi_id === id && p.other_id === pendingLinkId)) {
        manualPairs.push({
          kaspi_id: id, kaspi_name: kp.name, kaspi_sku: kp.kaspi_sku, kaspi_price: kp.price,
          other_id: pendingLinkId, other_name: ri.name, other_sku: ri.sku,
          other_supplier: ri.supplier, other_cost_price: ri.cost_price,
          match_type: 'manual', score: 1.0,
        });
        // Убираем из unmatched_other
        data.unmatched_other = data.unmatched_other.filter(r => r.id !== pendingLinkId);
        data.pairs = [...data.pairs, manualPairs[manualPairs.length - 1]];
        // Авто-выбор этой пары
        selectedPairIds.add(key);
        updateMergeBtn();
      }
    }
    pendingLinkId = null;
    renderKaspi();
    // Переключить на пары
    otherTab = 'pairs';
    document.querySelectorAll('.panel:last-child .ptab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel:last-child .ptab')[0]?.classList.add('active');
    renderOther();
    return;
  }

  // Обычный режим — фильтр по Kaspi-товару
  selectedKaspiId = selectedKaspiId === id ? null : id;
  renderKaspi();
  if (selectedKaspiId !== null && otherTab !== 'pairs') {
    otherTab = 'pairs';
    document.querySelectorAll('.panel:last-child .ptab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel:last-child .ptab')[0]?.classList.add('active');
  }
  renderOther();
}

function switchKaspiTab(tab, el) {
  kaspiTab = tab;
  document.querySelectorAll('.panel:first-child .ptab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderKaspi();
}

function filterKaspi(v) {
  kaspiSearch = v.toLowerCase();
  renderKaspi();
}

// ── Другая панель ─────────────────────────────────────────────────────────────
function renderOther() {
  const el = document.getElementById('other-list');
  if (!data) return;

  if (otherTab === 'pairs') {
    renderPairs(el);
  } else if (otherTab === 'all') {
    renderAllOther(el);
  } else {
    renderUnmatched(el);
  }
}

function renderPairs(el) {
  let pairs = data.pairs;
  // Если выбран Kaspi-товар слева — показываем только его пары
  if (selectedKaspiId !== null) {
    pairs = pairs.filter(p => p.kaspi_id === selectedKaspiId);
  }
  if (otherSearch) pairs = pairs.filter(p =>
    p.kaspi_name.toLowerCase().includes(otherSearch) ||
    p.other_name.toLowerCase().includes(otherSearch) ||
    (p.other_sku || '').toLowerCase().includes(otherSearch)
  );

  // Показываем баннер активного фильтра
  let filterBanner = '';
  if (selectedKaspiId !== null) {
    const kp = data.kaspi_list.find(p => p.id === selectedKaspiId);
    const kname = kp ? kp.name : `#${selectedKaspiId}`;
    filterBanner = `<div class="filter-hint">🔍 Пары для: <b>${kname}</b> <button onclick="selectKaspi(${selectedKaspiId})">✕ Сбросить</button></div>`;
  }

  if (!pairs.length) { el.innerHTML = filterBanner + '<div class="empty">Совпадений не найдено</div>'; return; }

  const skuPairs = pairs.filter(p => p.match_type === 'sku');
  const fuzzyPairs = pairs.filter(p => p.match_type === 'fuzzy');

  let html = filterBanner;
  if (skuPairs.length) {
    html += `<div class="section-divider">🎯 По артикулу — ${skuPairs.length}</div>`;
    html += skuPairs.map(p => pairHtml(p)).join('');
  }
  if (fuzzyPairs.length) {
    html += `<div class="section-divider">🔍 По названию (нечёткий) — ${fuzzyPairs.length}</div>`;
    html += fuzzyPairs.map(p => pairHtml(p)).join('');
  }
  el.innerHTML = html;
}

function pairHtml(p) {
  const key = `${p.kaspi_id}:${p.other_id}`;
  const checked = selectedPairIds.has(key) ? 'checked' : '';
  const kaspiName = p.match_type === 'sku' ? hlSku(p.kaspi_name, p.other_sku) : hl(p.kaspi_name, otherSearch);
  return `<div class="pair-item">
    <div class="pair-row">
      <input type="checkbox" ${checked} onchange="togglePair('${key}', this)">
      <div class="pair-side kaspi">
        <div class="pair-label">Kaspi</div>
        <div class="p-name">${kaspiName}</div>
        <div class="p-meta">
          <span class="p-sku">${p.kaspi_sku || ''}</span>
          ${p.kaspi_price ? `<span class="p-price" style="margin-left:6px">${p.kaspi_price.toLocaleString()} ₸</span>` : ''}
        </div>
      </div>
      <div class="pair-arrow">⇄</div>
      <div class="pair-side other">
        <div class="pair-label">Справочник</div>
        <div class="p-name">${hl(p.other_name, otherSearch)}</div>
        <div class="p-meta">
          <span class="p-sku">${p.other_sku || ''}</span>
          ${p.other_cost_price ? `<span class="p-cost" style="margin-left:4px">⬇ ${p.other_cost_price.toLocaleString()} ₸</span>` : ''}
          ${p.other_supplier ? `<span style="font-size:11px;color:#6b7280;margin-left:4px">${p.other_supplier}</span>` : ''}
        </div>
      </div>
    </div>
    <div style="padding-left:25px">
      <span class="match-badge ${p.match_type === 'sku' ? 'badge-sku' : 'badge-fuzzy'}">
        ${p.match_type === 'sku' ? '🎯 артикул' : `🔍 ~${Math.round(p.score * 100)}%`}
      </span>
    </div>
  </div>`;
}

function renderAllOther(el) {
  let items = data.other_list;
  if (otherSearch) items = items.filter(p =>
    p.name.toLowerCase().includes(otherSearch) ||
    (p.sku || '').toLowerCase().includes(otherSearch)
  );
  if (!items.length) { el.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }
  el.innerHTML = items.map(p => {
    const hasPair = otherInPairs.has(p.id);
    return `<div class="product-item ${hasPair ? 'matched' : ''}">
      <div style="flex:1;min-width:0">
        <div class="p-name">${hl(p.name, otherSearch)}</div>
        <div class="p-meta">
          <span class="p-sku">${p.sku || ''}</span>
          ${p.cost_price ? `<span class="p-cost" style="margin-left:4px">⬇ ${p.cost_price.toLocaleString()} ₸</span>` : ''}
          ${p.supplier ? `<span style="font-size:11px;color:#6b7280;margin-left:4px">${p.supplier}</span>` : ''}
        </div>
      </div>
      ${hasPair ? '<span class="match-badge badge-sku">✓ пара</span>' : ''}
    </div>`;
  }).join('');
}

function startLink(refId) {
  pendingLinkId = refId;
  renderOther(); // покажет кнопку pending на выбранном
  // Показать подсказку в левой панели
  renderKaspi();
}

function cancelLink() {
  pendingLinkId = null;
  renderKaspi();
  renderOther();
}

function renderUnmatched(el) {
  let items = data.unmatched_other;
  if (otherSearch) items = items.filter(p =>
    p.name.toLowerCase().includes(otherSearch) ||
    (p.sku || '').toLowerCase().includes(otherSearch)
  );
  if (!items.length) { el.innerHTML = '<div class="empty">Все товары имеют пару 🎉</div>'; return; }

  const hint = pendingLinkId
    ? `<div class="link-hint">⬅ Нажми Kaspi-карточку слева чтобы привязать <button onclick="cancelLink()">✕ Отмена</button></div>`
    : '';

  el.innerHTML = hint + items.map(p => {
    const isPending = pendingLinkId === p.id;
    return `<div class="product-item ${isPending ? 'selected' : ''}">
      <div style="flex:1;min-width:0">
        <div class="p-name">${hl(p.name, otherSearch)}</div>
        <div class="p-meta">
          <span class="p-sku">${p.sku || '—'}</span>
          ${p.cost_price ? `<span class="p-cost" style="margin-left:4px">⬇ ${p.cost_price.toLocaleString()} ₸</span>` : ''}
          ${p.supplier ? `<span style="font-size:11px;color:#6b7280;margin-left:4px">${p.supplier}</span>` : ''}
        </div>
      </div>
      <button class="btn-link-pair ${isPending ? 'pending' : ''}"
        onclick="event.stopPropagation(); ${isPending ? 'cancelLink()' : `startLink(${p.id})`}">
        ${isPending ? '✕ Отмена' : '↔ Привязать'}
      </button>
    </div>`;
  }).join('');
}

function switchOtherTab(tab, el) {
  otherTab = tab;
  document.querySelectorAll('.panel:last-child .ptab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderOther();
}

function filterOther(v) {
  otherSearch = v.toLowerCase();
  renderOther();
}

// ── Выбор и объединение ───────────────────────────────────────────────────────
function togglePair(key, chk) {
  if (chk.checked) selectedPairIds.add(key);
  else selectedPairIds.delete(key);
  updateMergeBtn();
}

function selectAllPairs() {
  data.pairs.forEach(p => selectedPairIds.add(`${p.kaspi_id}:${p.other_id}`));
  renderOther();
  updateMergeBtn();
}

async function mergeSkuOnly() {
  const skuPairs = data.pairs.filter(p => p.match_type === 'sku');
  if (!skuPairs.length) { alert('Нет совпадений по артикулу'); return; }
  if (!confirm(`Объединить ${skuPairs.length} пар с совпадением по артикулу (100%)? Это действие нельзя отменить.`)) return;

  const btn = document.querySelector('[onclick="mergeSkuOnly()"]');
  btn.disabled = true;
  btn.textContent = '⏳ Объединяю...';

  const pairs = skuPairs.map(p => ({ kaspi_id: p.kaspi_id, other_id: p.other_id }));
  const r = await fetch('/api/merge-confirm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pairs, fields: getSelectedFields(), force: document.getElementById('field-force').checked }),
  });
  const d = await r.json();

  const bar = document.getElementById('result-bar');
  bar.style.display = 'block';
  bar.textContent = `✅ По артикулу объединено: ${d.merged} пар`;

  btn.disabled = false;
  btn.textContent = '🎯 Объединить все по артикулу';
  selectedPairIds.clear();
  await load();
}

function updateMergeBtn() {
  const n = selectedPairIds.size;
  document.getElementById('btn-merge').disabled = n === 0;
  document.getElementById('selected-count').textContent =
    n > 0 ? `Выбрано: ${n} пар` : 'Выберите пары для объединения';
}

async function doMerge() {
  const n = selectedPairIds.size;
  if (!n) return;
  if (!confirm(`Объединить ${n} пар? Данные из справочника будут перенесены в Kaspi-карточки.`)) return;

  const pairs = [...selectedPairIds].map(key => {
    const [kaspi_id, other_id] = key.split(':').map(Number);
    return { kaspi_id, other_id };
  });

  const r = await fetch('/api/merge-confirm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pairs, fields: getSelectedFields(), force: document.getElementById('field-force').checked }),
  });
  const d = await r.json();

  const bar = document.getElementById('result-bar');
  bar.style.display = 'block';
  bar.textContent = `✅ Объединено: ${d.merged} пар`;

  selectedPairIds.clear();
  await load();
}


async function reload() {
  const btn = document.getElementById('btn-reload');
  btn.disabled = true;
  btn.textContent = '⏳';
  selectedPairIds.clear();
  selectedKaspiId = null;
  pendingLinkId = null;
  manualPairs = [];
  document.getElementById('result-bar').style.display = 'none';
  document.getElementById('kaspi-list').innerHTML = '<div class="loading">⏳</div>';
  document.getElementById('other-list').innerHTML = '<div class="loading">⏳</div>';
  await load();
  btn.disabled = false;
  btn.textContent = '🔄 Обновить';
}

// Авто-обновление когда вкладка браузера снова становится активной
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') reload();
});

load();
</script>
</body>
</html>
