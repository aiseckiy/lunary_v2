<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Продажи — Lunary OS</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/static/layout.css">
<style>
  .uni-wrap { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .uni-header {
    display: flex; align-items: center; gap: 18px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .uni-title { font-size: 20px; font-weight: var(--fw-bold); color: var(--text); }
  .uni-tabs {
    display: flex; gap: 2px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    flex-shrink: 0;
  }
  .uni-tabs::-webkit-scrollbar { display: none; }
  .uni-tab {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 11px 16px;
    font-size: 14px; font-weight: var(--fw-medium);
    color: var(--text2); background: none; border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer; white-space: nowrap;
    transition: color .15s;
  }
  .uni-tab:hover { color: var(--text); }
  .uni-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: var(--fw-semibold);
  }
  .uni-frame-container { flex: 1; overflow: hidden; background: var(--bg); position: relative; }
  .uni-frame {
    width: 100%; height: 100%;
    border: none; display: block;
    background: var(--bg);
  }
  .uni-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    color: var(--text3); font-size: 14px;
    pointer-events: none;
    opacity: 0; transition: opacity .2s;
  }
  .uni-loading.show { opacity: 1; }
  .uni-spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Desktop: используем layout с sidebar */
  @media (min-width: 769px) {
    body { margin-left: 240px; }
    .uni-wrap { height: 100vh; }
  }

  /* Mobile: полный экран, bottom-nav снизу */
  @media (max-width: 768px) {
    body { margin: 0; padding-bottom: 70px; }
    .uni-wrap { height: calc(100vh - 70px); }
    .uni-header { padding: 10px 14px; }
    .uni-title { font-size: 16px; }
    .uni-tabs { padding: 0 10px; }
    .uni-tab { padding: 10px 12px; font-size: 13px; }
  }
</style>
</head>
<body>

<nav id="sidebar" class="sidebar"></nav>

<div class="uni-wrap">
  <div class="uni-header">
    <div class="uni-title">💰 Продажи</div>
  </div>
  <div class="uni-tabs" role="tablist" id="tabs"></div>
  <div class="uni-frame-container">
    <div class="uni-loading" id="loading"><div class="uni-spinner"></div>Загрузка…</div>
    <iframe class="uni-frame" id="frame" src="about:blank"></iframe>
  </div>
</div>

<nav id="bottom-nav"></nav>

<script src="/static/components.js"></script>
<script src="/static/nav.js"></script>
<script>
const TABS = [
  { id: 'kaspi',     icon: '🛒', label: 'Kaspi заказы',    src: '/admin/kaspi' },
  { id: 'shop',      icon: '🛍️', label: 'Магазин заказы',  src: '/admin/shop-orders' },
  { id: 'analytics', icon: '📊', label: 'Аналитика',       src: '/admin/analytics' },
  { id: 'export',    icon: '📤', label: 'Экспорт Kaspi',   src: '/admin/export-preview' },
];

const tabsEl = document.getElementById('tabs');
const frameEl = document.getElementById('frame');
const loadEl = document.getElementById('loading');

function getTabId() {
  const id = new URLSearchParams(location.search).get('tab');
  return TABS.find(t => t.id === id) ? id : TABS[0].id;
}

function renderTabs() {
  const active = getTabId();
  tabsEl.innerHTML = '';
  TABS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'uni-tab' + (t.id === active ? ' active' : '');
    btn.setAttribute('role', 'tab');
    btn.innerHTML = `<span>${t.icon}</span><span>${t.label}</span>`;
    btn.onclick = () => setTab(t.id);
    tabsEl.appendChild(btn);
  });
}

function setTab(id) {
  if (id === getTabId()) return;
  const params = new URLSearchParams(location.search);
  params.set('tab', id);
  history.pushState({ tab: id }, '', location.pathname + '?' + params.toString());
  loadFrame();
  renderTabs();
}

function loadFrame() {
  const tab = TABS.find(t => t.id === getTabId()) || TABS[0];
  loadEl.classList.add('show');
  frameEl.src = tab.src + '?embed=1';
  frameEl.onload = () => loadEl.classList.remove('show');
}

window.addEventListener('popstate', () => {
  renderTabs();
  loadFrame();
});

renderTabs();
loadFrame();
</script>

</body>
</html>
