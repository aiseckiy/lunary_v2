<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товар — LUNARY</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --accent: #6366f1; --accent-dark: #4f46e5;
  --bg: #f8f8fb; --surface: #ffffff; --border: #e5e7eb;
  --text: #111827; --text2: #6b7280; --text3: #9ca3af;
  --green: #16a34a; --red: #ef4444;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.store-header { background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.header-inner { max-width:1200px; margin:0 auto; padding:0 20px; height:60px; display:flex; align-items:center; gap:16px; }
.header-logo { font-size:22px; font-weight:700; color:var(--accent); letter-spacing:-.5px; text-decoration:none; flex-shrink:0; }
.header-back { display:flex; align-items:center; gap:6px; font-size:14px; color:var(--text2); text-decoration:none; }
.header-back:hover { color:var(--text); }
#auth-area { margin-left:auto; }

.container { max-width:800px; margin:0 auto; padding:32px 20px; }

.breadcrumb { font-size:13px; color:var(--text3); margin-bottom:24px; }
.breadcrumb a { color:var(--accent); text-decoration:none; }
.breadcrumb a:hover { text-decoration:underline; }

.product-card-big {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:28px; display:flex; gap:28px;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.product-image-big {
  width:220px; height:220px; flex-shrink:0;
  background:var(--bg); border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  font-size:80px;
}
.product-info { flex:1; min-width:0; }
.product-brand-big { font-size:13px; color:var(--text3); font-weight:500; margin-bottom:6px; }
.product-name-big { font-size:22px; font-weight:700; margin-bottom:8px; line-height:1.3; }
.product-sku-big { font-size:13px; color:var(--text3); margin-bottom:20px; }
.product-price-big { font-size:28px; font-weight:800; color:var(--accent); margin-bottom:6px; }
.product-price-big .currency { font-size:16px; font-weight:600; }
.stock-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:600; margin-bottom:24px; }
.stock-in  { background:#dcfce7; color:#15803d; }
.stock-out { background:#fee2e2; color:#b91c1c; }

.btn-add-big {
  width:100%; padding:16px; background:var(--accent); color:#fff;
  border:none; border-radius:14px; font-size:16px; font-weight:600;
  cursor:pointer; transition:background .15s; font-family:inherit;
}
.btn-add-big:hover { background:var(--accent-dark); }
.btn-add-big.added { background:var(--green); }
.btn-add-big:disabled { opacity:.5; cursor:not-allowed; }

.props-table { width:100%; border-collapse:collapse; margin-top:28px; }
.props-table td { padding:10px 0; border-bottom:1px solid var(--bg); font-size:14px; }
.props-table td:first-child { color:var(--text3); width:40%; }
.props-table tr:last-child td { border-bottom:none; }

.toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:#111827; color:#fff; padding:12px 24px; border-radius:12px;
  font-size:14px; font-weight:500; opacity:0; transition:opacity .3s;
  pointer-events:none; white-space:nowrap; z-index:999;
}
.toast.show { opacity:1; }

/* cart btn */
.cart-btn {
  position:fixed; bottom:24px; right:24px;
  width:60px; height:60px; border-radius:50%;
  background:var(--accent); color:#fff; border:none;
  font-size:24px; cursor:pointer; box-shadow:0 4px 20px rgba(99,102,241,.4);
  display:none; align-items:center; justify-content:center;
  transition:transform .15s, box-shadow .15s; z-index:200;
}
.cart-count {
  position:absolute; top:-4px; right:-4px;
  background:#ef4444; color:#fff; font-size:11px; font-weight:700;
  min-width:20px; height:20px; border-radius:10px;
  display:flex; align-items:center; justify-content:center; padding:0 4px;
}

/* Auth (same as store.html) */
.btn-auth { padding:8px 18px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.user-chip-wrap { position:relative; }
.user-chip { display:flex; align-items:center; gap:8px; padding:6px 12px; border-radius:20px; background:var(--bg); cursor:pointer; font-size:14px; font-weight:500; white-space:nowrap; }
.user-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; overflow:hidden; flex-shrink:0; }
.user-avatar img { width:100%; height:100%; object-fit:cover; }
.admin-badge { padding:6px 12px; background:#fef3c7; color:#b45309; border-radius:20px; font-size:13px; font-weight:600; text-decoration:none; }
.user-dropdown { position:absolute; right:0; top:calc(100% + 6px); background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.1); min-width:140px; display:none; z-index:200; }
.user-dropdown.open { display:block; }
.dropdown-item { padding:10px 14px; font-size:14px; cursor:pointer; border-radius:10px; }
.dropdown-item:hover { background:var(--bg); }
.dropdown-item.red { color:var(--red); }

/* Auth overlay */
.auth-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; display:none; align-items:center; justify-content:center; padding:20px; }
.auth-overlay.open { display:flex; }
.auth-modal { background:#fff; border-radius:20px; padding:32px; width:100%; max-width:400px; position:relative; }
.auth-close { position:absolute; top:16px; right:16px; background:#f3f4f6; border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.auth-logo { font-size:22px; font-weight:800; text-align:center; margin-bottom:4px; }
.auth-logo span { color:var(--accent); }
.auth-sub { font-size:13px; color:var(--text3); text-align:center; margin-bottom:20px; }
.auth-tabs { display:flex; background:#f3f4f6; border-radius:10px; padding:4px; margin-bottom:18px; }
.auth-tab { flex:1; text-align:center; padding:7px; font-size:14px; font-weight:500; color:#6b7280; cursor:pointer; border-radius:8px; transition:all .15s; }
.auth-tab.active { background:#fff; color:#111827; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.auth-err { background:#fee2e2; border:1px solid #fca5a5; border-radius:8px; padding:8px 12px; font-size:13px; color:#dc2626; display:none; margin-bottom:10px; }
.auth-err.show { display:block; }
.auth-label { font-size:13px; font-weight:500; color:#374151; margin-bottom:5px; display:block; }
.auth-input-wrap { position:relative; margin-bottom:12px; }
.auth-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 38px 10px 12px; font-size:14px; color:var(--text); outline:none; font-family:inherit; }
.auth-input:focus { border-color:var(--accent); background:#fff; }
.auth-eye { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:16px; }
.auth-btn { width:100%; background:#111827; color:#fff; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.auth-btn:hover { background:#374151; }
.auth-divider { display:flex; align-items:center; gap:10px; margin:14px 0; color:#d1d5db; font-size:12px; }
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.auth-google { width:100%; background:#fff; color:#374151; border:1px solid var(--border); border-radius:10px; padding:11px; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:10px; }
.auth-google:hover { background:#f9fafb; }

@media(max-width:600px) {
  .product-card-big { flex-direction:column; padding:20px; gap:20px; }
  .product-image-big { width:100%; height:200px; font-size:60px; }
  .product-name-big { font-size:16px; }
  .product-price-big { font-size:22px; }
}

/* Gallery */
.gallery-wrap { position:relative; width:220px; flex-shrink:0; }
.gallery-main { width:220px; height:220px; background:var(--bg); border-radius:16px; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:80px; }
.gallery-main img { width:100%; height:100%; object-fit:cover; }
.gallery-thumbs { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.gallery-thumb { width:44px; height:44px; border-radius:8px; overflow:hidden; cursor:pointer; border:2px solid transparent; background:#f3f4f6; display:flex; align-items:center; justify-content:center; font-size:18px; }
.gallery-thumb.active { border-color:var(--accent); }
.gallery-thumb img { width:100%; height:100%; object-fit:cover; }
.gallery-arrow { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,.45); color:#fff; border:none; border-radius:50%; width:32px; height:32px; font-size:16px; cursor:pointer; display:none; align-items:center; justify-content:center; }
.gallery-arrow.left { left:6px; }
.gallery-arrow.right { right:6px; }
.gallery-wrap:hover .gallery-arrow { display:flex; }
@media(max-width:600px) {
  .gallery-wrap { width:100%; }
  .gallery-main { width:100%; height:200px; font-size:60px; }
}

/* Edit modal */
.edit-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:600; display:none; align-items:center; justify-content:center; padding:16px; }
.edit-overlay.open { display:flex; }
.edit-modal { background:#fff; border-radius:20px; width:100%; max-width:500px; max-height:92vh; overflow-y:auto; padding:24px; box-shadow:0 8px 40px rgba(0,0,0,.18); }
.edit-modal h3 { font-size:16px; font-weight:700; margin-bottom:18px; }
.edit-field { margin-bottom:14px; }
.edit-label { display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:5px; }
.edit-input { width:100%; border:1px solid #e5e7eb; border-radius:10px; padding:10px 12px; font-size:14px; font-family:inherit; outline:none; }
.edit-input:focus { border-color:#6366f1; }

/* Image section */
.img-section-title { font-size:13px; font-weight:600; color:#374151; margin-bottom:10px; }
.img-add-tabs { display:flex; gap:0; margin-bottom:12px; border:1px solid #e5e7eb; border-radius:10px; overflow:hidden; }
.img-add-tab { flex:1; padding:8px; text-align:center; font-size:13px; font-weight:500; cursor:pointer; color:#6b7280; background:#f9fafb; transition:all .15s; }
.img-add-tab.active { background:#6366f1; color:#fff; }
.img-drop { border:2px dashed #e5e7eb; border-radius:10px; padding:22px; text-align:center; cursor:pointer; color:#9ca3af; font-size:13px; transition:border-color .15s; }
.img-drop:hover, .img-drop.drag { border-color:#6366f1; color:#6366f1; }
.img-url-row { display:flex; gap:8px; }
.img-url-input { flex:1; border:1px solid #e5e7eb; border-radius:10px; padding:9px 12px; font-size:14px; font-family:inherit; outline:none; }
.img-url-input:focus { border-color:#6366f1; }
.btn-add-url { background:#6366f1; color:#fff; border:none; border-radius:10px; padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }

/* Images list */
.imgs-list { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; min-height:0; }
.img-item { position:relative; width:72px; height:72px; border-radius:10px; overflow:hidden; border:1px solid #e5e7eb; background:#f3f4f6; }
.img-item img { width:100%; height:100%; object-fit:cover; }
.img-item-del { position:absolute; top:2px; right:2px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
.img-item-main { position:absolute; bottom:2px; left:2px; background:rgba(99,102,241,.85); color:#fff; border-radius:4px; font-size:9px; font-weight:700; padding:1px 4px; }

.edit-actions { display:flex; gap:10px; margin-top:18px; }
.btn-save { flex:1; background:#6366f1; color:#fff; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.btn-save:hover { background:#4f46e5; }
.btn-cancel-edit { flex:1; background:#f3f4f6; color:#374151; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.btn-edit-product { display:none; margin-top:12px; width:100%; padding:10px; background:#f3f4f6; color:#374151; border:1px solid #e5e7eb; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.btn-edit-product:hover { background:#e5e7eb; }
</style>
</head>
<body>

<header class="store-header">
  <div class="header-inner">
    <a class="header-logo" href="/shop">LUNARY</a>
    <a class="header-back" href="/shop" onclick="if(document.referrer.includes('/shop')){event.preventDefault();history.back();}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      Назад в каталог
    </a>
    <div id="auth-area"></div>
  </div>
</header>

<!-- Auth popup -->
<div class="auth-overlay" id="auth-overlay" onclick="if(event.target===this)closeAuth()">
  <div class="auth-modal">
    <button class="auth-close" onclick="closeAuth()">✕</button>
    <div class="auth-logo">Lunary <span>OS</span></div>
    <div class="auth-sub">Войдите чтобы делать заказы</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="at-login" onclick="switchAuthTab('login')">Войти</div>
      <div class="auth-tab" id="at-reg" onclick="switchAuthTab('reg')">Регистрация</div>
    </div>
    <div id="auth-err" class="auth-err"></div>
    <div id="auth-form-login">
      <label class="auth-label">Email</label>
      <div class="auth-input-wrap"><input class="auth-input" id="a-email" type="email" placeholder="you@example.com"></div>
      <label class="auth-label">Пароль</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-pwd" type="password" placeholder="Пароль" onkeydown="if(event.key==='Enter')doAuthLogin()">
        <button class="auth-eye" type="button" onclick="toggleAuthEye('a-pwd',this)">👁</button>
      </div>
      <button class="auth-btn" id="a-btn-login" onclick="doAuthLogin()">Войти</button>
    </div>
    <div id="auth-form-reg" style="display:none">
      <label class="auth-label">Имя</label>
      <div class="auth-input-wrap"><input class="auth-input" id="a-name" type="text" placeholder="Ваше имя"></div>
      <label class="auth-label">Email</label>
      <div class="auth-input-wrap"><input class="auth-input" id="a-reg-email" type="email" placeholder="you@example.com"></div>
      <label class="auth-label">Пароль</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-reg-pwd" type="password" placeholder="Минимум 6 символов" onkeydown="if(event.key==='Enter')doAuthRegister()">
        <button class="auth-eye" type="button" onclick="toggleAuthEye('a-reg-pwd',this)">👁</button>
      </div>
      <button class="auth-btn" id="a-btn-reg" onclick="doAuthRegister()">Создать аккаунт</button>
    </div>
    <div class="auth-divider">или</div>
    <button class="auth-google" onclick="location.href='/auth/google'">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Войти через Google
    </button>
  </div>
</div>

<div class="container" id="container">
  <div style="text-align:center;padding:60px 0;color:#9ca3af">Загрузка...</div>
</div>

<!-- Edit modal -->
<div class="edit-overlay" id="edit-overlay" onclick="if(event.target===this)closeEdit()">
  <div class="edit-modal">
    <h3>✏️ Редактировать товар</h3>
    <div class="edit-field">
      <label class="edit-label">Название</label>
      <input class="edit-input" id="e-name" type="text">
    </div>
    <div class="edit-field">
      <label class="edit-label">Бренд</label>
      <input class="edit-input" id="e-brand" type="text">
    </div>
    <div class="edit-field">
      <label class="edit-label">Категория</label>
      <input class="edit-input" id="e-category" type="text">
    </div>
    <div class="edit-field">
      <label class="edit-label">Цена (₸)</label>
      <input class="edit-input" id="e-price" type="number" min="0">
    </div>

    <div class="img-section-title">🖼 Фотографии</div>
    <div class="imgs-list" id="imgs-list"></div>

    <div class="img-add-tabs">
      <div class="img-add-tab active" id="tab-file" onclick="switchImgTab('file')">📁 Файл</div>
      <div class="img-add-tab" id="tab-url" onclick="switchImgTab('url')">🔗 Ссылка URL</div>
    </div>
    <div id="img-panel-file">
      <div class="img-drop" id="e-img-drop" onclick="document.getElementById('e-img-input').click()">
        📷 Нажмите или перетащите фото сюда<br><small style="color:#d1d5db">Можно несколько файлов сразу</small>
      </div>
      <input type="file" id="e-img-input" accept="image/*" multiple style="display:none" onchange="handleImageFiles(this.files)">
    </div>
    <div id="img-panel-url" style="display:none">
      <div class="img-url-row">
        <input class="img-url-input" id="e-img-url" type="url" placeholder="https://example.com/photo.jpg">
        <button class="btn-add-url" onclick="addImageUrl()">Добавить</button>
      </div>
    </div>

    <div class="edit-actions">
      <button class="btn-cancel-edit" onclick="closeEdit()">Отмена</button>
      <button class="btn-save" id="e-save-btn" onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="cart-btn" id="cart-btn" onclick="goToCartPage()" style="display:none">
  🛒<span class="cart-count" id="cart-count">0</span>
</button>

<script>
const productId = parseInt(location.pathname.split('/').pop());
let product = null;
let currentUser = null;

// ── Cart (same logic, but redirect to shop with cart) ──
let cart = JSON.parse(sessionStorage.getItem('lunary_cart') || '{}');

function saveCart() { sessionStorage.setItem('lunary_cart', JSON.stringify(cart)); }
function cartCount() { return Object.values(cart).reduce((s,i)=>s+i.qty,0); }
function updateCartBtn() {
  const cnt = cartCount();
  document.getElementById('cart-btn').style.display = cnt > 0 ? 'flex' : 'none';
  document.getElementById('cart-count').textContent = cnt;
}
function goToCartPage() { location.href = '/shop'; }

function addToCartBig() {
  if (!product) return;
  const id = product.id;
  if (cart[id]) cart[id].qty++;
  else cart[id] = {name: product.name, price: product.price, qty: 1};
  saveCart();
  updateCartBtn();
  showToast('Товар добавлен в корзину');
  const btn = document.getElementById('btn-add');
  btn.classList.add('added');
  btn.textContent = '✓ В корзине';
  setTimeout(() => { btn.classList.remove('added'); btn.textContent = 'В корзину'; }, 2000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function categoryEmoji(cat) {
  const map = {'Инструменты':'🔧','Лопаты':'🪣','Пена':'🧴','Герметик':'🧴','Краски':'🎨','Шпатели':'🔨','Топоры':'🪓','Пилы':'🪚','Клей':'🧲','Дюбели':'🔩','Сверла':'🔩','Уровни':'📏','Рулетки':'📏','Электроинструмент':'⚡','Расходники':'📦'};
  for (const [k,v] of Object.entries(map)) { if (cat && cat.toLowerCase().includes(k.toLowerCase())) return v; }
  return '📦';
}

async function loadProduct() {
  try {
    const res = await fetch(`/api/store/products/${productId}`);
    if (!res.ok) { document.getElementById('container').innerHTML = '<div style="text-align:center;padding:60px 0;color:#9ca3af"><div style="font-size:48px;margin-bottom:12px">😕</div><div>Товар не найден</div><a href="/shop" style="color:#6366f1;text-decoration:none;margin-top:12px;display:block">← В каталог</a></div>'; return; }
    product = await res.json();
    document.title = `${product.name} — LUNARY`;
    renderProduct();
  } catch { document.getElementById('container').innerHTML = '<div style="text-align:center;padding:60px 0;color:#ef4444">Ошибка загрузки</div>'; }
}

let galleryIndex = 0;

function renderProduct() {
  const p = product;
  const inStock = p.stock > 0;
  const images = p.images && p.images.length ? p.images : (p.image_url ? [p.image_url] : []);
  const priceHtml = p.price
    ? `<div class="product-price-big">${p.price.toLocaleString('ru')}<span class="currency"> ₸</span></div>`
    : `<div class="product-price-big" style="color:var(--text3);font-size:20px">Цена по запросу</div>`;
  const addBtn = inStock && p.price
    ? `<button class="btn-add-big" id="btn-add" onclick="addToCartBig()">В корзину</button>`
    : `<button class="btn-add-big" disabled>${inStock ? 'Цена не указана' : 'Нет в наличии'}</button>`;
  const isAdmin = currentUser && currentUser.role === 'admin';

  const mainImg = images.length
    ? `<img id="gallery-main-img" src="${images[0]}" style="width:100%;height:100%;object-fit:cover">`
    : categoryEmoji(p.category);
  const thumbsHtml = images.length > 1
    ? images.map((src, i) => `<div class="gallery-thumb ${i===0?'active':''}" onclick="setGallery(${i})"><img src="${src}"></div>`).join('')
    : '';

  document.getElementById('container').innerHTML = `
    <div class="breadcrumb">
      <a href="/shop">Каталог</a> › ${p.category} › ${p.name}
    </div>
    <div class="product-card-big">
      <div class="gallery-wrap">
        <div class="gallery-main" id="gallery-main">${mainImg}</div>
        ${images.length > 1 ? `
          <button class="gallery-arrow left" onclick="shiftGallery(-1)">‹</button>
          <button class="gallery-arrow right" onclick="shiftGallery(1)">›</button>
          <div class="gallery-thumbs">${thumbsHtml}</div>` : ''}
      </div>
      <div class="product-info">
        ${p.brand ? `<div class="product-brand-big">${p.brand}</div>` : ''}
        <div class="product-name-big">${p.name}</div>
        <div class="product-sku-big">Артикул: ${p.sku}</div>
        ${priceHtml}
        <div class="stock-badge ${inStock ? 'stock-in' : 'stock-out'}" style="margin-bottom:20px">
          ${inStock ? `В наличии: ${p.stock} ${p.unit}` : 'Нет в наличии'}
        </div>
        ${addBtn}
        ${isAdmin ? `<button class="btn-edit-product" style="display:block" onclick="openEdit()">✏️ Редактировать товар</button>` : ''}
        <table class="props-table">
          <tr><td>Категория</td><td>${p.category}</td></tr>
          ${p.brand ? `<tr><td>Бренд</td><td>${p.brand}</td></tr>` : ''}
          <tr><td>Единица</td><td>${p.unit}</td></tr>
          <tr><td>Артикул</td><td>${p.sku}</td></tr>
        </table>
      </div>
    </div>
  `;
  galleryIndex = 0;
}

function setGallery(i) {
  const images = product.images && product.images.length ? product.images : (product.image_url ? [product.image_url] : []);
  galleryIndex = i;
  const main = document.getElementById('gallery-main');
  if (main) main.innerHTML = `<img src="${images[i]}" style="width:100%;height:100%;object-fit:cover">`;
  document.querySelectorAll('.gallery-thumb').forEach((el, idx) => el.classList.toggle('active', idx === i));
}

function shiftGallery(dir) {
  const images = product.images && product.images.length ? product.images : (product.image_url ? [product.image_url] : []);
  setGallery((galleryIndex + dir + images.length) % images.length);
}

// ── Edit modal ──
let editImages = [];

function switchImgTab(tab) {
  document.getElementById('tab-file').classList.toggle('active', tab === 'file');
  document.getElementById('tab-url').classList.toggle('active', tab === 'url');
  document.getElementById('img-panel-file').style.display = tab === 'file' ? '' : 'none';
  document.getElementById('img-panel-url').style.display = tab === 'url' ? '' : 'none';
}

function renderImgsList() {
  const list = document.getElementById('imgs-list');
  if (!editImages.length) { list.innerHTML = '<span style="font-size:12px;color:#9ca3af">Нет фотографий</span>'; return; }
  list.innerHTML = editImages.map((src, i) => `
    <div class="img-item">
      <img src="${src}" onerror="this.style.display='none'">
      ${i === 0 ? '<div class="img-item-main">главное</div>' : ''}
      <button class="img-item-del" onclick="removeImage(${i})">×</button>
    </div>`).join('');
}

function removeImage(i) {
  editImages.splice(i, 1);
  renderImgsList();
}

function addImageUrl() {
  const inp = document.getElementById('e-img-url');
  const url = inp.value.trim();
  if (!url) return;
  editImages.push(url);
  inp.value = '';
  renderImgsList();
}

function handleImageFiles(files) {
  if (!files || !files.length) return;
  [...files].forEach(file => {
    const reader = new FileReader();
    reader.onload = e => { editImages.push(e.target.result); renderImgsList(); };
    reader.readAsDataURL(file);
  });
  document.getElementById('e-img-input').value = '';
}

function openEdit() {
  const p = product;
  document.getElementById('e-name').value = p.name || '';
  document.getElementById('e-brand').value = p.brand || '';
  document.getElementById('e-category').value = p.category || '';
  document.getElementById('e-price').value = p.price || '';
  editImages = p.images && p.images.length ? [...p.images] : (p.image_url ? [p.image_url] : []);
  renderImgsList();
  switchImgTab('file');
  document.getElementById('edit-overlay').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('open');
}

// Drag & drop
document.addEventListener('DOMContentLoaded', () => {
  const drop = document.getElementById('e-img-drop');
  if (!drop) return;
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag'); handleImageFiles(e.dataTransfer.files); });
});

async function saveEdit() {
  const btn = document.getElementById('e-save-btn');
  btn.textContent = 'Сохранение...'; btn.disabled = true;
  try {
    const updates = {
      name: document.getElementById('e-name').value.trim(),
      brand: document.getElementById('e-brand').value.trim(),
      category: document.getElementById('e-category').value.trim(),
      price: parseInt(document.getElementById('e-price').value) || null,
    };
    await fetch(`/api/products/${product.id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(updates),
    });
    await fetch(`/api/products/${product.id}/image`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ images: editImages }),
    });
    Object.assign(product, updates);
    product.images = [...editImages];
    product.image_url = editImages[0] || null;
    closeEdit();
    renderProduct();
    showToast('✅ Товар обновлён');
  } catch(e) {
    showToast('❌ Ошибка сохранения');
  }
  btn.textContent = 'Сохранить'; btn.disabled = false;
}

// ── Auth ──
async function checkAuth() {
  try { const res = await fetch('/api/auth/me'); if (res.ok) currentUser = await res.json(); } catch {}
  renderAuthArea();
  return currentUser;
}
function renderAuthArea() {
  const area = document.getElementById('auth-area');
  if (!currentUser) { area.innerHTML = `<button class="btn-auth" onclick="openAuth()">Войти</button>`; return; }
  const initial = (currentUser.name || currentUser.email || '?')[0].toUpperCase();
  const adminBtn = currentUser.role === 'admin' ? `<a class="admin-badge" href="/admin">Админ панель</a>` : '';
  area.innerHTML = `<div style="display:flex;align-items:center;gap:8px">${adminBtn}
    <div class="user-chip-wrap">
      <div class="user-chip" onclick="toggleDropdown()">
        <div class="user-avatar">${currentUser.avatar ? `<img src="${currentUser.avatar}" referrerpolicy="no-referrer">` : initial}</div>
        ${currentUser.name || currentUser.email}
      </div>
      <div class="user-dropdown" id="user-dropdown">
        <div class="dropdown-item" onclick="location.href='/shop/my-orders'">📦 Мои заказы</div>
        <div class="dropdown-item red" onclick="doLogout()">🚪 Выйти</div>
      </div>
    </div></div>`;
}
function toggleDropdown() { document.getElementById('user-dropdown')?.classList.toggle('open'); }
document.addEventListener('click', e => { if (!e.target.closest('.user-chip-wrap')) document.getElementById('user-dropdown')?.classList.remove('open'); });
async function doLogout() { await fetch('/api/auth/logout',{method:'POST'}); currentUser=null; renderAuthArea(); }
function openAuth() { document.getElementById('auth-overlay').classList.add('open'); setTimeout(()=>document.getElementById('a-email').focus(),100); }
function closeAuth() { document.getElementById('auth-overlay').classList.remove('open'); document.getElementById('auth-err').classList.remove('show'); }
function switchAuthTab(tab) {
  document.getElementById('at-login').classList.toggle('active', tab==='login');
  document.getElementById('at-reg').classList.toggle('active', tab==='reg');
  document.getElementById('auth-form-login').style.display = tab==='login' ? '' : 'none';
  document.getElementById('auth-form-reg').style.display = tab==='reg' ? '' : 'none';
  document.getElementById('auth-err').classList.remove('show');
}
function showAuthErr(msg) { const el=document.getElementById('auth-err'); el.textContent=msg; el.classList.add('show'); }
async function doAuthLogin() {
  const email=document.getElementById('a-email').value.trim(), pwd=document.getElementById('a-pwd').value;
  if(!email||!pwd){showAuthErr('Заполните все поля');return;}
  const btn=document.getElementById('a-btn-login'); btn.textContent='...'; btn.disabled=true;
  try {
    const res=await fetch('/api/auth/email-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pwd})});
    if(res.ok){currentUser=await res.json();closeAuth();renderAuthArea();if(currentUser.role==='admin')location.href='/admin';}
    else{const e=await res.json();showAuthErr(e.detail||'Неверный email или пароль');}
  } catch{showAuthErr('Ошибка сети');}
  btn.textContent='Войти'; btn.disabled=false;
}
async function doAuthRegister() {
  const name=document.getElementById('a-name').value.trim(),email=document.getElementById('a-reg-email').value.trim(),pwd=document.getElementById('a-reg-pwd').value;
  if(!name||!email||!pwd){showAuthErr('Заполните все поля');return;}
  if(pwd.length<6){showAuthErr('Пароль минимум 6 символов');return;}
  const btn=document.getElementById('a-btn-reg'); btn.textContent='...'; btn.disabled=true;
  try {
    const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pwd})});
    if(res.ok){currentUser=await res.json();closeAuth();renderAuthArea();}
    else{const e=await res.json();showAuthErr(e.detail||'Ошибка регистрации');}
  } catch{showAuthErr('Ошибка сети');}
  btn.textContent='Создать аккаунт'; btn.disabled=false;
}
function toggleAuthEye(id,btn){const inp=document.getElementById(id);inp.type=inp.type==='password'?'text':'password';btn.textContent=inp.type==='password'?'👁':'🙈';}

checkAuth().then(() => loadProduct());
updateCartBtn();
</script>
</body>
