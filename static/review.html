<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка товаров</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

.header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
.header h1 { font-size: 17px; font-weight: var(--fw-bold); }
.stats-chips { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; align-items: center; }
.chip { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: var(--fw-semibold); }
.chip-blue  { background: #ede9fe; color: var(--purple-text, #5b21b6); }
.chip-green { background: #d1fae5; color: #065f46; }
.chip-red   { background: #fee2e2; color: #991b1b; }

.toolbar { background: #fff; border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.search-box { padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; width: 240px; }
.search-box:focus { border-color: var(--accent); }
select.filter { padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; cursor: pointer; background: #fff; }
.btn { padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: var(--fw-semibold); transition: all .15s; }
.btn-green   { background: var(--green); color: #fff; }
.btn-outline { background: #fff; color: #374151; border: 1px solid #d1d5db; }
.btn-outline:hover { background: #f9fafb; }

.list-container { padding: 16px 24px; display: flex; flex-direction: column; gap: 6px; }

.product-row {
  background: #fff; border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; display: flex; align-items: center; gap: 12px;
  transition: background .1s;
}
.product-row:hover { background: #fafafa; }
.product-row.is-verified { border-color: #6ee7b7; background: #f0fdf4; }

.verify-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }

.p-info { flex: 1; min-width: 0; }
.p-name { font-size: 13px; font-weight: var(--fw-medium); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-sub  { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Поля-тэги */
.fields { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.field-tag { font-size: 12px; font-weight: var(--fw-medium); padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
.ft-qty     { background: #ede9fe; color: var(--purple-text, #5b21b6); }
.ft-price   { background: #d1fae5; color: #065f46; }
.ft-article { background: #dbeafe; color: var(--blue-text, #1e40af); font-family: monospace; }
.ft-empty   { background: #f3f4f6; color: var(--text3); }

/* Кнопки действий */
.btn-edit { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 4px 8px; cursor: pointer; font-size: 14px; color: var(--text2); transition: all .15s; flex-shrink: 0; }
.btn-edit:hover { background: #f3f4f6; border-color: var(--accent); color: var(--accent); }
.btn-ref { background: none; border: 1px solid #ede9fe; border-radius: 7px; padding: 4px 8px; cursor: pointer; font-size: 13px; color: var(--purple); transition: all .15s; flex-shrink: 0; }
.btn-ref:hover { background: #f5f3ff; border-color: var(--purple); }

/* Попап привязки из справочника */
.ref-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1000; align-items:center; justify-content:center; padding:20px; }
.ref-modal.open { display:flex; }
.ref-box { background:#fff; border-radius:16px; padding:24px; width:100%; max-width:500px; box-shadow:0 20px 60px rgba(0,0,0,.2); max-height:90vh; overflow-y:auto; }
.ref-box-title { font-size:15px; font-weight: var(--fw-bold); margin-bottom:4px; }
.ref-target { font-size:12px; color: var(--text2); background:#f9fafb; border-radius:8px; padding:8px 12px; margin-bottom:14px; line-height:1.5; }
.ref-search { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px; font-size:14px; outline:none; font-family:inherit; }
.ref-search:focus { border-color:var(--accent); }
.ref-results { margin-top:8px; max-height:260px; overflow-y:auto; border:1px solid #f3f4f6; border-radius:10px; }
.ref-item { padding:10px 14px; border-bottom:1px solid #f3f4f6; cursor:pointer; transition:background .1s; }
.ref-item:last-child { border-bottom:none; }
.ref-item:hover { background:#f5f3ff; }
.ref-item-name { font-size:13px; font-weight: var(--fw-medium); }
.ref-item-meta { font-size:11px; color: var(--text3); margin-top:2px; }
.ref-empty { padding:20px; text-align:center; color: var(--text3); font-size:13px; }
.ref-fields { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
.ref-field-chk { display:flex; align-items:center; gap:5px; font-size:12px; cursor:pointer; background:#f3f4f6; border-radius:8px; padding:4px 10px; }
.ref-field-chk input { accent-color:var(--accent); }
.ref-force-row { display:flex; align-items:center; gap:8px; font-size:12px; color: var(--text2); margin-bottom:4px; }
.ref-force-row input { accent-color:#ef4444; }

/* Инлайн-форма редактирования */
.edit-form { display: none; background: #f9fafb; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-top: 4px; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.edit-form.open { display: flex; }
.edit-field { display: flex; flex-direction: column; gap: 4px; }
.edit-field label { font-size: 11px; font-weight: var(--fw-semibold); color: var(--text2); text-transform: uppercase; letter-spacing: .4px; }
.edit-field input { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 7px; font-size: 13px; outline: none; width: 140px; }
.edit-field input:focus { border-color: var(--accent); }
.edit-field input.wide { width: 200px; }
.btn-save   { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: var(--fw-bold); background: var(--accent); color: #fff; }
.btn-save:hover { background: var(--accent-dark); }
.btn-cancel { padding: 7px 12px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; font-size: 13px; }

.section-header { font-size: 11px; font-weight: var(--fw-bold); text-transform: uppercase; letter-spacing: .5px; color: var(--text2); padding: 10px 0 4px; }

.pagination { display: flex; gap: 8px; align-items: center; padding: 16px 24px; justify-content: center; flex-wrap: wrap; }
.page-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; font-size: 13px; cursor: pointer; }
.page-btn:hover { background: #f9fafb; }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-info { font-size: 13px; color: var(--text2); }
.empty   { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
.loading { text-align: center; padding: 60px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <a href="/admin" style="color:var(--accent);text-decoration:none;font-size:20px;line-height:1">←</a>
  <h1>✅ Проверка товаров</h1>
  <div class="stats-chips">
    <span class="chip chip-blue"  id="stat-total">Всего: —</span>
    <span class="chip chip-green" id="stat-verified">Проверено: —</span>
    <span class="chip chip-red"   id="stat-left">Осталось: —</span>
  </div>
</div>

<div class="toolbar">
  <input class="search-box" type="text" placeholder="Поиск по названию..." oninput="onSearch(this.value)" id="search-input">
  <select class="filter" onchange="onFilter('verified', this.value)">
    <option value="">Все товары</option>
    <option value="no">Не проверены</option>
    <option value="yes">Проверены</option>
  </select>
  <select class="filter" onchange="onFilter('supplier', this.value)" id="filter-supplier">
    <option value="">Все поставщики</option>
  </select>
  <button class="btn btn-green" onclick="markAllVisible()">Отметить все ✓</button>
  <button class="btn btn-outline" onclick="unmarkAllVisible()">Снять отметки</button>
</div>

<div class="list-container" id="list-container">
  <div class="loading">⏳ Загрузка...</div>
</div>
<div class="pagination" id="pagination"></div>

<script>
const PAGE_SIZE = 100;
let currentPage = 0;
let totalItems = 0;
let filters = { verified: '', supplier: '', search: '' };
let searchTimer = null;
let stats = { total: 0, verified: 0 };
let openEditId = null;

// ── Статистика ─────────────────────────────────────────────────────────────
async function loadStats() {
  const [all, ver] = await Promise.all([
    fetch('/api/review-products?limit=1').then(r => r.json()),
    fetch('/api/review-products?verified=yes&limit=1').then(r => r.json())
  ]);
  stats.total    = all.total;
  stats.verified = ver.total;
  document.getElementById('stat-total').textContent    = `Всего: ${stats.total}`;
  document.getElementById('stat-verified').textContent = `Проверено: ${stats.verified}`;
  document.getElementById('stat-left').textContent     = `Осталось: ${stats.total - stats.verified}`;
}

async function loadSuppliers() {
  const r = await fetch('/api/products/suppliers');
  const d = await r.json();
  const sel = document.getElementById('filter-supplier');
  (d.suppliers || []).forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

// ── Список ─────────────────────────────────────────────────────────────────
async function load() {
  const container = document.getElementById('list-container');
  container.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
  openEditId = null;

  const params = new URLSearchParams({ skip: currentPage * PAGE_SIZE, limit: PAGE_SIZE });
  if (filters.verified) params.set('verified', filters.verified);
  if (filters.supplier) params.set('supplier', filters.supplier);
  if (filters.search)   params.set('search',   filters.search);

  const r = await fetch('/api/review-products?' + params);
  const data = await r.json();
  totalItems = data.total;
  renderList(data.items);
  renderPagination();
}

function renderList(items) {
  const container = document.getElementById('list-container');
  if (!items.length) { container.innerHTML = '<div class="empty">Товары не найдены</div>'; return; }
  container.innerHTML = '';

  const bySupplier = {};
  items.forEach(p => {
    const key = p.supplier || 'Без поставщика';
    (bySupplier[key] = bySupplier[key] || []).push(p);
  });

  Object.entries(bySupplier).forEach(([supplier, products]) => {
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.textContent = `🏭 ${supplier} (${products.length})`;
    container.appendChild(hdr);
    products.forEach(p => {
      const wrap = document.createElement('div');
      wrap.id = `wrap-${p.id}`;
      wrap.appendChild(buildRow(p));
      wrap.appendChild(buildEditForm(p));
      container.appendChild(wrap);
    });
  });
}

function buildRow(p) {
  const row = document.createElement('div');
  row.className = 'product-row' + (p.verified ? ' is-verified' : '');
  row.id = `row-${p.id}`;

  const qtyTag     = `<span class="field-tag ft-qty">${p.stock ?? 0} ${p.unit || 'шт'}</span>`;
  const priceTag   = p.price
    ? `<span class="field-tag ft-price">${p.price.toLocaleString()} ₸</span>`
    : `<span class="field-tag ft-empty">Нет цены</span>`;
  const articleTag = p.supplier_article
    ? `<span class="field-tag ft-article">${escHtml(p.supplier_article)}</span>`
    : `<span class="field-tag ft-empty">Нет артикула</span>`;

  row.innerHTML = `
    <input type="checkbox" class="verify-check" ${p.verified ? 'checked' : ''} onchange="toggleVerify(${p.id}, this.checked, this)" title="Отметить как проверен">
    <div class="p-info">
      <div class="p-name">${escHtml(p.name)}</div>
      <div class="p-sub">${p.kaspi_sku ? p.kaspi_sku + ' · ' : ''}${p.category || ''}</div>
    </div>
    <div class="fields">
      ${qtyTag}
      ${priceTag}
      ${articleTag}
    </div>
    <button class="btn-ref" onclick="openRef(${p.id}, ${JSON.stringify(escHtml(p.name)).replace(/'/g,'&#39;')})" title="Найти в справочнике накладных">🗂️</button>
    <button class="btn-edit" onclick="toggleEdit(${p.id})" title="Редактировать">✏️</button>
  `;
  return row;
}

function buildEditForm(p) {
  const form = document.createElement('div');
  form.className = 'edit-form';
  form.id = `edit-${p.id}`;
  form.innerHTML = `
    <div class="edit-field">
      <label>Количество</label>
      <input type="number" id="ef-qty-${p.id}" value="${p.stock ?? 0}" min="0" placeholder="0">
    </div>
    <div class="edit-field">
      <label>Цена продажи (₸)</label>
      <input type="number" id="ef-price-${p.id}" value="${p.price ?? ''}" placeholder="0">
    </div>
    <div class="edit-field">
      <label>Артикул производителя</label>
      <input type="text" id="ef-article-${p.id}" class="wide" value="${escHtml(p.supplier_article || '')}" placeholder="Введи артикул">
    </div>
    <button class="btn-save" onclick="saveEdit(${p.id})">💾 Сохранить</button>
    <button class="btn-cancel" onclick="toggleEdit(${p.id})">Отмена</button>
  `;
  return form;
}

function toggleEdit(id) {
  // Закрываем предыдущую открытую форму
  if (openEditId && openEditId !== id) {
    document.getElementById(`edit-${openEditId}`)?.classList.remove('open');
  }
  const form = document.getElementById(`edit-${id}`);
  if (!form) return;
  const isOpen = form.classList.toggle('open');
  openEditId = isOpen ? id : null;
  if (isOpen) {
    // фокус на первое поле
    form.querySelector('input')?.focus();
  }
}

async function saveEdit(id) {
  const qty     = parseInt(document.getElementById(`ef-qty-${id}`).value) || 0;
  const price   = parseInt(document.getElementById(`ef-price-${id}`).value) || null;
  const article = document.getElementById(`ef-article-${id}`).value.trim() || null;

  // Сохраняем поля товара
  const r1 = await fetch(`/api/products/${id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ price, supplier_article: article })
  });

  // Устанавливаем остаток
  const r2 = await fetch(`/api/products/${id}/set-stock`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ quantity: qty, note: 'Проверка товаров' })
  });

  if (!r1.ok || !r2.ok) {
    alert('Ошибка сохранения');
    return;
  }

  // Обновляем строку без перезагрузки
  const data = await r1.json();
  const wrap = document.getElementById(`wrap-${id}`);
  if (wrap) {
    const oldRow = document.getElementById(`row-${id}`);
    const verified = oldRow?.classList.contains('is-verified') || false;
    // Строим обновлённый объект
    const updated = {
      id, price, supplier_article: article, stock: qty,
      name: oldRow?.querySelector('.p-name')?.textContent || '',
      sku:  oldRow?.querySelector('.p-sub')?.textContent?.split(' · ')[0] || '',
      category: oldRow?.querySelector('.p-sub')?.textContent?.split(' · ')[1] || '',
      unit: oldRow?.querySelector('.ft-qty')?.textContent?.split(' ').slice(1).join(' ') || 'шт',
      verified,
    };
    const newRow  = buildRow(updated);
    const newForm = buildEditForm(updated);
    wrap.innerHTML = '';
    wrap.appendChild(newRow);
    wrap.appendChild(newForm);
  }
  openEditId = null;
}

// ── Чекбокс проверено ──────────────────────────────────────────────────────
async function toggleVerify(id, checked, checkbox) {
  checkbox.disabled = true;
  const r = await fetch(`/api/products/${id}/verify`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ verified: checked })
  });
  const data = await r.json();
  checkbox.disabled = false;
  const row = document.getElementById(`row-${id}`);
  if (row) row.className = 'product-row' + (data.verified ? ' is-verified' : '');
  if (checked) stats.verified++; else stats.verified--;
  document.getElementById('stat-verified').textContent = `Проверено: ${stats.verified}`;
  document.getElementById('stat-left').textContent     = `Осталось: ${stats.total - stats.verified}`;
}

async function markAllVisible() {
  for (const cb of document.querySelectorAll('.verify-check:not(:checked)')) {
    const id = parseInt(cb.closest('[id^="wrap-"]').id.replace('wrap-', ''));
    cb.checked = true;
    await toggleVerify(id, true, cb);
  }
}

async function unmarkAllVisible() {
  for (const cb of document.querySelectorAll('.verify-check:checked')) {
    const id = parseInt(cb.closest('[id^="wrap-"]').id.replace('wrap-', ''));
    cb.checked = false;
    await toggleVerify(id, false, cb);
  }
}

// ── Пагинация и фильтры ────────────────────────────────────────────────────
function renderPagination() {
  const pages = Math.ceil(totalItems / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 0) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">← Назад</button>`;
  html += `<span class="page-info">Стр. ${currentPage+1} из ${pages} · ${totalItems} товаров</span>`;
  if (currentPage < pages - 1) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">Вперёд →</button>`;
  pag.innerHTML = html;
}

function goPage(n) { currentPage = n; load(); window.scrollTo(0, 0); }

function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { filters.search = val.trim(); currentPage = 0; load(); }, 300);
}

function onFilter(key, val) { filters[key] = val; currentPage = 0; load(); }

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Привязка из справочника ────────────────────────────────────────────────
let refTargetId = null;
let refTimer = null;

function openRef(productId, productName) {
  refTargetId = productId;
  document.getElementById('ref-target-name').textContent = productName;
  document.getElementById('ref-search').value = '';
  document.getElementById('ref-results').innerHTML = '<div class="ref-empty">Начни вводить название</div>';
  document.getElementById('ref-modal').classList.add('open');
  setTimeout(() => document.getElementById('ref-search').focus(), 50);
}

function closeRef() {
  document.getElementById('ref-modal').classList.remove('open');
  refTargetId = null;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ref-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('ref-modal')) closeRef();
  });
});

async function doRefSearch() {
  const q = document.getElementById('ref-search').value.trim();
  const el = document.getElementById('ref-results');
  if (!q) { el.innerHTML = '<div class="ref-empty">Начни вводить название</div>'; return; }
  el.innerHTML = '<div class="ref-empty">⏳</div>';
  const r = await fetch(`/api/pricelist/search?q=${encodeURIComponent(q)}&limit=15`);
  const d = await r.json();
  if (!d.items?.length) { el.innerHTML = '<div class="ref-empty">Ничего не найдено</div>'; return; }
  el.innerHTML = d.items.map(i => `
    <div class="ref-item" onclick="applyRef(${i.id}, '${escHtml(i.name).replace(/'/g,"\\'")}')">
      <div class="ref-item-name">${escHtml(i.name)}</div>
      <div class="ref-item-meta">
        ${i.article ? `<span style="font-family:monospace;color:var(--accent)">${i.article}</span> · ` : ''}
        ${i.supplier ? `<span>${i.supplier}</span> · ` : ''}
        ${i.cost_price != null ? `<span style="color:var(--green);font-weight: var(--fw-semibold)">${i.cost_price.toLocaleString()} ₸</span>` : ''}
      </div>
    </div>`).join('');
}

function getRefFields() {
  return ['cost_price','supplier','supplier_article','name']
    .filter(f => document.getElementById(`rf-${f}`)?.checked);
}

async function applyRef(refId, refName) {
  if (!refTargetId) return;
  const fields = getRefFields();
  const force = document.getElementById('rf-force').checked;
  if (!fields.length) { alert('Выбери хотя бы одно поле'); return; }

  const r = await fetch('/api/merge-confirm', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ pairs: [{ kaspi_id: refTargetId, other_id: refId }], fields, force })
  });
  const d = await r.json();
  if (r.ok && d.merged) {
    closeRef();
    const msg = document.createElement('div');
    msg.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#065f46;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight: var(--fw-semibold);z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.15)';
    msg.textContent = `✅ Данные из «${refName}» применены`;
    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 3000);
    // Обновить строку
    load();
  } else {
    alert('Ошибка');
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
Promise.all([loadStats(), loadSuppliers()]).then(() => load());
</script>

<!-- Попап справочника -->
<div class="ref-modal" id="ref-modal">
  <div class="ref-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div class="ref-box-title">🗂️ Найти в справочнике накладных</div>
      <button onclick="closeRef()" style="background:none;border:none;font-size:20px;cursor:pointer;color: var(--text3);line-height:1">×</button>
    </div>
    <div class="ref-target" id="ref-target-name"></div>

    <div style="font-size:12px;font-weight: var(--fw-semibold);color:#374151;margin-bottom:6px">Что перенести:</div>
    <div class="ref-fields">
      <label class="ref-field-chk"><input type="checkbox" id="rf-cost_price" checked> 💰 Цена закупа</label>
      <label class="ref-field-chk"><input type="checkbox" id="rf-supplier" checked> 🏭 Поставщик</label>
      <label class="ref-field-chk"><input type="checkbox" id="rf-supplier_article" checked> 🔖 Артикул</label>
      <label class="ref-field-chk"><input type="checkbox" id="rf-name"> 📝 Название</label>
    </div>
    <div class="ref-force-row">
      <input type="checkbox" id="rf-force">
      <label for="rf-force">Перезаписать уже заполненные поля</label>
    </div>

    <input class="ref-search" id="ref-search" type="text" placeholder="Поиск по справочнику..." oninput="clearTimeout(refTimer); refTimer=setTimeout(doRefSearch,200)">
    <div class="ref-results" id="ref-results">
      <div class="ref-empty">Начни вводить название</div>
    </div>
  </div>
</div>
<script src="/static/nav.js"></script>
</body>
</html>
