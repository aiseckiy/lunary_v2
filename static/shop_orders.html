<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказы магазина — Lunary</title>
<link rel="stylesheet" href="/static/layout.css">
<style>
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.page-title { font-size:22px; font-weight:700; }
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-new      { background:#fef3c7; color:#b45309; }
.badge-confirmed{ background:#dbeafe; color:#1d4ed8; }
.badge-ready    { background:#d1fae5; color:#065f46; }
.badge-delivered{ background:#dcfce7; color:#15803d; }
.badge-cancelled{ background:#fee2e2; color:#b91c1c; }
.orders-table { width:100%; border-collapse:collapse; background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.05); }
.orders-table th { padding:12px 16px; text-align:left; font-size:12px; font-weight:600; color:#6b7280; border-bottom:1px solid #f3f4f6; background:#fafafa; white-space:nowrap; }
.orders-table td { padding:12px 16px; font-size:14px; border-bottom:1px solid #f9fafb; vertical-align:top; }
.orders-table tr:last-child td { border-bottom:none; }
.orders-table tr:hover td { background:#fafafa; }
.order-items { font-size:13px; color:#374151; line-height:1.6; }
.order-meta { font-size:12px; color:#9ca3af; margin-top:2px; }
select.status-sel { padding:4px 8px; border-radius:8px; border:1px solid #e5e7eb; font-size:13px; cursor:pointer; background:#fff; }
.total-cell { font-weight:600; white-space:nowrap; }
.empty-state { text-align:center; padding:60px 20px; color:#9ca3af; }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

@media(max-width:768px){
  .orders-table thead { display:none; }
  .orders-table, .orders-table tbody, .orders-table tr, .orders-table td { display:block; width:100%; }
  .orders-table tr { background:#fff; border-radius:12px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); padding:4px 0; }
  .orders-table td { padding:8px 14px; border:none; }
  .orders-table td::before { content:attr(data-label); font-size:11px; color:#9ca3af; display:block; margin-bottom:2px; }
}
</style>
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="mobile-header">
      <div class="mobile-header-actions"></div>
    </div>

    <div class="page-header">
      <div class="page-title">Заказы магазина</div>
      <div id="stats-row" style="font-size:13px;color:#6b7280"></div>
    </div>

    <div id="content">
      <div class="empty-state"><div class="icon">⏳</div><div>Загрузка...</div></div>
    </div>
  </div>
</div>

<script src="/static/mobile.js"></script>
<script>
async function load() {
  const res = await fetch('/api/admin/shop-orders');
  if (!res.ok) { document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>Ошибка загрузки</div></div>'; return; }
  const orders = await res.json();

  const newCount = orders.filter(o => o.status === 'new').length;
  document.getElementById('stats-row').textContent =
    `Всего: ${orders.length} · Новых: ${newCount}`;

  if (!orders.length) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">📦</div><div>Заказов пока нет</div></div>';
    return;
  }

  const STATUSES = ['new','confirmed','ready','delivered','cancelled'];
  const LABELS   = {new:'Новый',confirmed:'Подтверждён',ready:'Готов',delivered:'Доставлен',cancelled:'Отменён'};

  document.getElementById('content').innerHTML = `
    <table class="orders-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Клиент</th>
          <th>Товары</th>
          <th>Сумма</th>
          <th>Дата</th>
          <th>Статус</th>
        </tr>
      </thead>
      <tbody>
        ${orders.map(o => {
          let items = [];
          try { items = JSON.parse(o.items || '[]'); } catch {}
          const itemsHtml = items.map(i => `${i.name} × ${i.qty}`).join('<br>');
          const dt = new Date(o.created_at).toLocaleString('ru', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
          const opts = STATUSES.map(s => `<option value="${s}" ${o.status===s?'selected':''}>${LABELS[s]}</option>`).join('');
          return `<tr>
            <td data-label="#">${o.id}</td>
            <td data-label="Клиент">
              <div style="font-weight:500">${o.name}</div>
              <div class="order-meta">${o.phone}</div>
              ${o.address ? `<div class="order-meta">📍 ${o.address}</div>` : ''}
              ${o.comment ? `<div class="order-meta">💬 ${o.comment}</div>` : ''}
            </td>
            <td data-label="Товары"><div class="order-items">${itemsHtml}</div></td>
            <td data-label="Сумма" class="total-cell">${(o.total||0).toLocaleString('ru')} ₸</td>
            <td data-label="Дата">${dt}</td>
            <td data-label="Статус">
              <select class="status-sel badge badge-${o.status}" onchange="changeStatus(${o.id},this.value,this)">
                ${opts}
              </select>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

async function changeStatus(id, status, el) {
  el.className = `status-sel badge badge-${status}`;
  await fetch(`/api/admin/shop-orders/${id}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({status})
  });
}

load();
</script>
</body>
</html>
