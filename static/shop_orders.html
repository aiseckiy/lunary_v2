<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказы магазина — Lunary</title>
<style>
.page-header-row { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; gap:12px; }

.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:20px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
.stat-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; font-weight: var(--fw-semibold); margin-bottom:6px; }
.stat-value { font-size:28px; font-weight: var(--fw-extrabold); color:var(--text); line-height:1.1; }
.stat-value.purple { color:var(--accent); }
.stat-value.green { color:var(--green); }
.stat-value.orange { color:var(--orange); }

.status-tabs { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.status-tabs::-webkit-scrollbar { display:none; }
.stab { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:7px 14px; font-size:13px; font-weight: var(--fw-medium); color:var(--text2); cursor:pointer; white-space:nowrap; transition:all .15s; display:flex; align-items:center; gap:5px; }
.stab:hover { border-color:var(--border); color:var(--text); }
.stab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.stab .cnt { background:rgba(0,0,0,.07); border-radius:10px; padding:1px 7px; font-size:11px; font-weight: var(--fw-bold); }
.stab.active .cnt { background:rgba(255,255,255,.25); }

.order-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:10px; transition:box-shadow .15s, border-color .15s; }
.order-card:hover { border-color:var(--border); box-shadow:0 2px 10px rgba(0,0,0,.06); }
.order-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.order-left { flex:1; min-width:0; }
.order-id { font-size:14px; font-weight: var(--fw-bold); color:var(--text); }
.order-customer { font-size:13px; color:var(--text2); margin-top:2px; }
.order-phone { font-size:12px; color:var(--text3); margin-top:1px; }
.order-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
.order-total { font-size:18px; font-weight: var(--fw-extrabold); color:var(--text); }

.order-badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight: var(--fw-semibold); white-space:nowrap; }
.badge-new      { background:#fef3c7; color:#b45309; }
.badge-confirmed{ background:#dbeafe; color:#1d4ed8; }
.badge-ready    { background:#d1fae5; color:#065f46; }
.badge-delivered{ background:#dcfce7; color:#15803d; }
.badge-cancelled{ background:#fee2e2; color:#b91c1c; }

.order-items { border-top:1px solid var(--border2); padding-top:12px; margin-bottom:12px; }
.order-item-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:13px; }
.order-item-name { color:var(--text); flex:1; }
.order-item-qty { color:var(--accent); font-weight: var(--fw-bold); font-size:12px; white-space:nowrap; margin: 0 8px; }
.order-item-price { color:var(--text3); font-size:12px; white-space:nowrap; }

.order-info { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.order-info-badge { font-size:12px; color:var(--text2); background:var(--bg); border-radius:8px; padding:3px 8px; }

.order-footer { display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border2); padding-top:10px; }
.order-date { font-size:12px; color:var(--text3); }

.status-select { padding:5px 10px; border-radius:10px; border:1.5px solid var(--border); font-size:12px; font-weight: var(--fw-semibold); cursor:pointer; background:var(--surface); color:var(--text); outline:none; transition:border-color .15s; }
.status-select:hover { border-color:var(--accent); }
.status-select.s-new      { border-color:#f59e0b; color:#b45309; background:#fef3c7; }
.status-select.s-confirmed{ border-color:#3b82f6; color:#1d4ed8; background:#dbeafe; }
.status-select.s-ready    { border-color:var(--green); color:#065f46; background:#d1fae5; }
.status-select.s-delivered{ border-color:#22c55e; color:#15803d; background:#dcfce7; }
.status-select.s-cancelled{ border-color:#ef4444; color:#b91c1c; background:#fee2e2; }

.comment-box { font-size:12px; color:var(--text2); background:var(--bg); border-radius:8px; padding:6px 10px; margin-bottom:10px; }

.empty { text-align:center; padding:60px 20px; color:var(--text3); font-size:15px; }
.pagination { display:flex; align-items:center; justify-content:center; gap:6px; padding:16px 0; flex-wrap:wrap; }
.page-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:7px 13px; font-size:13px; font-weight: var(--fw-medium); color:var(--text2); cursor:pointer; transition:all .15s; font-family:inherit; }
.page-btn:hover { border-color:var(--border); color:var(--text); }
.page-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight: var(--fw-semibold); }
.page-btn:disabled { opacity:.4; cursor:default; }
.page-info { font-size:13px; color:var(--text3); padding:0 6px; }
</style>
<link rel="stylesheet" href="/static/layout.css">
</head>
<body>
<div class="app-shell">

<aside class="sidebar" id="sidebar"></aside>

<div class="mobile-header">
  <div class="mobile-logo">Lunary <span>OS</span></div>
  <div class="mobile-header-actions" style="display:flex;gap:8px;align-items:center">
    <button class="mobile-scan-btn" onclick="openQuickScan()">📷</button>
  </div>
</div>

<div class="main-content">
<div class="page-container">
  <div class="page-header-row">
    <div>
      <div class="page-title">Заказы магазина</div>
      <div class="page-sub">Заказы с сайта lunary.kz</div>
    </div>
  </div>

  <div id="stats-row" class="stats-row"></div>

  <div class="status-tabs">
    <div class="stab active" onclick="setStatus('')" data-s="">📋 Все</div>
    <div class="stab" onclick="setStatus('new')" data-s="new">🟡 Новые</div>
    <div class="stab" onclick="setStatus('confirmed')" data-s="confirmed">🔵 Подтверждены</div>
    <div class="stab" onclick="setStatus('ready')" data-s="ready">✅ Готовы</div>
    <div class="stab" onclick="setStatus('delivered')" data-s="delivered">📦 Доставлены</div>
    <div class="stab" onclick="setStatus('cancelled')" data-s="cancelled">❌ Отменены</div>
  </div>

  <div id="pagination-top"></div>
  <div id="orders-container">
    <div class="empty">⏳ Загрузка...</div>
  </div>
  <div id="pagination-bot"></div>
</div>
</div>
</div>

<nav id="bottom-nav"></nav>

<script>
const LABELS = { new:'Новый', confirmed:'Подтверждён', ready:'Готов', delivered:'Доставлен', cancelled:'Отменён' };
const STATUSES = ['new','confirmed','ready','delivered','cancelled'];
let allOrders = [];
let currentStatus = sessionStorage.getItem('lunary_shoporders_tab') || '';
const PAGE_SIZE = 50;
let currentPage = 1;

function setStatus(s) {
  currentStatus = s;
  currentPage = 1;
  sessionStorage.setItem('lunary_shoporders_tab', s);
  document.querySelectorAll('.stab').forEach(el => el.classList.toggle('active', el.dataset.s === s));
  render();
}

function renderPagination(total, page, id) {
  const el = document.getElementById(id);
  if (!el) return;
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) { el.innerHTML = ''; return; }
  const from = (page - 1) * PAGE_SIZE + 1, to = Math.min(page * PAGE_SIZE, total);
  let h = `<div class="pagination">`;
  h += `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>← Назад</button>`;
  const s = Math.max(1, page-3), e = Math.min(pages, s+6);
  if (s > 1) h += `<button class="page-btn" onclick="goPage(1)">1</button>${s>2?'<span class="page-info">…</span>':''}`;
  for (let i = s; i <= e; i++) h += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if (e < pages) h += `${e<pages-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  h += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>Вперёд →</button>`;
  h += `<span class="page-info">${from}–${to} из ${total}</span></div>`;
  el.innerHTML = h;
}

function goPage(p) {
  const filtered = currentStatus ? allOrders.filter(o => o.status === currentStatus) : allOrders;
  const pages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  render();
  document.getElementById('pagination-top').scrollIntoView({ behavior:'smooth', block:'start' });
}

function render() {
  const filtered = currentStatus ? allOrders.filter(o => o.status === currentStatus) : allOrders;
  const container = document.getElementById('orders-container');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty">📭 Заказов нет</div>';
    document.getElementById('pagination-top').innerHTML = '';
    document.getElementById('pagination-bot').innerHTML = '';
    return;
  }
  renderPagination(filtered.length, currentPage, 'pagination-top');
  renderPagination(filtered.length, currentPage, 'pagination-bot');
  const page = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  container.innerHTML = page.map(o => {
    let items = [];
    try { items = JSON.parse(o.items || '[]'); } catch {}
    const itemsHtml = items.map(i => `
      <div class="order-item-row">
        <div class="order-item-name">${i.name||'—'}</div>
        <div class="order-item-qty">${i.qty||1} шт</div>
        <div class="order-item-price">${((i.price||0)*( i.qty||1)).toLocaleString('ru')} ₸</div>
      </div>`).join('');
    const dt = new Date(o.created_at).toLocaleString('ru', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const opts = STATUSES.map(s => `<option value="${s}" ${o.status===s?'selected':''}>${LABELS[s]}</option>`).join('');
    const infoHtml = [
      o.address ? `📍 ${o.address}` : '',
    ].filter(Boolean).map(t => `<span class="order-info-badge">${t}</span>`).join('');
    return `
      <div class="order-card">
        <div class="order-top">
          <div class="order-left">
            <div class="order-id">#${o.id}</div>
            <div class="order-customer">${o.name||'—'}</div>
            <div class="order-phone">${o.phone||''}</div>
          </div>
          <div class="order-right">
            <div class="order-total">${(o.total||0).toLocaleString('ru')} ₸</div>
            <span class="order-badge badge-${o.status}">${LABELS[o.status]||o.status}</span>
          </div>
        </div>
        ${items.length ? `<div class="order-items">${itemsHtml}</div>` : ''}
        ${infoHtml ? `<div class="order-info">${infoHtml}</div>` : ''}
        ${o.comment ? `<div class="comment-box">💬 ${o.comment}</div>` : ''}
        <div class="order-footer">
          <div class="order-date">${dt}</div>
          <select class="status-select s-${o.status}" onchange="changeStatus(${o.id},this.value,this)">
            ${opts}
          </select>
        </div>
      </div>`;
  }).join('');
}

function updateStats() {
  const newC = allOrders.filter(o => o.status === 'new').length;
  const total = allOrders.reduce((s,o) => s + (o.total||0), 0);
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-label">Всего</div><div class="stat-value purple">${allOrders.length}</div></div>
    <div class="stat"><div class="stat-label">Новых</div><div class="stat-value orange">${newC}</div></div>
    <div class="stat"><div class="stat-label">Выручка</div><div class="stat-value green">${total.toLocaleString('ru')} ₸</div></div>
  `;
  document.querySelectorAll('.stab').forEach(tab => {
    const s = tab.dataset.s;
    if (!s) return;
    const n = allOrders.filter(o => o.status === s).length;
    let badge = tab.querySelector('.cnt');
    if (n > 0) {
      if (!badge) { badge = document.createElement('span'); badge.className = 'cnt'; tab.appendChild(badge); }
      badge.textContent = n;
    } else if (badge) badge.remove();
  });
}

async function changeStatus(id, status, el) {
  el.className = `status-select s-${status}`;
  const o = allOrders.find(x => x.id === id);
  if (o) o.status = status;
  updateStats();
  await fetch(`/api/admin/shop-orders/${id}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({status})
  });
}

async function load() {
  // Восстанавливаем активную вкладку
  if (currentStatus) {
    document.querySelectorAll('.stab').forEach(el => el.classList.toggle('active', el.dataset.s === currentStatus));
  }
  const res = await fetch('/api/admin/shop-orders');
  if (!res.ok) { document.getElementById('orders-container').innerHTML = '<div class="empty">⚠️ Ошибка загрузки</div>'; return; }
  allOrders = await res.json();
  updateStats();
  render();
}

load();
</script>
<script src="/static/components.js"></script>
<script src="/static/nav.js"></script>
<script src="/static/mobile.js"></script>
<script src="/static/quickscan.js"></script>
</body>
</html>
