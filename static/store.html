<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --accent: #1A73E8;
  --accent-dark: #1558b0;
  --btn: #111827;
  --btn-hover: #374151;
  --bg: #f9fafb;
  --surface: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;
  --green: #16a34a;
  --red: #ef4444;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.store-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
  text-decoration: none;
  flex-shrink: 0;
}
.header-tagline {
  font-size: 13px;
  color: var(--text3);
  flex: 1;
}
.header-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  width: 280px;
}
.header-search input {
  border: none;
  background: transparent;
  font-size: 14px;
  color: var(--text);
  outline: none;
  width: 100%;
}
.header-search input::placeholder { color: var(--text3); }
.header-search svg { flex-shrink: 0; color: var(--text3); }

/* ── MAIN LAYOUT ── */
.store-layout {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

/* ── SIDEBAR FILTERS ── */
.store-sidebar {
  width: 220px;
  flex-shrink: 0;
  position: sticky;
  top: 84px;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #e5e7eb transparent;
}
.store-sidebar::-webkit-scrollbar { width: 4px; }
.store-sidebar::-webkit-scrollbar-track { background: transparent; }
.store-sidebar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
.filter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
}
.filter-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.category-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.category-item:hover { background: #f3f4f6; color: var(--text); }
.category-item.active { background: #e0f0fd; color: var(--accent); font-weight: 600; }
.category-count {
  font-size: 12px;
  color: var(--text3);
  background: #f3f4f6;
  border-radius: 20px;
  padding: 1px 7px;
}
.category-item.active .category-count { background: #b3d9f9; color: var(--accent); }

.filter-divider { height: 1px; background: var(--border); margin: 14px 0; }

.brand-list { display: flex; flex-direction: column; gap: 4px; }
.brand-check {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: background 0.15s;
}
.brand-check:hover { background: #f3f4f6; }
.brand-check input { accent-color: var(--accent); }

/* ── PRODUCTS AREA ── */
.store-content { flex: 1; min-width: 0; }

.store-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
  flex-wrap: wrap;
}
.results-count {
  font-size: 14px;
  color: var(--text2);
}
.results-count strong { color: var(--text); }

.sort-select {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  outline: none;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.product-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.09);
  transform: translateY(-2px);
}

.product-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  overflow: hidden;
  flex-shrink: 0;
}
.product-image img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }

/* Избранное */
.fav-btn {
  position: absolute; top: 8px; right: 8px;
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.92);
  border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  transition: transform .15s;
  z-index: 2;
}
.fav-btn:hover { transform: scale(1.15); }
.fav-btn.active { color: #ef4444; }

.product-body {
  padding: 10px 12px 8px;
  display: flex;
  flex-direction: column;
  flex: 1;
  gap: 2px;
}
.product-article {
  font-size: 11px;
  color: var(--text3);
}
.product-brand {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}
.product-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
  margin-top: 3px;
}
.product-price {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  margin-top: 8px;
  line-height: 1.1;
}
.product-price .currency { font-size: 13px; font-weight: 500; color: var(--text2); }
.product-price .unit     { font-size: 12px; font-weight: 400; color: var(--text3); }
.stock-out-label { font-size: 11px; color: var(--text3); margin-top: 4px; }
.stock-in  { background: #dcfce7; color: #166534; }
.stock-out { background: #fee2e2; color: #991b1b; }

.product-footer { padding: 8px 12px 12px; }
.btn-add-cart {
  width: 100%;
  background: var(--btn);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  font-family: inherit;
}
.btn-add-cart:hover   { background: var(--btn-hover); }
.btn-add-cart.added   { background: var(--green); }
.btn-add-cart:disabled { background: #e5e7eb; color: #9ca3af; cursor: default; }
.product-category-tag {
  font-size: 11px; color: var(--text3);
  background: #f3f4f6; border-radius: 6px; padding: 2px 8px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .store-sidebar { display: none; }
  .header-tagline { display: none; }
  .header-search { width: auto; flex: 1; min-width: 0; }
  .header-logo { font-size: 16px; }
  .store-layout { padding: 12px; }
  .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .product-name { font-size: 12px; }
  .product-price { font-size: 15px; }
  .cart-btn { bottom: 16px; right: 16px; width: 52px; height: 52px; font-size: 20px; }
  .cart-sheet { border-radius: 20px 20px 0 0; max-height: 90vh; }
  .btn-auth { padding: 6px 12px; font-size: 13px; }
  .user-chip { padding: 5px 8px; font-size: 13px; }
  .admin-badge { display: none; }

  /* Mobile filter pills */
  .mobile-filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 12px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .mobile-filters::-webkit-scrollbar { display: none; }
  .mobile-pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
  }
  .mobile-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
}
@media (min-width: 769px) {
  .mobile-filters { display: none; }
}

/* ── PAGINATION ── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 32px;
  flex-wrap: wrap;
}
.page-btn {
  min-width: 36px;
  height: 36px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.page-btn:hover:not(:disabled) { background: #f3f4f6; color: var(--text); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
.page-btn:disabled { opacity: 0.35; cursor: default; }
.page-ellipsis { color: var(--text3); padding: 0 4px; font-size: 14px; }

/* ── AUTH BUTTON ── */
.btn-auth {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
  flex-shrink: 0;
}
.btn-auth:hover { background: var(--accent-dark); }

.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f3f4f6;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px 5px 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
}
.user-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  overflow: hidden; flex-shrink: 0;
}
.user-avatar img { width:100%; height:100%; object-fit:cover; }

.admin-badge {
  background: #e0f0fd;
  color: var(--accent);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  margin-left: 2px;
  cursor: pointer;
  text-decoration: none;
  transition: background .15s;
}
.admin-badge:hover { background: #b3d9f9; }

/* ── AUTH POPUP ── */
.auth-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.auth-overlay.open { display: flex; }
.auth-modal {
  background: #fff;
  border-radius: 20px;
  padding: 32px 28px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 24px 64px rgba(0,0,0,.15);
  position: relative;
}
.auth-close {
  position: absolute;
  top: 14px; right: 14px;
  background: #f3f4f6;
  border: none;
  border-radius: 50%;
  width: 30px; height: 30px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #6b7280;
}
.auth-logo { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.auth-logo span { color: var(--accent); }
.auth-sub { font-size: 13px; color: #9ca3af; text-align: center; margin-bottom: 24px; }

.auth-tabs { display:flex; background:#f3f4f6; border-radius:10px; padding:3px; margin-bottom:20px; }
.auth-tab { flex:1; text-align:center; padding:7px; font-size:14px; font-weight:500; color:#6b7280; cursor:pointer; border-radius:8px; transition:all .15s; }
.auth-tab.active { background:#fff; color:#111827; box-shadow:0 1px 4px rgba(0,0,0,.08); }

.auth-label { font-size:13px; font-weight:500; color:var(--text); margin-bottom:5px; display:block; }
.auth-input-wrap { position:relative; margin-bottom:12px; }
.auth-input {
  width:100%; background:var(--bg); border:1px solid var(--border);
  border-radius:10px; padding:10px 40px 10px 13px;
  font-size:14px; color:var(--text); outline:none; font-family:inherit;
  transition:border-color .15s;
}
.auth-input:focus { border-color:var(--accent); background:var(--surface); }
.auth-eye { position:absolute; right:11px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text3); font-size:16px; padding:2px; }

.auth-btn {
  width:100%; background:var(--text); color:#fff; border:none;
  border-radius:10px; padding:12px; font-size:14px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:background .15s; margin-top:2px;
}
.auth-btn:hover { opacity:.85; }
.auth-btn:disabled { opacity:.6; cursor:not-allowed; }

.auth-divider { display:flex; align-items:center; gap:10px; margin:16px 0; color:var(--text3); font-size:12px; }
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }

.auth-google {
  width:100%; background:var(--surface); color:var(--text); border:1px solid var(--border);
  border-radius:10px; padding:11px; font-size:14px; font-weight:500;
  cursor:pointer; font-family:inherit; transition:background .15s;
  display:flex; align-items:center; justify-content:center; gap:9px;
}
.auth-google:hover { background:var(--bg); }

.auth-err {
  background:#fee2e2; border:1px solid #fca5a5; border-radius:8px;
  padding:9px 12px; font-size:13px; color:#dc2626; margin-bottom:12px; display:none;
}
.auth-err.show { display:block; }

/* user dropdown */
.user-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
  min-width: 180px;
  overflow: hidden;
  z-index: 200;
  display: none;
}
.user-dropdown.open { display: block; }
.dropdown-item {
  padding: 11px 16px;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  color: var(--text);
  text-decoration: none;
}
.dropdown-item:hover { background: #f9fafb; }
.dropdown-item.red { color: var(--red); }
.user-chip-wrap { position: relative; }

/* ── CART ── */
.cart-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 14px 22px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(99,102,241,.4);
  display: none;
  align-items: center;
  gap: 10px;
  z-index: 90;
  transition: transform .15s, box-shadow .15s;
}
.cart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,.5); }
.cart-count {
  background: #fff;
  color: var(--accent);
  border-radius: 20px;
  padding: 1px 8px;
  font-size: 13px;
  font-weight: 800;
}

/* Cart overlay */
.cart-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 500;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.cart-overlay.open { display: flex; }
.cart-sheet {
  background: #fff;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 24px 20px 32px;
}
.cart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.cart-title { font-size:18px; font-weight:700; }
.cart-close { background:#f3f4f6; border:none; border-radius:50%; width:32px; height:32px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

.cart-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.cart-item:last-child { border-bottom:none; }
.cart-item-info { flex:1; min-width:0; }
.cart-item-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cart-item-price { font-size:13px; color:var(--text3); }
.cart-qty { display:flex; align-items:center; gap:8px; }
.qty-btn { background:#f3f4f6; border:none; border-radius:6px; width:28px; height:28px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:600; }
.qty-num { font-size:15px; font-weight:600; min-width:20px; text-align:center; }
.cart-remove { background:none; border:none; color:#d1d5db; font-size:18px; cursor:pointer; padding:4px; }
.cart-remove:hover { color:var(--red); }

.cart-total { display:flex; justify-content:space-between; align-items:center; padding:16px 0 20px; font-size:16px; font-weight:700; }

/* Checkout form */
.checkout-form { display:none; }
.checkout-form.show { display:block; }
.form-field { margin-bottom:14px; }
.form-field label { font-size:13px; font-weight:500; color:#374151; margin-bottom:5px; display:block; }
.form-field input, .form-field textarea {
  width:100%; background:#f9fafb; border:1px solid var(--border);
  border-radius:10px; padding:10px 13px; font-size:14px;
  color:var(--text); outline:none; font-family:inherit; transition:border-color .15s;
}
.form-field input:focus, .form-field textarea:focus { border-color:var(--accent); background:#fff; }
.form-field textarea { resize:none; height:70px; }

.product-card-link { display:block; text-decoration:none; color:inherit; }
.product-card-link:hover .product-name { color:var(--accent); }

/* ── BANNER ── */
.store-banner {
  background: linear-gradient(135deg, #0082EC 0%, #006DC5 100%);
  color: #fff;
}
.banner-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.banner-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.banner-sub { font-size: 14px; opacity: .85; }
.banner-btn {
  background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.4);
  border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600;
  text-decoration: none; white-space: nowrap; transition: background .15s;
  flex-shrink: 0;
}
.banner-btn:hover { background: rgba(255,255,255,.3); }
@media(max-width:768px) {
  .banner-title { font-size: 16px; }
  .banner-sub { font-size: 13px; }
  .banner-btn { width: 100%; text-align: center; }
}

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 10px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<header class="store-header">
  <div class="header-inner">
    <a class="header-logo" href="/">LUNARY</a>
    <span class="header-tagline">Строительные материалы и инструменты</span>
    <div class="header-search">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Поиск товаров...">
    </div>
    <div id="auth-area"></div>
  </div>
</header>

<!-- Auth popup -->
<div class="auth-overlay" id="auth-overlay" onclick="if(event.target===this)closeAuth()">
  <div class="auth-modal">
    <button class="auth-close" onclick="closeAuth()">✕</button>
    <div class="auth-logo">Lunary <span>OS</span></div>
    <div class="auth-sub">Войдите чтобы делать заказы</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="at-login" onclick="switchAuthTab('login')">Войти</div>
      <div class="auth-tab" id="at-reg" onclick="switchAuthTab('reg')">Регистрация</div>
    </div>

    <div id="auth-err" class="auth-err"></div>

    <!-- Войти -->
    <div id="auth-form-login">
      <label class="auth-label">Email</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <label class="auth-label">Пароль</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-pwd" type="password" placeholder="Пароль" onkeydown="if(event.key==='Enter')doAuthLogin()">
        <button class="auth-eye" type="button" onclick="toggleAuthEye('a-pwd',this)">👁</button>
      </div>
      <button class="auth-btn" id="a-btn-login" onclick="doAuthLogin()">Войти</button>

    <!-- Регистрация -->
    <div id="auth-form-reg" style="display:none">
      <label class="auth-label">Имя</label>

      </div>
      <label class="auth-label">Email</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-reg-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <label class="auth-label">Пароль</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-reg-pwd" type="password" placeholder="Минимум 6 символов" onkeydown="if(event.key==='Enter')doAuthRegister()">
        <button class="auth-eye" type="button" onclick="toggleAuthEye('a-reg-pwd',this)">👁</button>
      </div>
      <button class="auth-btn" id="a-btn-reg" onclick="doAuthRegister()">Создать аккаунт</button>
    </div>

    <div class="auth-divider">или</div>
    <button class="auth-google" onclick="location.href='/auth/google'">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Войти через Google
    </button>
  </div>
</div>

<!-- Cart button -->
<button class="cart-btn" id="cart-btn" onclick="openCart()" style="display:none">
  🛒
  <span class="cart-count" id="cart-count">0</span>
</button>

<!-- Cart overlay -->
<div class="cart-overlay" id="cart-overlay" onclick="if(event.target===this)closeCart()">
  <div class="cart-sheet">
    <div class="cart-header">

<!-- Banner -->
<div class="store-banner" id="store-banner">
  <div class="banner-inner">
    <div class="banner-text">
      <div class="banner-title">Строительные материалы и инструменты</div>
      <div class="banner-sub">Более 1000 товаров в наличии · Самовывоз и доставка по городу</div>

<!-- Mobile category pills -->
<div class="mobile-filters" id="mobile-cats"></div>

<div class="store-layout">
  <!-- Sidebar -->
  <aside class="store-sidebar">
    <div class="filter-card">
      <div class="filter-title">Категории</div>
      <div id="cat-list"></div>
      <div class="filter-divider"></div>
      <div class="filter-divider"></div>
      <div class="filter-title">Цена, ₸</div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <input type="number" id="price-min" placeholder="от" min="0" oninput="applyPriceFilter()"
          style="width:50%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);outline:none;">
        <span style="color:var(--text3);font-size:12px">—</span>
        <input type="number" id="price-max" placeholder="до" min="0" oninput="applyPriceFilter()"
          style="width:50%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);outline:none;">
      </div>
      <button onclick="clearPrice()" id="btn-clear-price" style="display:none;width:100%;padding:6px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:#fff;cursor:pointer;color:var(--text3)">Сбросить цену</button>
      <div class="filter-divider"></div>
      <div class="filter-title">Бренды</div>
      <div class="brand-list" id="brand-list"></div>
    </div>
  </aside>

  <!-- Content -->
  <main class="store-content">
    <div class="store-toolbar">
      <div class="results-count" id="results-count">Загрузка...</div>
      <select class="sort-select" id="sort-select" onchange="currentPage=1;render()">
        <option value="name">По названию</option>
        <option value="price_asc">Сначала дешевле</option>
        <option value="price_desc">Сначала дороже</option>
        <option value="stock">По наличию</option>
      </select>
    </div>
    <div class="product-grid" id="grid"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script>
let allProducts = [];
let activeCategory = 'all';
let activeBrands = new Set();
let searchQuery = '';
let currentPage = 1;
let priceMin = null;
let priceMax = null;

function applyPriceFilter() {
  const mn = document.getElementById('price-min').value;
  const mx = document.getElementById('price-max').value;
  priceMin = mn ? parseInt(mn) : null;
  priceMax = mx ? parseInt(mx) : null;
  document.getElementById('btn-clear-price').style.display = (priceMin || priceMax) ? '' : 'none';
  currentPage = 1; render();
}
function clearPrice() {
  document.getElementById('price-min').value = '';
  document.getElementById('price-max').value = '';
  priceMin = null; priceMax = null;
  document.getElementById('btn-clear-price').style.display = 'none';
  currentPage = 1; render();
}
const PAGE_SIZE = 80;

const STATE_KEY = 'lunary_store_state';

function saveState() {
  sessionStorage.setItem(STATE_KEY, JSON.stringify({
    activeCategory,
    activeBrands: [...activeBrands],
    searchQuery,
    currentPage,
    priceMin,
    priceMax,
    sortVal: document.getElementById('sort-select')?.value || 'default',
    scrollY: window.scrollY,
  }));
}

function restoreState() {
  const raw = sessionStorage.getItem(STATE_KEY);
  if (!raw) return false;
  sessionStorage.removeItem(STATE_KEY);
  try {
    const s = JSON.parse(raw);
    activeCategory = s.activeCategory || 'all';
    activeBrands = new Set(s.activeBrands || []);
    searchQuery = s.searchQuery || '';
    currentPage = s.currentPage || 1;
    priceMin = s.priceMin || null;
    priceMax = s.priceMax || null;
    const sortEl = document.getElementById('sort-select');
    if (sortEl && s.sortVal) sortEl.value = s.sortVal;
    const searchEl = document.getElementById('search-input');
    if (searchEl && s.searchQuery) searchEl.value = s.searchQuery;
    if (priceMin) document.getElementById('price-min').value = priceMin;
    if (priceMax) document.getElementById('price-max').value = priceMax;
    if (priceMin || priceMax) document.getElementById('btn-clear-price').style.display = '';
    return s.scrollY || 0;
  } catch { return false; }
}

async function load() {
  const res = await fetch('/api/store/products');
  allProducts = await res.json();
  buildFilters();
  const scrollY = restoreState();
  // Если пришли с хлебной крошки — применяем категорию из URL
  const urlCat = new URLSearchParams(location.search).get('cat');
  if (urlCat && !scrollY) {
    activeCategory = urlCat;
    document.querySelectorAll('[data-cat]').forEach(el => {
      el.classList.toggle('active', el.dataset.cat === urlCat);
    });
  }
  render();
  if (scrollY) {
    setTimeout(() => window.scrollTo({ top: scrollY, behavior: 'instant' }), 50);
  }
}

function buildFilters() {
  // Categories
  const cats = {};
  allProducts.forEach(p => {
    const c = p.category || 'Другое';
    cats[c] = (cats[c] || 0) + 1;
  });
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  const catList = document.getElementById('cat-list');
  const mobileCats = document.getElementById('mobile-cats');

  // "All" item
  catList.innerHTML = `<div class="category-item active" data-cat="all" onclick="setCategory('all')">
    Все товары <span class="category-count">${allProducts.length}</span>
  </div>`;
  mobileCats.innerHTML = `<div class="mobile-pill active" data-cat="all" onclick="setCategory('all')">Все</div>`;

  sorted.forEach(([name, count]) => {
    catList.innerHTML += `<div class="category-item" data-cat="${name}" onclick="setCategory('${name}')">
      ${name} <span class="category-count">${count}</span>
    </div>`;
    mobileCats.innerHTML += `<div class="mobile-pill" data-cat="${name}" onclick="setCategory('${name}')">${name}</div>`;
  });

  // Синхронизируем активную категорию в UI
  document.querySelectorAll('[data-cat]').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === activeCategory);
  });

  // Brands — нормализуем регистр (первая буква заглавная, остальные как есть)
  const brandNorm = new Map(); // lowercase → красивое название (первое встреченное)
  allProducts.forEach(p => {
    if (!p.brand) return;
    const key = p.brand.toLowerCase();
    if (!brandNorm.has(key)) brandNorm.set(key, p.brand);
  });
  const brands = [...brandNorm.keys()].sort((a,b) => a.localeCompare(b, 'ru'));
  const brandList = document.getElementById('brand-list');
  brandList.innerHTML = brands.map(key => `
    <label class="brand-check">
      <input type="checkbox" value="${key}" ${activeBrands.has(key) ? 'checked' : ''} onchange="toggleBrand('${key}', this.checked)">
      ${brandNorm.get(key)}
    </label>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  currentPage = 1;
  document.querySelectorAll('[data-cat]').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });
  render();
}

function toggleBrand(brand, checked) {
  if (checked) activeBrands.add(brand);
  else activeBrands.delete(brand);
  currentPage = 1;
  render();
}

function filtered() {
  let list = allProducts;
  if (activeCategory !== 'all') list = list.filter(p => (p.category || 'Другое') === activeCategory);
  if (activeBrands.size) list = list.filter(p => activeBrands.has((p.brand||'').toLowerCase()));
  if (priceMin !== null) list = list.filter(p => p.price && p.price >= priceMin);
  if (priceMax !== null) list = list.filter(p => p.price && p.price <= priceMax);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.brand || '').toLowerCase().includes(q) ||
      (p.sku || '').toLowerCase().includes(q)
    );
  }
  return list;
}

function sorted(list) {
  const s = document.getElementById('sort-select').value;
  if (s === 'price_asc') return [...list].sort((a,b) => (a.price||0) - (b.price||0));
  if (s === 'price_desc') return [...list].sort((a,b) => (b.price||0) - (a.price||0));
  if (s === 'stock') return [...list].sort((a,b) => b.stock - a.stock);
  return [...list].sort((a,b) => a.name.localeCompare(b.name, 'ru'));
}

function categoryEmoji(cat) {
  const map = {
    'Инструменты': '🔧', 'Лопаты': '🪣', 'Пена': '🧴', 'Герметик': '🧴',
    'Краски': '🎨', 'Шпатели': '🔨', 'Топоры': '🪓', 'Пилы': '🪚',
    'Клей': '🧲', 'Дюбели': '🔩', 'Сверла': '🔩', 'Уровни': '📏',
    'Рулетки': '📏', 'Электроинструмент': '⚡', 'Расходники': '📦',
  };
  for (const [k, v] of Object.entries(map)) {
    if (cat && cat.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return '📦';
}

function goToPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= pages; i++) {
    if (pages > 7 && i > 2 && i < pages - 1 && Math.abs(i - currentPage) > 1) {
      if (i === 3 || i === pages - 2) html += `<span class="page-ellipsis">…</span>`;
      continue;
    }
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goToPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
  el.innerHTML = html;
}

function render() {
  const list = sorted(filtered());
  const grid = document.getElementById('grid');
  const count = document.getElementById('results-count');
  const totalPages = Math.ceil(list.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = 1;
  const page = list.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  count.innerHTML = `Найдено: <strong>${list.length}</strong> товаров` +
    (totalPages > 1 ? ` — стр. <strong>${currentPage}</strong> из <strong>${totalPages}</strong>` : '');

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">🔍</div>
      <h3>Ничего не найдено</h3>
      <p>Попробуйте изменить фильтры или поисковый запрос</p>
    </div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  renderPagination(list.length);

  grid.innerHTML = page.map(p => {
    const inStock = p.stock > 0;
    const img = (p.images && p.images[0]) || p.image_url;
    const imgHtml = img ? `<img src="${img}" alt="${p.name}">` : categoryEmoji(p.category);
    const isFav = favSet.has(p.id);
    const priceHtml = p.price
      ? `<div class="product-price">${p.price.toLocaleString('ru')}<span class="currency"> ₸</span>${p.unit && p.unit !== 'шт' ? `<span class="unit">/${p.unit}</span>` : ''}</div>`
      : `<div class="product-price" style="color:var(--text3);font-size:13px;font-weight:500;margin-top:8px">Цена по запросу</div>`;
    const cartBtn = p.price
      ? `<div class="product-footer" onclick="event.stopPropagation()">
          <button class="btn-add-cart${!inStock ? ' disabled' : ''}" ${!inStock ? 'disabled' : `onclick="addToCart(event,${p.id},'${p.name.replace(/'/g,"\\'")}',${p.price})"`}>
            ${inStock ? 'В корзину' : 'Нет в наличии'}
          </button>
        </div>`
      : '';
    return `
    <div class="product-card" onclick="saveState();location.href='/shop/product/${p.id}'">
      <div class="product-image">${imgHtml}</div>
      <button class="fav-btn${isFav ? ' active' : ''}" onclick="event.stopPropagation();toggleFav(${p.id})">${isFav ? '♥' : '♡'}</button>
      <div class="product-body">
        ${p.supplier_article ? `<div class="product-article">Арт. ${p.supplier_article}</div>` : ''}
        ${p.brand ? `<div class="product-brand">${p.brand}</div>` : ''}
        <div class="product-name">${p.name}</div>
        ${priceHtml}
      </div>
      ${cartBtn}
    </div>`;
  }).join('');
}

// Search debounce
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = e.target.value.trim(); currentPage = 1; render(); }, 250);
});

// ── Auth ──────────────────────────────────────────────────────
let currentUser = null;

async function checkAuth() {
  try {
    const res = await fetch('/api/auth/me');
    if (res.ok) currentUser = await res.json();
  } catch {}
  renderAuthArea();
}

function renderAuthArea() {
  const area = document.getElementById('auth-area');
  if (!currentUser) {
    area.innerHTML = `<button class="btn-auth" onclick="openAuth()">Войти</button>`;
    return;
  }
  const initial = (currentUser.name || currentUser.email || '?')[0].toUpperCase();
  const adminLink = currentUser.role === 'admin'
    ? `<a class="dropdown-item" href="/admin">⚙️ Админ панель</a>` : '';
  area.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px">
      <div class="user-chip-wrap">
        <div class="user-chip" onclick="toggleDropdown()">
          <div class="user-avatar">${currentUser.avatar
            ? `<img src="${currentUser.avatar}" referrerpolicy="no-referrer">`
            : initial}</div>
          ${currentUser.name || currentUser.email}
        </div>
        <div class="user-dropdown" id="user-dropdown">
          ${adminLink}
          <div class="dropdown-item" onclick="location.href='/shop/my-orders'">📦 Мои заказы</div>
          <div class="dropdown-item red" onclick="doLogout()">🚪 Выйти</div>
        </div>
      </div>
    </div>`;
}

function toggleDropdown() {
  document.getElementById('user-dropdown')?.classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.user-chip-wrap')) {
    document.getElementById('user-dropdown')?.classList.remove('open');
  }
});

async function doLogout() {
  await fetch('/api/auth/logout', {method: 'POST'});
  currentUser = null;
  renderAuthArea();
}

function openAuth() {
  document.getElementById('auth-overlay').classList.add('open');
  setTimeout(() => document.getElementById('a-email').focus(), 100);
}
function closeAuth() {
  document.getElementById('auth-overlay').classList.remove('open');
  document.getElementById('auth-err').classList.remove('show');
}

function switchAuthTab(tab) {
  document.getElementById('at-login').classList.toggle('active', tab === 'login');
  document.getElementById('at-reg').classList.toggle('active', tab === 'reg');
  document.getElementById('auth-form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('auth-form-reg').style.display = tab === 'reg' ? '' : 'none';
  document.getElementById('auth-err').classList.remove('show');
}

function showAuthErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg; el.classList.add('show');
}

async function doAuthLogin() {
  const email = document.getElementById('a-email').value.trim();
  const pwd = document.getElementById('a-pwd').value;
  if (!email || !pwd) { showAuthErr('Заполните все поля'); return; }
  const btn = document.getElementById('a-btn-login');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/email-login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pwd})
    });
    if (res.ok) {
      currentUser = await res.json();
      closeAuth();
      renderAuthArea();
      if (currentUser.role === 'admin') location.href = '/admin';
    } else {
      const e = await res.json();
      showAuthErr(e.detail || 'Неверный email или пароль');
    }
  } catch { showAuthErr('Ошибка сети'); }
  btn.textContent = 'Войти'; btn.disabled = false;
}

async function doAuthRegister() {
  const name = document.getElementById('a-name').value.trim();
  const email = document.getElementById('a-reg-email').value.trim();
  const pwd = document.getElementById('a-reg-pwd').value;
  if (!name || !email || !pwd) { showAuthErr('Заполните все поля'); return; }
  if (pwd.length < 6) { showAuthErr('Пароль минимум 6 символов'); return; }
  const btn = document.getElementById('a-btn-reg');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password: pwd})
    });
    if (res.ok) {
      currentUser = await res.json();
      closeAuth();
      renderAuthArea();
    } else {
      const e = await res.json();
      showAuthErr(e.detail || 'Ошибка регистрации');
    }
  } catch { showAuthErr('Ошибка сети'); }
  btn.textContent = 'Создать аккаунт'; btn.disabled = false;
}

function toggleAuthEye(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function formatPhone(val) {
  const digits = val.replace(/\D/g, '').replace(/^7?/, '').slice(0, 10);
  let r = '+7';
  if (digits.length > 0) r += ' ' + digits.slice(0, 3);
  if (digits.length > 3) r += ' ' + digits.slice(3, 6);
  if (digits.length > 6) r += ' ' + digits.slice(6, 8);
  if (digits.length > 8) r += ' ' + digits.slice(8, 10);
  return r;
}

// ── Favourites ────────────────────────────────────────────────
let favSet = new Set(JSON.parse(localStorage.getItem('lunary_favs') || '[]'));

function toggleFav(id) {
  if (favSet.has(id)) {
    favSet.delete(id);
  } else {
    favSet.add(id);
  }
  localStorage.setItem('lunary_favs', JSON.stringify([...favSet]));
  // update button in-place without full re-render
  const btn = document.querySelector(`.fav-btn[onclick*="toggleFav(${id})"]`);
  if (btn) {
    btn.classList.toggle('active', favSet.has(id));
    btn.textContent = favSet.has(id) ? '♥' : '♡';
  }
}

// ── Cart ──────────────────────────────────────────────────────
let cart = {}; // {id: {name, price, qty}}

function cartTotal() {
  return Object.values(cart).reduce((s, i) => s + i.price * i.qty, 0);
}
function cartCount() {
  return Object.values(cart).reduce((s, i) => s + i.qty, 0);
}

function updateCartBtn() {
  const cnt = cartCount();
  const btn = document.getElementById('cart-btn');
  const badge = document.getElementById('cart-count');
  btn.style.display = cnt > 0 ? 'flex' : 'none';
  badge.textContent = cnt;
}

function addToCart(e, id, name, price) {
  if (cart[id]) cart[id].qty++;
  else cart[id] = {name, price, qty: 1};
  updateCartBtn();
  const btn = e.currentTarget;
  btn.classList.add('added');
  btn.textContent = '✓ Добавлено';
  setTimeout(() => { btn.classList.remove('added'); btn.textContent = 'В корзину'; }, 1200);
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCartBtn();
  renderCartItems();
}

function removeFromCart(id) {
  delete cart[id];
  updateCartBtn();
  renderCartItems();
}

function renderCartItems() {
  const list = document.getElementById('cart-items-list');
  const footer = document.getElementById('cart-footer');
  const empty = document.getElementById('cart-empty');
  const items = Object.entries(cart);

  if (!items.length) {
    list.innerHTML = '';
    footer.style.display = 'none';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  footer.style.display = '';
  document.getElementById('cart-total-price').textContent = cartTotal().toLocaleString('ru') + ' ₸';

  list.innerHTML = items.map(([id, item]) => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.price.toLocaleString('ru')} ₸</div>
      </div>
      <div class="cart-qty">
        <button class="cart-close" style="font-size:14px" onclick="changeQty(${id},-1)">−</button>
        <span style="min-width:20px;text-align:center">${item.qty}</span>
        <button class="cart-close" style="font-size:14px" onclick="changeQty(${id},1)">+</button>
      </div>
      <button class="cart-remove" onclick="removeFromCart(${id})">✕</button>
    </div>
  `).join('');
}

function openCart() {
  renderCartItems();
  document.getElementById('cart-overlay').classList.add('open');
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
}

function showCheckout() {
  if (!currentUser) {
    closeCart();
    openAuth();
    return;
  }
  const form = document.getElementById('checkout-form');
  form.classList.toggle('show');
  if (form.classList.contains('show')) {
    if (currentUser.name) document.getElementById('co-name').value = currentUser.name;
    if (currentUser.phone) document.getElementById('co-phone').value = formatPhone(currentUser.phone);
    const ph = document.getElementById('co-phone');
    ph.onfocus = () => { if (!ph.value) ph.value = '+7 '; };
    ph.oninput = () => { const s = ph.selectionStart; ph.value = formatPhone(ph.value); };
    document.getElementById('btn-to-checkout').textContent = 'Свернуть';
  } else {
    document.getElementById('btn-to-checkout').textContent = 'Оформить заказ';
  }
}

async function submitOrder() {
  if (!currentUser) { openAuth(); return; }
  const name = document.getElementById('co-name').value.trim();
  const phone = document.getElementById('co-phone').value.trim();
  if (!name || !phone) {
    const err = document.getElementById('co-err');
    err.textContent = 'Укажите имя и телефон'; err.classList.add('show');
    return;
  }
  const items = Object.entries(cart).map(([id, item]) => ({
    product_id: parseInt(id), name: item.name, qty: item.qty, price: item.price
  }));
  const btn = document.getElementById('btn-submit-order');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const res = await fetch('/api/shop/orders', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name, phone,
        address: document.getElementById('co-address').value.trim(),
        comment: document.getElementById('co-comment').value.trim(),
        items, total: cartTotal()
      })
    });
    if (res.ok) {
      cart = {};
      updateCartBtn();
      closeCart();
      alert('Заказ принят! Мы свяжемся с вами в ближайшее время.');
    } else {
      const e = await res.json();
      const err = document.getElementById('co-err');
      err.textContent = e.detail || 'Ошибка при отправке'; err.classList.add('show');
    }
  } catch {
    const err = document.getElementById('co-err');
    err.textContent = 'Ошибка сети'; err.classList.add('show');
  }
  btn.textContent = 'Отправить заказ'; btn.disabled = false;
}

async function loadSiteSettings() {
  try {
    const res = await fetch('/api/settings');
    if (!res.ok) return;
    const s = await res.json();
    if (s.shop_name) document.querySelector('.header-logo').textContent = s.shop_name;
    if (s.shop_tagline) document.querySelector('.header-tagline').textContent = s.shop_tagline;
    if (s.banner_show === '0') {
      document.getElementById('store-banner').style.display = 'none';
    } else {
      if (s.banner_title) document.querySelector('.banner-title').textContent = s.banner_title;
      if (s.banner_subtitle) document.querySelector('.banner-sub').textContent = s.banner_subtitle;
    }
    if (s.shop_name) document.title = s.shop_name + ' — Каталог';
  } catch {}
}

checkAuth();
loadSiteSettings();
load();
</script>
