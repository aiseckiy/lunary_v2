<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUNARY — Строительные материалы</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --accent: #6366f1;
  --accent-dark: #4f46e5;
  --bg: #f8f8fb;
  --surface: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;
  --green: #16a34a;
  --red: #ef4444;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.store-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
  text-decoration: none;
  flex-shrink: 0;
}
.header-tagline {
  font-size: 13px;
  color: var(--text3);
  flex: 1;
}
.header-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  width: 280px;
}
.header-search input {
  border: none;
  background: transparent;
  font-size: 14px;
  color: var(--text);
  outline: none;
  width: 100%;
}
.header-search input::placeholder { color: var(--text3); }
.header-search svg { flex-shrink: 0; color: var(--text3); }

/* ── MAIN LAYOUT ── */
.store-layout {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

/* ── SIDEBAR FILTERS ── */
.store-sidebar {
  width: 220px;
  flex-shrink: 0;
  position: sticky;
  top: 84px;
}
.filter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
}
.filter-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.category-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.category-item:hover { background: #f3f4f6; color: var(--text); }
.category-item.active { background: #ede9fe; color: var(--accent); font-weight: 600; }
.category-count {
  font-size: 12px;
  color: var(--text3);
  background: #f3f4f6;
  border-radius: 20px;
  padding: 1px 7px;
}
.category-item.active .category-count { background: #ddd6fe; color: var(--accent); }

.filter-divider { height: 1px; background: var(--border); margin: 14px 0; }

.brand-list { display: flex; flex-direction: column; gap: 4px; }
.brand-check {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: background 0.15s;
}
.brand-check:hover { background: #f3f4f6; }
.brand-check input { accent-color: var(--accent); }

/* ── PRODUCTS AREA ── */
.store-content { flex: 1; min-width: 0; }

.store-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
  flex-wrap: wrap;
}
.results-count {
  font-size: 14px;
  color: var(--text2);
}
.results-count strong { color: var(--text); }

.sort-select {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  outline: none;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  cursor: default;
  transition: box-shadow 0.2s, transform 0.2s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.product-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  transform: translateY(-2px);
}

.product-image {
  width: 100%;
  aspect-ratio: 1;
  background: #f3f4f6;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  margin-bottom: 4px;
  overflow: hidden;
}

.product-brand {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.product-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-sku {
  font-size: 11px;
  color: var(--text3);
  font-family: monospace;
}
.product-bottom {
  margin-top: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.product-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
.product-price .currency {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
}
.product-stock {
  font-size: 12px;
  font-weight: 500;
  border-radius: 20px;
  padding: 3px 10px;
}
.stock-in {
  background: #dcfce7;
  color: #166534;
}
.stock-out {
  background: #fee2e2;
  color: #991b1b;
}
.product-category-tag {
  font-size: 11px;
  color: var(--text3);
  background: #f3f4f6;
  border-radius: 6px;
  padding: 2px 8px;
  align-self: flex-start;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .store-sidebar { display: none; }
  .header-tagline { display: none; }
  .header-search { width: auto; flex: 1; }
  .store-layout { padding: 16px; }
  .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .product-card { padding: 14px; }
  .product-image { font-size: 36px; }
  .product-price { font-size: 15px; }

  /* Mobile filter pills */
  .mobile-filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 12px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .mobile-filters::-webkit-scrollbar { display: none; }
  .mobile-pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
  }
  .mobile-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
}
@media (min-width: 769px) {
  .mobile-filters { display: none; }
}

/* ── PAGINATION ── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 32px;
  flex-wrap: wrap;
}
.page-btn {
  min-width: 36px;
  height: 36px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.page-btn:hover:not(:disabled) { background: #f3f4f6; color: var(--text); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
.page-btn:disabled { opacity: 0.35; cursor: default; }
.page-ellipsis { color: var(--text3); padding: 0 4px; font-size: 14px; }

/* ── AUTH BUTTON ── */
.btn-auth {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
  flex-shrink: 0;
}
.btn-auth:hover { background: var(--accent-dark); }

.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f3f4f6;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px 5px 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
}
.user-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  overflow: hidden; flex-shrink: 0;
}
.user-avatar img { width:100%; height:100%; object-fit:cover; }

.admin-badge {
  background: #ede9fe;
  color: var(--accent);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  margin-left: 2px;
  cursor: pointer;
  text-decoration: none;
  transition: background .15s;
}
.admin-badge:hover { background: #ddd6fe; }

/* ── AUTH POPUP ── */
.auth-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.auth-overlay.open { display: flex; }
.auth-modal {
  background: #fff;
  border-radius: 20px;
  padding: 32px 28px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 24px 64px rgba(0,0,0,.15);
  position: relative;
}
.auth-close {
  position: absolute;
  top: 14px; right: 14px;
  background: #f3f4f6;
  border: none;
  border-radius: 50%;
  width: 30px; height: 30px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #6b7280;
}
.auth-logo { font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 4px; }
.auth-logo span { color: var(--accent); }
.auth-sub { font-size: 13px; color: #9ca3af; text-align: center; margin-bottom: 24px; }

.auth-tabs { display:flex; background:#f3f4f6; border-radius:10px; padding:3px; margin-bottom:20px; }
.auth-tab { flex:1; text-align:center; padding:7px; font-size:14px; font-weight:500; color:#6b7280; cursor:pointer; border-radius:8px; transition:all .15s; }
.auth-tab.active { background:#fff; color:#111827; box-shadow:0 1px 4px rgba(0,0,0,.08); }

.auth-label { font-size:13px; font-weight:500; color:#374151; margin-bottom:5px; display:block; }
.auth-input-wrap { position:relative; margin-bottom:12px; }
.auth-input {
  width:100%; background:#f9fafb; border:1px solid #e5e7eb;
  border-radius:10px; padding:10px 40px 10px 13px;
  font-size:14px; color:#111827; outline:none; font-family:inherit;
  transition:border-color .15s;
}
.auth-input:focus { border-color: var(--accent); background:#fff; }
.auth-eye { position:absolute; right:11px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#9ca3af; font-size:16px; padding:2px; }

.auth-btn {
  width:100%; background:#111827; color:#fff; border:none;
  border-radius:10px; padding:12px; font-size:15px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:background .15s; margin-top:2px;
}
.auth-btn:hover { background:#374151; }
.auth-btn:disabled { opacity:.6; cursor:not-allowed; }

.auth-divider { display:flex; align-items:center; gap:10px; margin:16px 0; color:#d1d5db; font-size:12px; }
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:#e5e7eb; }

.auth-google {
  width:100%; background:#fff; color:#374151; border:1px solid #e5e7eb;
  border-radius:10px; padding:11px; font-size:14px; font-weight:500;
  cursor:pointer; font-family:inherit; transition:background .15s;
  display:flex; align-items:center; justify-content:center; gap:9px;
}
.auth-google:hover { background:#f9fafb; }

.auth-err {
  background:#fee2e2; border:1px solid #fca5a5; border-radius:8px;
  padding:9px 12px; font-size:13px; color:#dc2626; margin-bottom:12px; display:none;
}
.auth-err.show { display:block; }

/* user dropdown */
.user-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
  min-width: 180px;
  overflow: hidden;
  z-index: 200;
  display: none;
}
.user-dropdown.open { display: block; }
.dropdown-item {
  padding: 11px 16px;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  color: var(--text);
  text-decoration: none;
}
.dropdown-item:hover { background: #f9fafb; }
.dropdown-item.red { color: var(--red); }
.user-chip-wrap { position: relative; }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 10px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<header class="store-header">
  <div class="header-inner">
    <a class="header-logo" href="/">LUNARY</a>
    <span class="header-tagline">Строительные материалы и инструменты</span>
    <div class="header-search">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Поиск товаров...">
    </div>
    <div id="auth-area"></div>
  </div>
</header>

<!-- Auth popup -->
<div class="auth-overlay" id="auth-overlay" onclick="if(event.target===this)closeAuth()">
  <div class="auth-modal">
    <button class="auth-close" onclick="closeAuth()">✕</button>
    <div class="auth-logo">Lunary <span>OS</span></div>
    <div class="auth-sub">Войдите чтобы делать заказы</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="at-login" onclick="switchAuthTab('login')">Войти</div>
      <div class="auth-tab" id="at-reg" onclick="switchAuthTab('reg')">Регистрация</div>
    </div>

    <div id="auth-err" class="auth-err"></div>

    <!-- Войти -->
    <div id="auth-form-login">
      <label class="auth-label">Email</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <label class="auth-label">Пароль</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-pwd" type="password" placeholder="Пароль" onkeydown="if(event.key==='Enter')doAuthLogin()">
        <button class="auth-eye" type="button" onclick="toggleAuthEye('a-pwd',this)">👁</button>
      </div>
      <button class="auth-btn" id="a-btn-login" onclick="doAuthLogin()">Войти</button>
    </div>

    <!-- Регистрация -->
    <div id="auth-form-reg" style="display:none">
      <label class="auth-label">Имя</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-name" type="text" placeholder="Ваше имя" autocomplete="name">
      </div>
      <label class="auth-label">Email</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-reg-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <label class="auth-label">Пароль</label>
      <div class="auth-input-wrap">
        <input class="auth-input" id="a-reg-pwd" type="password" placeholder="Минимум 6 символов" onkeydown="if(event.key==='Enter')doAuthRegister()">
        <button class="auth-eye" type="button" onclick="toggleAuthEye('a-reg-pwd',this)">👁</button>
      </div>
      <button class="auth-btn" id="a-btn-reg" onclick="doAuthRegister()">Создать аккаунт</button>
    </div>

    <div class="auth-divider">или</div>
    <button class="auth-google" onclick="location.href='/auth/google'">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Войти через Google
    </button>
  </div>
</div>

<!-- Mobile category pills -->
<div class="mobile-filters" id="mobile-cats"></div>

<div class="store-layout">
  <!-- Sidebar -->
  <aside class="store-sidebar">
    <div class="filter-card">
      <div class="filter-title">Категории</div>
      <div id="cat-list"></div>
      <div class="filter-divider"></div>
      <div class="filter-title">Бренды</div>
      <div class="brand-list" id="brand-list"></div>
    </div>
  </aside>

  <!-- Content -->
  <main class="store-content">
    <div class="store-toolbar">
      <div class="results-count" id="results-count">Загрузка...</div>
      <select class="sort-select" id="sort-select" onchange="currentPage=1;render()">
        <option value="name">По названию</option>
        <option value="price_asc">Сначала дешевле</option>
        <option value="price_desc">Сначала дороже</option>
        <option value="stock">По наличию</option>
      </select>
    </div>
    <div class="product-grid" id="grid"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script>
let allProducts = [];
let activeCategory = 'all';
let activeBrands = new Set();
let searchQuery = '';
let currentPage = 1;
const PAGE_SIZE = 80;

async function load() {
  const res = await fetch('/api/store/products');
  allProducts = await res.json();
  buildFilters();
  render();
}

function buildFilters() {
  // Categories
  const cats = {};
  allProducts.forEach(p => {
    const c = p.category || 'Другое';
    cats[c] = (cats[c] || 0) + 1;
  });
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  const catList = document.getElementById('cat-list');
  const mobileCats = document.getElementById('mobile-cats');

  // "All" item
  catList.innerHTML = `<div class="category-item active" data-cat="all" onclick="setCategory('all')">
    Все товары <span class="category-count">${allProducts.length}</span>
  </div>`;
  mobileCats.innerHTML = `<div class="mobile-pill active" data-cat="all" onclick="setCategory('all')">Все</div>`;

  sorted.forEach(([name, count]) => {
    catList.innerHTML += `<div class="category-item" data-cat="${name}" onclick="setCategory('${name}')">
      ${name} <span class="category-count">${count}</span>
    </div>`;
    mobileCats.innerHTML += `<div class="mobile-pill" data-cat="${name}" onclick="setCategory('${name}')">${name}</div>`;
  });

  // Brands
  const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))].sort();
  const brandList = document.getElementById('brand-list');
  brandList.innerHTML = brands.map(b => `
    <label class="brand-check">
      <input type="checkbox" value="${b}" onchange="toggleBrand('${b}', this.checked)">
      ${b}
    </label>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  currentPage = 1;
  document.querySelectorAll('[data-cat]').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });
  render();
}

function toggleBrand(brand, checked) {
  if (checked) activeBrands.add(brand);
  else activeBrands.delete(brand);
  currentPage = 1;
  render();
}

function filtered() {
  let list = allProducts;
  if (activeCategory !== 'all') list = list.filter(p => (p.category || 'Другое') === activeCategory);
  if (activeBrands.size) list = list.filter(p => activeBrands.has(p.brand));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.brand || '').toLowerCase().includes(q) ||
      (p.sku || '').toLowerCase().includes(q)
    );
  }
  return list;
}

function sorted(list) {
  const s = document.getElementById('sort-select').value;
  if (s === 'price_asc') return [...list].sort((a,b) => (a.price||0) - (b.price||0));
  if (s === 'price_desc') return [...list].sort((a,b) => (b.price||0) - (a.price||0));
  if (s === 'stock') return [...list].sort((a,b) => b.stock - a.stock);
  return [...list].sort((a,b) => a.name.localeCompare(b.name, 'ru'));
}

function categoryEmoji(cat) {
  const map = {
    'Инструменты': '🔧', 'Лопаты': '🪣', 'Пена': '🧴', 'Герметик': '🧴',
    'Краски': '🎨', 'Шпатели': '🔨', 'Топоры': '🪓', 'Пилы': '🪚',
    'Клей': '🧲', 'Дюбели': '🔩', 'Сверла': '🔩', 'Уровни': '📏',
    'Рулетки': '📏', 'Электроинструмент': '⚡', 'Расходники': '📦',
  };
  for (const [k, v] of Object.entries(map)) {
    if (cat && cat.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return '📦';
}

function goToPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= pages; i++) {
    if (pages > 7 && i > 2 && i < pages - 1 && Math.abs(i - currentPage) > 1) {
      if (i === 3 || i === pages - 2) html += `<span class="page-ellipsis">…</span>`;
      continue;
    }
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goToPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
  el.innerHTML = html;
}

function render() {
  const list = sorted(filtered());
  const grid = document.getElementById('grid');
  const count = document.getElementById('results-count');
  const totalPages = Math.ceil(list.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = 1;
  const page = list.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  count.innerHTML = `Найдено: <strong>${list.length}</strong> товаров` +
    (totalPages > 1 ? ` — стр. <strong>${currentPage}</strong> из <strong>${totalPages}</strong>` : '');

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">🔍</div>
      <h3>Ничего не найдено</h3>
      <p>Попробуйте изменить фильтры или поисковый запрос</p>
    </div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  renderPagination(list.length);

  grid.innerHTML = page.map(p => {
    const inStock = p.stock > 0;
    const priceHtml = p.price
      ? `<div class="product-price">${p.price.toLocaleString('ru')}<span class="currency"> ₸</span></div>`
      : `<div class="product-price" style="color:var(--text3);font-size:14px">Цена по запросу</div>`;
    return `
    <div class="product-card">
      <div class="product-image">${categoryEmoji(p.category)}</div>
      ${p.brand ? `<div class="product-brand">${p.brand}</div>` : ''}
      <div class="product-name">${p.name}</div>
      <div class="product-sku">${p.sku}</div>
      <div class="product-bottom">
        ${priceHtml}
        <span class="product-stock ${inStock ? 'stock-in' : 'stock-out'}">${inStock ? 'В наличии' : 'Нет'}</span>
      </div>
    </div>`;
  }).join('');
}

// Search debounce
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = e.target.value.trim(); currentPage = 1; render(); }, 250);
});

// ── Auth ──────────────────────────────────────────────────────
let currentUser = null;

async function checkAuth() {
  try {
    const res = await fetch('/api/auth/me');
    if (res.ok) currentUser = await res.json();
  } catch {}
  renderAuthArea();
}

function renderAuthArea() {
  const area = document.getElementById('auth-area');
  if (!currentUser) {
    area.innerHTML = `<button class="btn-auth" onclick="openAuth()">Войти</button>`;
    return;
  }
  const initial = (currentUser.name || currentUser.email || '?')[0].toUpperCase();
  const adminBtn = currentUser.role === 'admin'
    ? `<a class="admin-badge" href="/admin">Админ панель</a>` : '';
  area.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px">
      ${adminBtn}
      <div class="user-chip-wrap">
        <div class="user-chip" onclick="toggleDropdown()">
          <div class="user-avatar">${currentUser.avatar
            ? `<img src="${currentUser.avatar}" referrerpolicy="no-referrer">`
            : initial}</div>
          ${currentUser.name || currentUser.email}
        </div>
        <div class="user-dropdown" id="user-dropdown">
          <div class="dropdown-item red" onclick="doLogout()">🚪 Выйти</div>
        </div>
      </div>
    </div>`;
}

function toggleDropdown() {
  document.getElementById('user-dropdown')?.classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.user-chip-wrap')) {
    document.getElementById('user-dropdown')?.classList.remove('open');
  }
});

async function doLogout() {
  await fetch('/api/auth/logout', {method: 'POST'});
  currentUser = null;
  renderAuthArea();
}

function openAuth() {
  document.getElementById('auth-overlay').classList.add('open');
  setTimeout(() => document.getElementById('a-email').focus(), 100);
}
function closeAuth() {
  document.getElementById('auth-overlay').classList.remove('open');
  document.getElementById('auth-err').classList.remove('show');
}

function switchAuthTab(tab) {
  document.getElementById('at-login').classList.toggle('active', tab === 'login');
  document.getElementById('at-reg').classList.toggle('active', tab === 'reg');
  document.getElementById('auth-form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('auth-form-reg').style.display = tab === 'reg' ? '' : 'none';
  document.getElementById('auth-err').classList.remove('show');
}

function showAuthErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg; el.classList.add('show');
}

async function doAuthLogin() {
  const email = document.getElementById('a-email').value.trim();
  const pwd = document.getElementById('a-pwd').value;
  if (!email || !pwd) { showAuthErr('Заполните все поля'); return; }
  const btn = document.getElementById('a-btn-login');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/email-login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pwd})
    });
    if (res.ok) {
      currentUser = await res.json();
      closeAuth();
      renderAuthArea();
      if (currentUser.role === 'admin') location.href = '/admin';
    } else {
      const e = await res.json();
      showAuthErr(e.detail || 'Неверный email или пароль');
    }
  } catch { showAuthErr('Ошибка сети'); }
  btn.textContent = 'Войти'; btn.disabled = false;
}

async function doAuthRegister() {
  const name = document.getElementById('a-name').value.trim();
  const email = document.getElementById('a-reg-email').value.trim();
  const pwd = document.getElementById('a-reg-pwd').value;
  if (!name || !email || !pwd) { showAuthErr('Заполните все поля'); return; }
  if (pwd.length < 6) { showAuthErr('Пароль минимум 6 символов'); return; }
  const btn = document.getElementById('a-btn-reg');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password: pwd})
    });
    if (res.ok) {
      currentUser = await res.json();
      closeAuth();
      renderAuthArea();
    } else {
      const e = await res.json();
      showAuthErr(e.detail || 'Ошибка регистрации');
    }
  } catch { showAuthErr('Ошибка сети'); }
  btn.textContent = 'Создать аккаунт'; btn.disabled = false;
}

function toggleAuthEye(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

checkAuth();
load();
</script>
